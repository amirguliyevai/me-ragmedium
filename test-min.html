<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Minimal Three.js Test</title>
<style>body{margin:0;background:#000;overflow:hidden}#msg{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;color:#0f0;font:14px monospace;background:rgba(0,0,0,0.8);padding:4px 12px;border-radius:4px}</style>
</head>
<body>
<div id="msg">Loading...</div>
<script type="module">
const msg = document.getElementById('msg');
async function step(text) { msg.textContent = text; await new Promise(r => setTimeout(r, 50)); }

try {
  await step('Importing THREE...');
  const THREE = await import('https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js');
  await step('THREE v' + THREE.REVISION + ' loaded');
  
  await step('Importing OrbitControls...');
  const { OrbitControls } = await import('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/controls/OrbitControls.js');
  await step('OrbitControls loaded');
  
  await step('Creating WebGL renderer...');
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  
  await step('Creating scene...');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.5, 2000);
  camera.position.set(0, 50, 200);
  
  scene.add(new THREE.AmbientLight(0x335588, 2));
  
  const sg = new THREE.BufferGeometry();
  const sv = [];
  for(let i=0;i<1000;i++){
    const r=400+Math.random()*600, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);
    sv.push(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));
  }
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:2,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending})));
  
  const g = new THREE.SphereGeometry(150, 24, 18);
  scene.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({color:0x00aaff,wireframe:true,transparent:true,opacity:0.03})));
  
  function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
    camera.position.x = Math.sin(Date.now()*0.0001)*50;
  }
  animate();
  
  msg.style.color = '#0f0';
  msg.textContent = '✅ SCENE ACTIVE — Stars + wireframe sphere rendering';
  setTimeout(() => { msg.style.opacity = '0'; msg.style.transition = 'opacity 2s'; }, 3000);
} catch(e) {
  msg.style.color = '#f44';
  msg.innerHTML = '❌ ' + e.message + '<br><small>' + (e.stack||'').split('\\n').slice(0,3).join('<br>') + '</small>';
}
</script>
</body>
</html>
