<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leads - AI Mother Mind</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1613;color:#f4f9f4;font-family:system-ui,-apple-system,sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #ffffff1a;flex-shrink:0}
.header h1{font-size:15px;font-weight:600}
.lead-grid{flex:1;overflow-y:auto;padding:8px}
.lead-card{background:#1b2420;border:1px solid #ffffff14;border-radius:10px;padding:10px 12px;margin-bottom:6px}
.lead-card .name{font-size:13px;font-weight:600;margin-bottom:2px}
.lead-card .email{font-size:11px;color:#a9b7a7}
.lead-card .tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.lead-card .tag{font-size:9px;padding:2px 6px;border-radius:999px;border:1px solid #ffffff1a;color:#a9b7a7}
.empty{padding:40px;text-align:center;color:#a9b7a7;font-size:13px}
</style>
</head>
<body>
<div class="header">
  <h1>📊 Leads</h1>
  <span style="font-size:11px;color:#a9b7a7" id="count">0</span>
</div>
<div class="lead-grid" id="leads"></div>
<script>
async function loadLeads(){
  try{
    const r=await fetch('/api/leads');
    const d=await r.json();
    const grid=document.getElementById('leads');
    const count=document.getElementById('count');
    if(d.length){
      count.textContent=d.length+' leads';
      grid.innerHTML=d.map(l=>'<div class="lead-card"><div class="name">'+(l.name||l.email||'Unknown')+'</div><div class="email">'+(l.email||'')+'</div>'+(l.tags?'<div class="tags">'+l.tags.split(',').map(t=>'<span class="tag">'+t.trim()+'</span>').join('')+'</div>':'')+'</div>').join('');
    }else{
      grid.innerHTML='<div class="empty">No leads yet</div>';
    }
  }catch(e){
    document.getElementById('leads').innerHTML='<div class="empty">⚠️ Could not load leads</div>';
  }
}
loadLeads();
</script>
</body>
</html>
