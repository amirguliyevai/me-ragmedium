<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Test</title>
<style>body{margin:0;background:#000;overflow:hidden}#msg{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;color:#0ff;font:14px monospace}</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="msg">Loading Three.js...</div>
<script type="module">
const msg = document.getElementById('msg');
try {
  msg.textContent = 'Importing THREE...';
  import * as THREE from 'three';
  msg.textContent = 'THREE imported. REVISION: ' + THREE.REVISION;
  
  msg.textContent = 'Creating WebGL renderer...';
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  
  msg.textContent = 'Creating scene...';
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.5, 2000);
  camera.position.set(0, 50, 200);
  
  msg.textContent = 'Adding lights...';
  scene.add(new THREE.AmbientLight(0x335588, 2));
  
  msg.textContent = 'Adding stars...';
  const sg = new THREE.BufferGeometry();
  const sv = [];
  for(let i=0;i<1000;i++){
    const r=400+Math.random()*600;
    const t=Math.random()*Math.PI*2;
    const p=Math.acos(2*Math.random()-1);
    sv.push(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));
  }
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:2,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending})));
  
  msg.textContent = 'Adding wireframe sphere...';
  const g = new THREE.SphereGeometry(150, 24, 18);
  scene.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({color:0x00aaff,wireframe:true,transparent:true,opacity:0.03})));
  
  msg.textContent = 'Rendering...';
  function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
    camera.position.x = Math.sin(Date.now()*0.0001)*50;
  }
  animate();
  
  setTimeout(() => { msg.style.display = 'none'; }, 2000);
  msg.style.color = '#0f0';
  msg.textContent = '✅ GALAXY TEST ACTIVE — Scene should render';
} catch(e) {
  msg.style.color = '#f44';
  msg.innerHTML = '❌ ERROR: ' + e.message + '<br><small>' + e.stack.split('\\n')[0] + '</small>';
  console.error(e);
}
</script>
</body>
</html>
