<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Linux Desktop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;color:#fff;font-family:system-ui,sans-serif}
body{display:flex;flex-direction:column}
#hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#1e2228;border-bottom:1px solid #355a66;min-height:38px;flex-shrink:0}
#hdr .d{width:8px;height:8px;border-radius:50%;background:#555}
#hdr .l{flex:1;color:#6b8a94;font-size:12px}
#hdr button,#hdr a{border:0;background:transparent;color:#6b8a94;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;border:1px solid #355a66;text-decoration:none}
#hdr button:hover,#hdr a:hover{color:#9cdef2;border-color:#9cdef2}
#screen{flex:1;position:relative;overflow:hidden}
</style>
</head>
<body>
<div id="hdr">
  <span class="d" id="dot"></span>
  <span class="l" id="label">Connecting...</span>
  <button id="retryBtn" onclick="location.reload()" style="display:none">↻ Retry</button>
  <a href="https://100.111.98.27:2088/" target="_blank">Full screen</a>
</div>
<div id="screen"></div>

<script type="module">
import RFB from 'https://esm.sh/@novnc/novnc@1.7.0/core/rfb.js';

const dot = document.getElementById('dot');
const label = document.getElementById('label');
const retryBtn = document.getElementById('retryBtn');
let connected = false;
let rfb = null;

function status(msg, ok) {
  label.textContent = msg;
  dot.style.background = ok ? '#98c379' : '#e06c75';
}

status('Connecting...', false);

try {
  const screenEl = document.getElementById('screen');
  const url = 'ws://100.111.98.27:2090/';

  rfb = new RFB(screenEl, url, {
    credentials: { password: 'Silverhand' },
    shared: true,
  });

  rfb.addEventListener('connect', () => {
    connected = true;
    status('Connected ✓', true);
    document.title = 'Desktop - Connected';
    try { rfb.scaleViewport = true; rfb.resizeSession = true; } catch(e) {}
  });

  rfb.addEventListener('disconnect', (e) => {
    connected = false;
    status('Disconnected' + (e.detail ? ': ' + e.detail : ''), false);
    retryBtn.style.display = '';
    setTimeout(() => { if(!connected) location.reload(); }, 8000);
  });

  rfb.addEventListener('securityfailure', (e) => {
    status('Auth failed: ' + (e.detail || 'unknown'), false);
  });

  setTimeout(() => {
    if (!connected && rfb) {
      status('Timeout — retrying...', false);
      retryBtn.style.display = '';
      setTimeout(() => location.reload(), 3000);
    }
  }, 12000);

} catch(e) {
  status('Error: ' + e.message, false);
  retryBtn.style.display = '';
}
</script>
</body>
</html>
