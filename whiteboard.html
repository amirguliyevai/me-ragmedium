<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>me.ragmedium — Whiteboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080f;font-family:system-ui,-apple-system,sans-serif}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#controls{position:fixed;bottom:20px;right:20px;z-index:100;display:flex;gap:6px}
#controls button{width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(10,10,20,0.9);color:#ccc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#controls button:hover{background:rgba(255,255,255,0.1);color:#fff}
#controls .pct{display:flex;align-items:center;padding:0 12px;font-size:12px;color:#666;min-width:50px;justify-content:center}
#tooltip{position:fixed;pointer-events:none;background:rgba(10,10,20,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;color:#ccc;font-size:12px;z-index:200;display:none;backdrop-filter:blur(10px);max-width:280px}
#tooltip .tt-name{font-weight:600;font-size:14px;margin-bottom:2px}
#tooltip .tt-sub{color:#888;font-size:11px}
#tooltip .tt-stat{color:#aaa;font-size:11px;margin-top:4px}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#555;font-size:14px;z-index:300}
</style>
</head>
<body>
<div class="loading" id="loading">Loading whiteboard...</div>
<canvas id="canvas"></canvas>
<div id="controls">
  <button id="btn-zoom-in">+</button>
  <div class="pct" id="zoom-pct">100%</div>
  <button id="btn-zoom-out">−</button>
  <button id="btn-fit">⊡</button>
</div>
<div id="tooltip"></div>

<script>
// ─── Canvas Setup ───
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let scale = 1, panX = 0, panY = 0;
let targetScale = 1, targetPanX = 0, targetPanY = 0;
let isDragging = false, dragStartX, dragStartY, dragPanX, dragPanY;
let hoveredNode = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Data ───
let tree = { companies: [], progress: {}, agents: [], stats: {}, feed: [] };

const COLORS = {
  executive: '#f59e0b',
  lamatrader: '#06b6d4',
  ragmedium: '#8b5cf6',
  ragx: '#d946ef',
  rema: '#f97316',
  grademy: '#34d399',
  content: '#fbbf24',
  ops: '#6b7280',
  ventures: '#a78bfa',
  active: '#34d399',
  stalled: '#f87171',
  pending: '#fbbf24',
  live: '#06b6d4',
  idea: '#a78bfa',
};

// ─── Node Layout ───
const nodes = [];
const edges = [];

function buildLayout() {
  nodes.length = 0;
  edges.length = 0;

  // Center: Amir
  const cx = 0, cy = -300;
  nodes.push({
    id: 'root', label: 'Amir', sub: 'Founder', x: cx, y: cy, r: 36,
    color: COLORS.executive, type: 'person', level: 0,
  });

  // Companies orbiting
  const companies = [
    { id: 'lamatrader', label: 'LamaTrader', sub: 'ITE Platform · Beta', r: 22, color: COLORS.lamatrader, status: 'beta', icp: 'Traders · Hedge Funds' },
    { id: 'ragmedium', label: 'RAGmedium', sub: 'AI Solutions · Live', r: 22, color: COLORS.ragmedium, status: 'live', icp: 'Mid-market · Agencies' },
    { id: 'ragx', label: 'RAGx', sub: 'Workflow Automation', r: 20, color: COLORS.ragx, status: 'live', icp: 'Ops-heavy businesses' },
    { id: 'rema', label: 'Rema Exteriors', sub: 'Construction · Live', r: 20, color: COLORS.rema, status: 'live', icp: 'Homeowners' },
    { id: 'grademy', label: 'Grademy', sub: 'EdTech · Beta', r: 20, color: COLORS.grademy, status: 'beta', icp: 'Students · Schools' },
    { id: 'ventures', label: 'Ventures', sub: '7 Projects', r: 18, color: COLORS.ventures, status: 'idea', icp: 'Various' },
  ];

  // Place companies in a ring
  const ringR = 240;
  companies.forEach((c, i) => {
    const angle = (i / companies.length) * Math.PI * 2 - Math.PI / 2;
    const nx = cx + Math.cos(angle) * ringR;
    const ny = cy + Math.sin(angle) * ringR * 0.6;
    nodes.push({ ...c, x: nx, y: ny, type: 'company', level: 1 });
    edges.push({ from: 'root', to: c.id, color: c.color });
  });

  // Company detail boxes - positioned outward
  const detailPositions = [
    { parent: 'lamatrader', dx: 260, dy: -120, items: [
      { label: 'ICP: Power Traders', val: '150 leads' },
      { label: 'Broker Ecosystem', val: '6 brokers' },
      { label: 'Mega Lead List v2', val: '150 enriched' },
      { label: 'Path to 10K', val: 'SEC ADV bulk' },
    ]},
    { parent: 'ragmedium', dx: 160, dy: -100, items: [
      { label: 'ICP: London Agencies', val: '0 discovered' },
      { label: 'Free Training Entry', val: 'Not started' },
      { label: 'Google Hackathon Win', val: 'Credibility ✓' },
      { label: 'Premium Web', val: 'Bundled offering' },
    ]},
    { parent: 'ragx', dx: 60, dy: -110, items: [
      { label: 'Email Accounts', val: '1,851 warming' },
      { label: 'Campaigns', val: '0 active' },
      { label: 'Warmup Sent', val: '951K total' },
    ]},
    { parent: 'rema', dx: -60, dy: -110, items: [
      { label: 'Homeowner DB', val: '536M records' },
      { label: 'SMS Outreach', val: 'Ready' },
      { label: 'Property Filters', val: 'State/Zip/Value' },
    ]},
    { parent: 'grademy', dx: -160, dy: -100, items: [
      { label: 'AI Tutor', val: 'Live' },
      { label: 'Learning Modes', val: 'Feynman + Socratic' },
      { label: 'Tasks Failed', val: '8 timed out' },
      { label: 'Launch Roadmap', val: 'Needs execution' },
    ]},
    { parent: 'ventures', dx: -260, dy: -120, items: [
      { label: 'SyneticX', val: 'Pre-launch' },
      { label: 'Halal Booking', val: 'Pre-launch' },
      { label: 'PriPitch', val: 'Pre-launch' },
      { label: '+4 warm', val: 'PM tracking' },
    ]},
  ];

  detailPositions.forEach(dp => {
    const parent = nodes.find(n => n.id === dp.parent);
    if (!parent) return;
    dp.items.forEach((item, i) => {
      const id = `${dp.parent}_detail_${i}`;
      const ny = parent.y + dp.dy + i * 32;
      const nx = parent.x + dp.dx;
      nodes.push({
        id, label: item.label, sub: item.val, x: nx, y: ny,
        r: 5, color: parent.color, type: 'detail', level: 2, parentId: dp.parent,
      });
      edges.push({ from: dp.parent, to: id, color: parent.color, dash: true });
    });
  });

  // Agent galaxy cluster - bottom area
  const agentDivs = [
    { div: 'Executive', color: COLORS.executive },
    { div: 'Lead Gen', color: COLORS.lamatrader },
    { div: 'Content', color: COLORS.content },
    { div: 'Dev', color: '#60a5fa' },
    { div: 'Research', color: COLORS.grademy },
    { div: 'Marketing', color: COLORS.rema },
    { div: 'Ops', color: COLORS.ops },
  ];

  agentDivs.forEach((div, di) => {
    const divX = -300 + di * 100;
    const divY = 180;
    nodes.push({
      id: `div_${div.div}`, label: div.div, sub: 'Division', x: divX, y: divY,
      r: 12, color: div.color, type: 'division', level: 3,
    });

    // Simulate 3-5 agents per division
    const count = 3 + Math.floor(Math.random() * 4);
    for (let ai = 0; ai < count; ai++) {
      const angle = (ai / count) * Math.PI * 2;
      const ar = 50;
      const ax = divX + Math.cos(angle) * ar;
      const ay = divY + Math.sin(angle) * ar + 20;
      const agentNames = ['Scout', 'Verifier', 'Builder', 'Writer', 'Analyst', 'Scheduler', 'Monitor'];
      nodes.push({
        id: `${div.div}_agent_${ai}`,
        label: agentNames[ai % agentNames.length],
        sub: Math.random() > 0.6 ? 'Active' : 'Idle',
        x: ax, y: ay, r: 5,
        color: div.color, type: 'agent', level: 4,
      });
      edges.push({ from: `div_${div.div}`, to: `${div.div}_agent_${ai}`, color: div.color, dash: true });
    }
  });

  // Stats panel - right side
  const statsX = 450, statsY = -150;
  const statItems = [
    { label: 'Leads', val: '1.25M', color: '#f59e0b' },
    { label: 'Professionals', val: '13.9M', color: '#06b6d4' },
    { label: 'Businesses', val: '29M', color: '#d946ef' },
    { label: 'Homeowners', val: '536M', color: '#f97316' },
    { label: 'Email Accts', val: '1,851', color: '#34d399' },
    { label: 'Warmup Sent', val: '951K', color: '#60a5fa' },
    { label: 'Agents', val: '41', color: '#a78bfa' },
  ];
  statItems.forEach((s, i) => {
    nodes.push({
      id: `stat_${i}`, label: s.label, sub: s.val, x: statsX, y: statsY + i * 28,
      r: 4, color: s.color, type: 'stat',
    });
  });

  // Api Integration nodes
  const intX = 450, intY = 80;
  [
    { label: 'OpenClaw', status: 'live' },
    { label: 'PostgreSQL', status: 'live' },
    { label: 'SMTP Pool', status: 'warming' },
    { label: 'Google Cal', status: 'live' },
    { label: 'Apollo Import', status: '64%' },
  ].forEach((item, i) => {
    nodes.push({
      id: `int_${i}`, label: item.label, sub: item.status, x: intX, y: intY + i * 24,
      r: 3, color: COLORS.live, type: 'integration',
    });
  });
}

buildLayout();

// ─── Render ───
function toScreen(wx, wy) {
  return {
    x: W / 2 + (wx + panX) * scale,
    y: H / 2 + (wy + panY) * scale,
  };
}

function fromScreen(sx, sy) {
  return {
    x: (sx - W / 2) / scale - panX,
    y: (sy - H / 2) / scale - panY,
  };
}

function draw(timestamp) {
  try {
  // Smooth zoom/pan
  scale += (targetScale - scale) * 0.1;
  panX += (targetPanX - panX) * 0.1;
  panY += (targetPanY - panY) * 0.1;

  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.015)';
  ctx.lineWidth = 1;
  const gridSize = 50 * scale;
  const startX = (panX * scale % gridSize + gridSize) % gridSize;
  const startY = (panY * scale % gridSize + gridSize) % gridSize;
  for (let x = startX; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = startY; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Edges
  edges.forEach(e => {
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to) return;
    const fs = toScreen(from.x, from.y);
    const ts = toScreen(to.x, to.y);
    ctx.beginPath();
    ctx.moveTo(fs.x, fs.y);
    ctx.lineTo(ts.x, ts.y);
    ctx.strokeStyle = e.color ? e.color + '22' : 'rgba(255,255,255,0.06)';
    ctx.lineWidth = e.dash ? 0.5 : 1.5;
    if (e.dash) ctx.setLineDash([4, 6]);
    else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Nodes
  const sorted = [...nodes].sort((a, b) => b.r - a.r);
  sorted.forEach(n => {
    const s = toScreen(n.x, n.y);
    const r = n.r * scale;

    // Skip tiny nodes when zoomed out
    if (r < 0.5) return;

    if (n.type === 'person' || n.type === 'company') {
      // Glow
      const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 2.5);
      grd.addColorStop(0, n.color + '20');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(s.x, s.y, r * 2.5, 0, Math.PI * 2); ctx.fill();

      // Ring
      ctx.beginPath();
      ctx.arc(s.x, s.y, r + 2 * scale, 0, Math.PI * 2);
      ctx.strokeStyle = n.color + '99';
      ctx.lineWidth = n.level === 0 ? 2.5 * scale : 1.5 * scale;
      ctx.stroke();

      // Fill
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.color + '33';
      ctx.fill();
    } else if (n.type === 'division') {
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.color + '22';
      ctx.fill();
      ctx.strokeStyle = n.color + '66';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (n.type === 'detail' || n.type === 'stat' || n.type === 'integration') {
      // Pill shape - use fallback if roundRect not available
      const pw = 3 * scale, ph = 3 * scale;
      ctx.fillStyle = n.color + '18';
      ctx.beginPath();
      const rx = s.x - pw, ry = s.y - ph, rw = pw * 2, rh = ph * 2;
      if (ctx.roundRect) {
        ctx.roundRect(rx, ry, rw, rh, ph);
      } else {
        ctx.rect(rx, ry, rw, rh);
      }
      ctx.fill();
      ctx.strokeStyle = n.color + '33';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    } else if (n.type === 'agent') {
      r = Math.max(r, 2);
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fillStyle = n.color + '44';
      ctx.fill();
    }

    // Label
    if (r > 3) {
      ctx.fillStyle = n.level <= 1 ? '#fff' : n.color + 'bb';
      ctx.font = `${Math.max(9 * scale, 8)}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(n.label, s.x, s.y + r + 3 * scale);

      if (n.sub && r > 5) {
        ctx.fillStyle = '#666';
        ctx.font = `${Math.max(8 * scale, 7)}px system-ui`;
        ctx.fillText(n.sub, s.x, s.y + r + 14 * scale);
      }
    }
  });

  document.getElementById('zoom-pct').textContent = Math.round(scale * 100) + '%';
  document.getElementById('loading').style.display = 'none';
  requestAnimationFrame(draw);
// Fallback: force hide loading after 3s
setTimeout(function(){
  var ld = document.getElementById('loading');
  if (ld) ld.style.display = 'none';
}, 3000);

}

// ─── Zoom/Pan Controls ───
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  targetScale = Math.min(targetScale * 1.3, 3);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  targetScale = Math.max(targetScale / 1.3, 0.15);
});
document.getElementById('btn-fit').addEventListener('click', () => {
  targetScale = 0.7;
  targetPanX = 0;
  targetPanY = 120;
});

// Mouse wheel zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const world = fromScreen(e.clientX, e.clientY);
  targetScale = Math.max(0.15, Math.min(3, targetScale * factor));
  // Zoom toward cursor
  targetPanX = world.x - (e.clientX - W / 2) / targetScale;
  targetPanY = world.y - (e.clientY - H / 2) / targetScale;
}, { passive: false });

// Pan with mouse drag
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragPanX = targetPanX;
  dragPanY = targetPanY;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', (e) => {
  if (isDragging) {
    targetPanX = dragPanX + (e.clientX - dragStartX) / scale;
    targetPanY = dragPanY + (e.clientY - dragStartY) / scale;
  }
  // Hover detection
  hoveredNode = null;
  const world = fromScreen(e.clientX, e.clientY);
  for (const n of nodes) {
    const dx = world.x - n.x;
    const dy = world.y - n.y;
    const hitR = (n.r * 2) / scale;
    if (dx * dx + dy * dy < hitR * hitR) {
      hoveredNode = n;
      break;
    }
  }
  canvas.style.cursor = hoveredNode ? 'pointer' : isDragging ? 'grabbing' : 'grab';
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragPanX = targetPanX;
    dragPanY = targetPanY;
  } else if (e.touches.length === 2) {
    isDragging = false;
  }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    targetPanX = dragPanX + (e.touches[0].clientX - dragStartX) / scale;
    targetPanY = dragPanY + (e.touches[0].clientY - dragStartY) / scale;
  } else if (e.touches.length === 2) {
    // Pinch zoom
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (this._lastPinch) {
      targetScale = Math.max(0.15, Math.min(3, targetScale * (dist / this._lastPinch)));
    }
    this._lastPinch = dist;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isDragging = false; this._lastPinch = null; });

// Click for details
canvas.addEventListener('click', (e) => {
  if (Math.abs(e.clientX - dragStartX) > 3 || Math.abs(e.clientY - dragStartY) > 3) return;
  if (!hoveredNode || hoveredNode.type === 'detail' || hoveredNode.type === 'stat') return;

  // Zoom to node
  const s = toScreen(hoveredNode.x, hoveredNode.y);
  targetPanX = hoveredNode.x;
  targetPanY = hoveredNode.y;
  targetScale = Math.min(1.5, targetScale);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === '0') { targetScale = 1; targetPanX = 0; targetPanY = 0; }
  if (e.key === 'f') { targetScale = 0.7; targetPanX = 0; targetPanY = 120; }
});

// Start
canvas.style.cursor = 'grab';
requestAnimationFrame(draw);
// Fallback: force hide loading after 3s
setTimeout(function(){
  var ld = document.getElementById('loading');
  if (ld) ld.style.display = 'none';
}, 3000);

</script>
</body>
</html>
