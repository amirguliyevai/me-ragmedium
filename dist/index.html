<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:#05070d}
  ::-webkit-scrollbar{width:8px;height:8px} ::-webkit-scrollbar-thumb{background:rgba(24,224,255,.18);border-radius:0}
  ::-webkit-scrollbar-track{background:transparent}
  @keyframes acScan{0%{transform:translateY(0)}100%{transform:translateY(6px)}}
  @keyframes acBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes acFlow{0%{background-position:0 0}100%{background-position:28px 0}}
  @keyframes acPulse{0%,100%{box-shadow:0 0 0 0 rgba(24,224,255,.5)}50%{box-shadow:0 0 0 5px rgba(24,224,255,0)}}
  @keyframes acRise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes acDots{0%,20%{opacity:.2}50%{opacity:1}80%,100%{opacity:.2}}
  @keyframes acRing{0%{transform:scale(.65);opacity:.8}100%{transform:scale(1.25);opacity:0}}
  .dc-root{position:fixed;inset:0;height:100vh;display:grid;grid-template-columns:74px 1fr 360px;background:#05070d;color:#d6e2f0;font-family:'IBM Plex Sans',sans-serif;overflow:hidden}

  .glow-cyan{box-shadow:0 0 18px rgba(24,224,255,.25)}

  .text-glow-cyan{text-shadow:0 0 10px rgba(24,224,255,.5)}

  .border-magenta{border-color:#ff5cc8}
  .border-green{border-color:#2fe08a}
  .border-amber{border-color:#ffb020}
  .bg-cyan-08{background:rgba(24,224,255,.08)}

  .bg-green-08{background:rgba(47,224,138,.08)}

  .bg-cyan-12{background:rgba(24,224,255,.12)}

  .bg-green-16{background:rgba(47,224,138,.16)}

  .flow-bar{background:repeating-linear-gradient(90deg,#18e0ff 0 8px,#0fb0d8 8px 16px);background-size:28px 100%;animation:acFlow .8s linear infinite}
  .grid-bg{background-image:linear-gradient(rgba(24,224,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(24,224,255,.03) 1px,transparent 1px);background-size:40px 40px}

  .progress-fill{height:100%;background:linear-gradient(90deg,#18e0ff,#2fe08a);box-shadow:0 0 8px #18e0ff}

  .online-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;background:#18e0ff;border:2px solid #0b1019;animation:acPulse 1.6s infinite}

  .call-widget{position:fixed;right:24px;bottom:24px;z-index:120;width:372px;background:linear-gradient(180deg,#0b1626,#080b12);border:1px solid #2fe08a;box-shadow:0 18px 60px rgba(0,0,0,.6),0 0 40px rgba(47,224,138,.22);clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,0 100%)}

  .call-fab:hover{background:rgba(47,224,138,.2)}
  .nav-btn{appearance:none;cursor:pointer;width:58px;padding:8px 0 6px;margin-bottom:4px;background:transparent;border:0;border-left:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'IBM Plex Mono';transition:.15s}

  .table-header{display:grid;grid-template-columns:38px minmax(220px,1fr) 130px 70px 150px 130px;gap:10px;min-width:720px;padding:10px 16px;border-bottom:1px solid rgba(24,224,255,.14);font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.12em;color:#6b7a90;text-transform:uppercase}
  .table-row{cursor:pointer;display:grid;grid-template-columns:38px minmax(220px,1fr) 130px 70px 150px 130px;gap:10px;min-width:720px;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(120,140,170,.07);transition:.15s}
  .table-row:hover{background:rgba(24,224,255,.04)}
  .channel-btn{appearance:none;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 9px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.04em;border:1px solid}
  .unread-badge{min-width:14px;height:14px;padding:0 3px;background:#ff4d5e;color:#fff;font-size:8px;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .typing-dots span{animation:acDots 1.2s infinite}
  .typing-dots span:nth-child(2){animation-delay:.2s}
  .typing-dots span:nth-child(3){animation-delay:.4s}
  .vignette-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.35) 100%)}
  .grid-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;background-image:linear-gradient(rgba(24,224,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(24,224,255,.015) 1px,transparent 1px);background-size:60px 60px}
  .corner-accent{position:absolute;width:12px;height:12px;border-color:rgba(24,224,255,.25)}
  .corner-accent.br{bottom:0;right:0;border-bottom:1px solid;border-right:1px solid}

  .pulse-ring.delay-1{animation-delay:.8s}

  .status-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;background:rgba(11,16,25,.6);border:1px solid}

<body>
<div id="app">
  <div class="dc-root" id="dc-root">
    <div class="scan-overlay"></div>
    <div class="star-field" id="star-field"></div>
    <div class="grid-overlay"></div>
    <div class="vignette-overlay"></div>
    <!-- LEFT RAIL -->
    <div id="left-rail"></div>
    <!-- MAIN COLUMN -->
    <div id="main-col"></div>
    <!-- CHAT SIDEBAR -->
    <div id="chat-sidebar"></div>
  </div>
  <!-- OVERLAYS -->
  <div id="overlays"></div>
  <!-- CALL WIDGET (Voice calling — works in both desktop web and APK) -->
  <div id="call-widget"></div>
</div>
<!-- Voice call injector: floating FAB + WebSocket STT/TTS -->
<script src="/voice-call-ui.js"></script>
<script src="/voice-client.js"></script>
<script>
// ========== DC STANDALONE RENDERER ==========
(function(){
'use strict';

// ========== DATA LAYER ==========
var state = {
  agents: [],
  tasks: [],
  xFarmState: null,
  leadsData: null,
  kbStats: null,
  kbResults: null,
  tab: 'overview',
  placeholderName: '',
  openTaskId: null,
  openAgentId: null,
  chatCollapsed: false,
  channel: '#command',
  notifOpen: false,
  tick: 0,
  clock: '',
  feedIdx: 0,
  resolved: {},
  boardMode: 'kanban',
  agentsMode: 'grid',
  slackTab: 'agents',
  slackConv: 'dm:forge',
  callAgentId: null,
  callStart: 0
};

// ========== FETCH HELPERS ==========
async function fetchJSON(url) {
  try {
    var r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function fetchAll() {
  var results = await Promise.all([
    fetchJSON('/api/galaxy/agents'),
    fetchJSON('/api/galaxy/tasks'),
    fetchJSON('/proxy/content-empire/api/state'),
    fetchJSON('/api/leads/people'),
    fetchJSON('/proxy/kb/api/stats'),
    fetchJSON('/proxy/kb/api/search?q=dashboard')
  ]);
  state.agents = Array.isArray(results[0]) ? results[0] : [];
  state.tasks = Array.isArray(results[1]) ? results[1] : [];
  state.xFarmState = results[2] || null;
  state.leadsData = results[3] || null;
  state.kbStats = results[4] || null;
  state.kbResults = results[5] || null;
}

// ========== DERIVED DATA ==========
function getTeams() {
  var teams = {};
  state.agents.forEach(function(a) {
    var t = a.team || 'uncategorized';
    if (!teams[t]) teams[t] = { name: t, agents: [] };
    teams[t].agents.push(a);
  });
  return teams;
}

function getTeamColor(teamKey) {
  var colors = { eng:'#18e0ff', content:'#ff5cc8', cs:'#2fe08a', lead:'#ffb020', ops:'#9b7bff', leadership:'#ffb020' };
  return colors[teamKey] || '#9b7bff';
}

function getStatusColor(status) {
  if (status === 'active') return '#18e0ff';
  if (status === 'online') return '#2fe08a';
  if (status === 'idle') return '#ffb020';
  return '#6b7a90';
}

function getInitial(name) {
  return (name || '?').charAt(0).toUpperCase();
}

function getOnlineAgents() {
  return state.agents.filter(function(a){ return a.status === 'active' || a.status === 'online'; });
}

function getActiveTasks() {
  return state.tasks.filter(function(t){ return t.status === 'in_progress' || t.status === 'review'; });
}

function getKanbanCols() {
  var colDefs = [
    { key:'backlog', label:'BACKLOG', color:'#6b7a90' },
    { key:'todo', label:'TO DO', color:'#9b7bff' },
    { key:'in_progress', label:'IN PROGRESS', color:'#18e0ff' },
    { key:'review', label:'REVIEW', color:'#ff5cc8' },
    { key:'done', label:'DONE', color:'#2fe08a' }
  ];
  return colDefs.map(function(c){
    return { key:c.key, label:c.label, color:c.color,
      tasks: state.tasks.filter(function(t){ return t.status === c.key; }) };
  });
}

function getPendingApprovals() {
  return state.tasks.filter(function(t){ return t.status === 'in_progress' || t.status === 'review'; })
    .filter(function(t){ return t.title && t.title.indexOf('pend') >= 0 || false; });
}

function getActivityFromAPI() {
  var act = [];
  if (state.xFarmState) {
    var ops = state.xFarmState.ops || {};
    if (ops.activity && Array.isArray(ops.activity)) {
      act = ops.activity;
    }
  }
  return act;
}

function getMessagesFromAPI() {
  if (state.xFarmState) {
    return state.xFarmState.chat || state.xFarmState.messages || [];
  }
  return [];
}

function getStats() {
  var online = getOnlineAgents();
  var active = state.tasks.filter(function(t){ return t.status === 'in_progress'; });
  var review = state.tasks.filter(function(t){ return t.status === 'review'; });
  var teams = {};
  state.agents.forEach(function(a){ teams[a.team||'unknown'] = true; });
  return [
    { label:'AGENTS', value:String(online.length)+' / '+state.agents.length, c:'#2fe08a' },
    { label:'TASKS', value:String(active.length), c:'#18e0ff' },
    { label:'TEAMS', value:String(Object.keys(teams).length), c:'#ff5cc8' },
    { label:'PENDING', value:String(review.length), c:'#ffb020' },
    { label:'DONE TODAY', value:String(state.tasks.filter(function(t){ return t.status === 'done'; }).length), c:'#9b7bff' }
  ];
}

// ========== HTML HELPERS ==========
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === 'style') e.setAttribute('style', attrs[k]);
    else if (k === 'class') e.className = attrs[k];
    else if (k === 'text') e.textContent = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') {
      e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    } else e.setAttribute(k, attrs[k]);
  }
  if (children) children.forEach(function(c){
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function div(attrs, children) { return el('div', attrs, children); }
function span(attrs, children) { return el('span', attrs, children); }
function button(attrs, children) { return el('button', attrs, children); }

function clipStyle(size) {
  return 'clip-path:polygon(0 0,calc(100% - '+size+'px) 0,100% '+size+'px,100% 100%,0 100%)';
}

function avatar(init, color, size) {
  return span({
    style:'width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+
      ';color:#05070d;font-family:\'Chakra Petch\';font-weight:700;font-size:'+Math.floor(size*0.4)+
      'px;display:flex;align-items:center;justify-content:center;flex-shrink:0',
    text: getInitial(init)
  });
}

function sectionHeader(color, label) {
  return div({style:'display:flex;align-items:center;gap:8px;margin-bottom:10px'}, [
    span({style:'width:6px;height:14px;background:'+color+';box-shadow:0 0 10px '+color}),
    span({style:'font-family:\'Chakra Petch\';font-weight:600;font-size:13px;letter-spacing:.18em;color:#eaf6ff', text:label})
  ]);
}

function emptyState(msg, color) {
  color = color || '#5b6b82';
  return div({style:'padding:20px;text-align:center;color:'+color+';font-family:\'IBM Plex Mono\';font-size:11px;letter-spacing:.1em;text-transform:uppercase'}, [
    msg
  ]);
}

    var projColor = '#18e0ff';
    var priColor = t.priority === 'P0' ? '#ff4d5e' : t.priority === 'P1' ? '#ffb020' : '#18e0ff';
    var pct = t.progress || Math.floor(Math.random()*60)+20;
    var needsYou = t.status === 'review' && !state.resolved[t.id];
    var cardChildren = [];
    if (needsYou) {
      cardChildren.push(div({style:'position:absolute;top:0;right:0;display:flex;align-items:center;gap:4px;padding:3px 7px 3px 6px;background:#ff4d5e;color:#0a0a0a;font-family:\'IBM Plex Mono\';font-size:8px;font-weight:600;letter-spacing:.06em;clip-path:polygon(8px 0,100% 0,100% 100%,0 100%);animation:acPulse 1.8s infinite'}, ['✕ NEEDS YOU']));

  // Activity stream
  var actItems = activity.slice(0, 8).map(function(ev) {

      span({style:'font-family:\'IBM Plex Mono\';font-size:9px;color:#5b6b82', text:(ev.time||'now')+' ago'})

// ========== RENDER MESSAGES (AI SLACK) ==========
function renderMessages() {
  var messages = getMessagesFromAPI();
  var isAgents = state.slackTab === 'agents';
  var teams = getTeams();

  // Build slack agent list from teams
  var slackTeams = Object.keys(teams).map(function(tk) {
    var team = teams[tk];
    var color = getTeamColor(tk);
    return {
      name: team.name, color: color, count: team.agents.length,
      agents: team.agents.map(function(a) {
        return { id: a.id, name: a.name, role: a.role, color: a.color||color, status: a.status,
          statusC: getStatusColor(a.status), init: getInitial(a.name),
          conv: 'dm:'+a.id, active: state.slackConv === 'dm:'+a.id };
      })
    };
  });

  // Build groups from x-farm state
  var slackGroups = [];
  if (state.xFarmState && state.xFarmState.groups) {
    slackGroups = state.xFarmState.groups.map(function(g) {
      return { id: g.id||g.name, name: g.name, topic: g.topic||'', members: g.members||[],
        last: g.lastMessage||'', conv: 'grp:'+(g.id||g.name), active: state.slackConv === 'grp:'+(g.id||g.name) };
    });
  }

  // Current conversation
  var convHeader = 'Select a conversation';
  var convSub = '';
  var convColor = '#18e0ff';
  var convInit = '?';
  var convMsgs = [];

  if (state.slackConv.startsWith('dm:')) {
    var agentId = state.slackConv.slice(3);
    var agent = state.agents.find(function(a){ return a.id === agentId; });
    if (agent) {
      convHeader = agent.name;
      convSub = (agent.role||'') + ' · ' + (agent.team||'');
      convColor = agent.color || '#18e0ff';
      convInit = getInitial(agent.name);
      // Build DM messages from x-farm or task data
      if (state.xFarmState && state.xFarmState.dms && state.xFarmState.dms[agentId]) {
        convMsgs = state.xFarmState.dms[agentId];
      } else {
        convMsgs = [{ from: agentId, text: 'Standing by. No blockers on my end right now.', time: '08:30' }];
      }
    }
  } else if (state.slackConv.startsWith('grp:')) {
    var grpId = state.slackConv.slice(4);
    var grp = slackGroups.find(function(g){ return g.id === grpId; });
    if (grp) {
      convHeader = '#' + grp.name;
      convSub = grp.topic + ' · ' + grp.members.length + ' members';
      convColor = '#9b7bff';
      convInit = '#';
      if (state.xFarmState && state.xFarmState.groupMessages && state.xFarmState.groupMessages[grpId]) {
        convMsgs = state.xFarmState.groupMessages[grpId];
      }
    }
  }

  // Sidebar
  var sidebarItems = [];
  if (isAgents) {
    slackTeams.forEach(function(tm) {
      sidebarItems.push(div({style:'font-family:\'IBM Plex Mono\';font-size:9px;letter-spacing:.12em;color:'+tm.color+';text-transform:uppercase;padding:9px 8px 5px', text:tm.name+' · '+tm.count}));
      tm.agents.forEach(function(a) {
        sidebarItems.push(
          button({
            'data-conv': a.conv,
            onclick: function(e){ state.slackConv = e.currentTarget.dataset.conv; render(); },
            style:'appearance:none;cursor:pointer;width:100%;text-align:left;display:flex;gap:9px;align-items:center;padding:7px 8px;background:'+(a.active?'rgba(24,224,255,.1)':'transparent')+';border:0;border-left:2px solid '+(a.active?'#18e0ff':'transparent')
          }, [
            span({style:'position:relative'}, [
              avatar(a.init, a.color, 28),
              span({style:'position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:'+a.statusC+';border:2px solid #0a0e16'})
            ]),
            span({style:'flex:1;min-width:0'}, [
              div({style:'font-size:12.5px;font-weight:500;color:#eaf6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis', text:a.name}),
              div({style:'font-size:9.5px;color:#8a98ad;white-space:nowrap;overflow:hidden;text-overflow:ellipsis', text:a.role})
            ])
          ])
        );
      });
    });
  } else {
    slackGroups.forEach(function(g) {
      sidebarItems.push(
        button({
          'data-conv': g.conv,
          onclick: function(e){ state.slackConv = e.currentTarget.dataset.conv; render(); },
          style:'appearance:none;cursor:pointer;width:100%;text-align:left;display:flex;gap:10px;align-items:center;padding:9px 9px;background:'+(g.active?'rgba(24,224,255,.1)':'transparent')+';border:0;border-left:2px solid '+(g.active?'#9b7bff':'transparent')
        }, [
          span({style:'flex:0 0 30px;width:30px;height:30px;border:1px solid rgba(155,123,255,.4);color:#9b7bff;font-family:\'Chakra Petch\';font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center', text:'#'}),
          span({style:'flex:1;min-width:0'}, [

          ])
        ])
      );
    });
  }

  if (sidebarItems.length === 0) sidebarItems.push(emptyState('No conversations', '#18e0ff'));

  // Messages
  var msgDivs = convMsgs.map(function(m) {
    var fromAgent = state.agents.find(function(a){ return a.id === m.from; });
    var fromName = m.from === 'me' ? 'You' : (fromAgent ? fromAgent.name : (m.fromName||m.from||'Unknown'));
    var fromColor = m.from === 'me' ? '#ffb020' : (fromAgent ? fromAgent.color : (m.fromColor||'#18e0ff'));
    var fromInit = m.from === 'me' ? 'A' : (fromAgent ? getInitial(fromAgent.name) : (m.fromInit||'?'));
    return div({style:'display:flex;gap:10px;animation:acRise .3s ease'}, [
      avatar(fromInit, fromColor, 32),
      div({style:'flex:1;min-width:0'}, [
        div({style:'display:flex;align-items:baseline;gap:8px;margin-bottom:3px'}, [
          span({style:'font-size:13px;font-weight:600;color:'+fromColor, text:fromName}),
          span({style:'font-family:\'IBM Plex Mono\';font-size:9px;color:#5b6b82', text:(m.time||'')})
        ]),
        div({style:'font-size:13.5px;line-height:1.5;color:#c2d2e2', text:(m.text||'')})
      ])
    ]);
  });

  if (msgDivs.length === 0) msgDivs.push(emptyState('No messages', '#18e0ff'));

  return div({style:'display:grid;grid-template-columns:248px 1fr;gap:0;height:calc(100vh - 98px);border:1px solid rgba(24,224,255,.16);background:linear-gradient(180deg,#0a0e16,#070a10);'+clipStyle(16)}, [
    div({style:'display:flex;flex-direction:column;border-right:1px solid rgba(24,224,255,.12);min-height:0'}, [
      div({style:'padding:13px 14px 0'}, [
        div({style:'font-family:\'Chakra Petch\';font-weight:700;font-size:15px;letter-spacing:.06em;color:#eaf6ff'}, [
          document.createTextNode('AI '),
          span({style:'color:#ff8a3d', text:'SLACK'})
        ])
      ]),
      div({style:'display:flex;gap:0;padding:10px 14px 0'}, [
        button({
          'data-tab':'agents',
          onclick: function(e){ state.slackTab = e.currentTarget.dataset.tab; render(); },
          style:'appearance:none;cursor:pointer;flex:1;padding:7px 0;font-family:\'IBM Plex Mono\';font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:0;border-bottom:2px solid '+(isAgents?'#18e0ff':'transparent')+';color:'+(isAgents?'#18e0ff':'#6b7a90')
        }, ['Agents']),
        button({
          'data-tab':'groups',
          onclick: function(e){ state.slackTab = e.currentTarget.dataset.tab; render(); },
          style:'appearance:none;cursor:pointer;flex:1;padding:7px 0;font-family:\'IBM Plex Mono\';font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:0;border-bottom:2px solid '+(!isAgents?'#18e0ff':'transparent')+';color:'+(!isAgents?'#18e0ff':'#6b7a90')
        }, ['Groups'])
      ]),
      div({style:'flex:1;overflow-y:auto;padding:10px 8px'}, sidebarItems)
    ]),
    div({style:'display:flex;flex-direction:column;min-height:0;min-width:0'}, [
      div({style:'display:flex;align-items:center;gap:11px;padding:13px 18px;border-bottom:1px solid rgba(24,224,255,.12)'}, [
        avatar(convInit, convColor, 34),
        span({style:'flex:1;min-width:0'}, [
          div({style:'font-family:\'Chakra Petch\';font-weight:600;font-size:16px;color:#eaf6ff', text:convHeader}),
          div({style:'font-size:11px;color:#8a98ad', text:convSub})
        ]),
        button({
          'data-id': convInit,
          onclick: function(){ state.callAgentId = state.slackConv.split(':')[1]||'forge'; state.callStart = Date.now(); render(); },
          style:'appearance:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(47,224,138,.12);border:1px solid rgba(47,224,138,.45);color:#2fe08a;font-family:\'IBM Plex Mono\';font-size:10px;letter-spacing:.06em;text-transform:uppercase'
        }, ['◷ Call'])
      ]),
      div({style:'flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:15px'}, msgDivs),
      div({style:'padding:14px 18px;border-top:1px solid rgba(24,224,255,.12)'}, [
        div({style:'display:flex;align-items:center;gap:8px;padding:11px 14px;background:rgba(11,16,25,.8);border:1px solid rgba(120,140,170,.18)'}, [

function renderTodo() {
  var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><span style="width:6px;height:14px;background:#18e0ff;box-shadow:0 0 10px #18e0ff"></span><span style="font-family:Chakra Petch;font-weight:600;font-size:13px;letter-spacing:.18em;color:#eaf6ff">TODO</span></div>';
  html += '<div style="margin-bottom:16px;display:flex;gap:8px"><input id="todoInput" placeholder="Add a task..." style="flex:1;padding:10px 14px;background:#0b1019;border:1px solid rgba(24,224,255,.14);color:#eaf6ff;font-family:IBM Plex Mono;font-size:13px;outline:none"><button onclick="addTodo()" style="padding:10px 20px;background:rgba(24,224,255,.12);border:1px solid rgba(24,224,255,.3);color:#18e0ff;font-family:IBM Plex Mono;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer">ADD</button></div>';
  html += '<div id="todoList" style="display:flex;flex-direction:column;gap:8px">';
  if (!state.todos || state.todos.length === 0) {
    html += '<div style="text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:40px">No todos yet. Add one above.</div>';
  } else {
    state.todos.forEach(function(t, i) {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(180deg,#0b1019,#080b12);border:1px solid rgba(120,140,170,.13);border-left:3px solid ' + (t.priority === 'high' ? '#ff4d5e' : t.priority === 'medium' ? '#ffb020' : '#2fe08a') + '">';
      html += '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTodo(' + i + ')" style="accent-color:#18e0ff">';
      html += '<span style="flex:1;font-size:13px;color:' + (t.done ? '#5b6b82' : '#eaf6ff') + ';text-decoration:' + (t.done ? 'line-through' : 'none') + '">' + (t.text || t) + '</span>';
      html += '<span style="font-family:IBM Plex Mono;font-size:9px;color:#6b7a90;border:1px solid rgba(120,140,170,.2);padding:1px 6px">' + (t.priority || 'normal') + '</span>';
      html += '<button onclick="deleteTodo(' + i + ')" style="background:transparent;border:0;color:#ff4d5e;cursor:pointer;font-size:14px">✕</button>';
      html += '</div>';
    });
  }
  html += '</div>';
  return div({style:'height:100%'}, [html]);
}

// ========== RENDER CALENDAR ==========
function renderCalendar() {
  var now = new Date();
  var year = now.getFullYear(), month = now.getMonth();
  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var today = now.getDate();
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html += '<span style="font-family:Chakra Petch;font-weight:600;font-size:16px;letter-spacing:.12em;color:#eaf6ff">' + monthNames[month] + ' ' + year + '</span>';
  html += '<div style="display:flex;gap:8px"><span style="font-family:IBM Plex Mono;font-size:10px;color:#6b7a90">Today: ' + today + '/' + (month+1) + '/' + year + '</span></div></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  dayNames.forEach(function(d) { html += '<div style="text-align:center;font-family:IBM Plex Mono;font-size:10px;color:#6b7a90;padding:8px 0">' + d + '</div>'; });
  for (var i = 0; i < firstDay; i++) html += '<div></div>';
  for (var day = 1; day <= daysInMonth; day++) {
    var isToday = day === today;
    html += '<div style="text-align:center;padding:10px 0;font-family:IBM Plex Mono;font-size:12px;' + (isToday ? 'background:rgba(24,224,255,.15);color:#18e0ff;border:1px solid rgba(24,224,255,.4);font-weight:600' : 'color:#9fb3c8') + '">' + day + '</div>';
  }
  html += '</div>';
  return div({style:'height:100%'}, [html]);
}

function renderProjects() {
  var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><span style="width:6px;height:14px;background:#2fe08a;box-shadow:0 0 10px #2fe08a"></span><span style="font-family:Chakra Petch;font-weight:600;font-size:13px;letter-spacing:.18em;color:#eaf6ff">PROJECTS</span></div>';
  html += '<div id="projectsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';
  html += '<div style="text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:40px;grid-column:1/-1">Loading projects from API...</div>';
  html += '</div>';
  fetch("/api/galaxy/tasks").then(function(r){return r.json()}).then(function(tasks){
    if (!Array.isArray(tasks) || tasks.length === 0) {
      document.getElementById('projectsList').innerHTML = '<div style="text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:40px;grid-column:1/-1">No projects found</div>';
      return;
    }
    var projColors = { ragx:'#18e0ff', ragm:'#9b7bff', gradely:'#2fe08a', clienthub:'#ffb020', content:'#ff5cc8', brogen:'#7b9bff', rema:'#ff4d5e', lama:'#ffd60a' };
    var projects = {};
    tasks.forEach(function(t) {
      var p = t.project || 'general';
      if (!projects[p]) projects[p] = { name:p.toUpperCase(), color:projColors[p]||'#18e0ff', tasks:[], done:0 };
      projects[p].tasks.push(t);
      if (t.status === 'done') projects[p].done++;
    });
    var out = '';
    Object.keys(projects).forEach(function(k) {
      var p = projects[k];
      var pct = p.tasks.length > 0 ? Math.round(p.done / p.tasks.length * 100) : 0;
      out += '<div style="padding:16px;background:linear-gradient(180deg,#0b1019,#080b12);border:1px solid rgba(120,140,170,.13);border-left:3px solid ' + p.color + '">';
      out += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-family:Chakra Petch;font-weight:600;font-size:13px;color:' + p.color + '">' + p.name + '</span><span style="font-family:IBM Plex Mono;font-size:10px;color:#6b7a90">' + p.done + '/' + p.tasks.length + '</span></div>';
      out += '<div style="height:4px;background:rgba(120,140,170,.14);margin-bottom:8px"><div style="height:100%;width:' + pct + '%;background:' + p.color + '"></div></div>';
      out += '<div style="font-family:IBM Plex Mono;font-size:10px;color:#6b7a90">' + pct + '% complete</div></div>';
    });
    document.getElementById('projectsList').innerHTML = out;
  }).catch(function(){
    document.getElementById('projectsList').innerHTML = '<div style="text-align:center;color:#ff4d5e;font-family:IBM Plex Mono;font-size:12px;padding:40px;grid-column:1/-1">Failed to load projects</div>';
  });

}

// ========== RENDER DOCS ==========
function renderDocs() {
  var container = div({style:"height:100%;display:flex;flex-direction:column"});
  var headerHtml = "<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\"><span style=\"width:6px;height:14px;background:#2fe08a;box-shadow:0 0 10px #2fe08a\"></span><span style=\"font-family:Chakra Petch;font-weight:600;font-size:13px;letter-spacing:.18em;color:#eaf6ff\">FILE BROWSER</span><span id=\"fileCount\" style=\"margin-left:auto;font-family:IBM Plex Mono;font-size:9px;color:#5b6b82;letter-spacing:.08em\">SCANNING...</span></div>";
  var searchHtml = "<div style=\"display:flex;gap:8px;margin-bottom:10px\"><input id=\"docSearch\" placeholder=\"Search files...\" style=\"flex:1;padding:10px 14px;background:#0b1019;border:1px solid rgba(24,224,255,.14);color:#eaf6ff;font-family:IBM Plex Mono;font-size:13px;outline:none;box-sizing:border-box\"><select id=\"docTypeFilter\" onchange=\"filterFiles()\" style=\"padding:10px;background:#0b1019;border:1px solid rgba(24,224,255,.14);color:#9fb3c8;font-family:IBM Plex Mono;font-size:11px;outline:none\"><option value=\"\">ALL TYPES</option><option value=\"text\">TEXT</option><option value=\"code\">CODE</option><option value=\"image\">IMAGES</option><option value=\"data\">DATA</option></select></div>";
  var fileList = document.createElement("div");
  fileList.id = "fileList";
  fileList.style.cssText = "flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;min-height:0";
  var previewPanel = document.createElement("div");
  previewPanel.id = "filePreviewPanel";
  previewPanel.style.cssText = "display:none;flex:0 0 45%;border-top:1px solid rgba(47,224,138,.2);margin-top:8px;padding-top:10px;overflow-y:auto;min-height:0";
  var wrapper = document.createElement("div");
  wrapper.style.cssText = "display:flex;flex-direction:column;height:100%;min-height:0";
  wrapper.innerHTML = headerHtml + searchHtml;
  wrapper.appendChild(fileList);
  wrapper.appendChild(previewPanel);
  container.appendChild(wrapper);

  var allFiles = [];
  window._allFiles = allFiles;

  function fmtSize(b) {
    if (b < 1024) return b + "B";
    if (b < 1048576) return (b/1024).toFixed(1) + "KB";
    return (b/1048576).toFixed(1) + "MB";
  }
  function fmtDate(ts) {
    var d = new Date(ts * 1000);
    return d.toISOString().slice(0,16).replace("T"," ");
  }
  function typeColor(t) {
    if (t === "text") return "#2fe08a";
    if (t === "code") return "#18e0ff";
    if (t === "image") return "#ff5cc8";
    if (t === "data") return "#ffb020";
    return "#9b7bff";
  }
  function typeIcon(t) {
    if (t === "text") return "\u25C8";
    if (t === "code") return "\u27E8/\u27E9";
    if (t === "image") return "\u25A3";
    if (t === "data") return "\u22A1";
    return "\u25C7";
  }

  function renderFileList() {
    var q = (document.getElementById("docSearch") || {}).value || "";
    var tf = (document.getElementById("docTypeFilter") || {}).value || "";
    q = q.toLowerCase();
    var filtered = allFiles.filter(function(f) {
      if (tf && f.type !== tf) return false;
      if (q && f.name.toLowerCase().indexOf(q) < 0 && f.path.toLowerCase().indexOf(q) < 0) return false;
      return true;
    });
    var countEl = document.getElementById("fileCount");
    if (countEl) countEl.textContent = filtered.length + " FILES";
    if (filtered.length === 0) {
      fileList.innerHTML = "<div style=\"text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:30px\">No files found</div>";
      return;
    }
    var html = "";
    var max = Math.min(filtered.length, 500);
    for (var idx = 0; idx < max; idx++) {
      var f = filtered[idx];
      var tc = typeColor(f.type);
      var escPath = f.path.replace(/\"/g, "&quot;");
      html += '<div class="file-row" data-path="' + escPath + '" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(11,16,25,.6);border:1px solid rgba(120,140,170,.1);border-left:3px solid ' + tc + ';cursor:pointer;transition:.15s" onmouseover="this.style.borderColor=\'' + tc + '\'" onmouseout="this.style.borderColor=\'rgba(120,140,170,.1)\'">';
      html += '<span style="font-size:14px;color:' + tc + '">' + typeIcon(f.type) + '</span>';
      html += '<div style="flex:1;min-width:0"><div style="font-family:IBM Plex Mono;font-size:11.5px;color:#cfe6f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + f.name + '</div>';
      html += '<div style="font-family:IBM Plex Mono;font-size:9px;color:#5b6b82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + f.path + '</div></div>';
      html += '<span style="font-family:IBM Plex Mono;font-size:9px;color:#6b7a90;flex:0 0 auto">' + fmtSize(f.size) + '</span>';
      html += '<span style="font-family:IBM Plex Mono;font-size:9px;color:#4a5568;flex:0 0 70px;text-align:right">' + fmtDate(f.modified) + '</span>';
      html += '</div>';
    }
    if (filtered.length > 500) {
      html += '<div style="text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:11px;padding:10px">Showing 500 of ' + filtered.length + ' files - refine search</div>';
    }
    fileList.innerHTML = html;
    var rows = fileList.querySelectorAll(".file-row");
    for (var ri = 0; ri < rows.length; ri++) {
      (function() {
        var row = rows[ri];
        row.addEventListener("click", function() {
          var p = row.getAttribute("data-path");
          previewFile(p);
        });
      })();
    }
  }

  window.filterFiles = renderFileList;

  function previewFile(filePath) {
    previewPanel.style.display = "block";
    previewPanel.innerHTML = '<div style="padding:12px;font-family:IBM Plex Mono;font-size:11px;color:#2fe08a">Loading ' + filePath + '...</div>';
    var file = null;
    for (var i = 0; i < allFiles.length; i++) {
      if (allFiles[i].path === filePath) { file = allFiles[i]; break; }
    }
    if (!file) { previewPanel.innerHTML = '<div style="padding:12px;color:#ff4d5e">File not found</div>'; return; }
    if (file.type === "image") {
      previewPanel.innerHTML = '<div style="padding:10px 14px;border-bottom:1px solid rgba(47,224,138,.15);display:flex;justify-content:space-between;align-items:center"><span style="font-family:Chakra Petch;font-size:11px;letter-spacing:.12em;color:#2fe08a;text-transform:uppercase">' + file.name + '</span><span style="font-family:IBM Plex Mono;font-size:9px;color:#5b6b82">' + fmtSize(file.size) + '</span></div><div style="padding:12px;text-align:center"><img src="/api/files/content?path=' + encodeURIComponent(filePath) + '" style="max-width:100%;max-height:60vh;border:1px solid rgba(47,224,138,.2)"/></div>';
      return;
    }
    fetchJSON("/api/files/content?path=" + encodeURIComponent(filePath)).then(function(resp) {
      if (!resp || resp.error) {
        previewPanel.innerHTML = '<div style="padding:12px;color:#ff4d5e">Error loading file</div>';
        return;
      }
      var text = resp.content || "";
      var ext = file.ext || "";
      var lines = text.split("\n");
      var displayLines = lines.slice(0, 300).join("\n");
      if (lines.length > 300) displayLines += "\n\n... (" + (lines.length - 300) + " more lines)";
      var escaped = displayLines.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      if (ext === ".md") {
        escaped = escaped.replace(/^### (.+)$/gm, '<span style="color:#2fe08a;font-weight:600">### $1</span>');
        escaped = escaped.replace(/^## (.+)$/gm, '<span style="color:#18e0ff;font-weight:600;font-size:13px">## $1</span>');
        escaped = escaped.replace(/^# (.+)$/gm, '<span style="color:#ffb020;font-weight:700;font-size:14px"># $1</span>');
        escaped = escaped.replace(/`([^`]+)`/g, '<code style="background:rgba(24,224,255,.08);color:#18e0ff;padding:0 3px">$1</code>');
      } else if (ext === ".json") {
        try { escaped = JSON.stringify(JSON.parse(text), null, 2).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); } catch(e) {}
      }
      previewPanel.innerHTML = '<div style="padding:10px 14px;border-bottom:1px solid rgba(47,224,138,.15);display:flex;justify-content:space-between;align-items:center"><span style="font-family:Chakra Petch;font-size:11px;letter-spacing:.12em;color:#2fe08a;text-transform:uppercase">' + file.name + '</span><span style="font-family:IBM Plex Mono;font-size:9px;color:#5b6b82">' + fmtSize(file.size) + ' | ' + lines.length + ' lines</span></div><pre style="padding:14px;font-family:IBM Plex Mono;font-size:11px;color:#c2d2e2;line-height:1.6;white-space:pre-wrap;word-break:break-word;margin:0">' + escaped + '</pre>';
    });
  }

  var searchTimer = null;
  setTimeout(function() {
    var si = document.getElementById("docSearch");
    if (si) {
      si.addEventListener("input", function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderFileList, 200);
      });
    }
  }, 100);

  fileList.innerHTML = '<div style="text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:30px"><span class="dots-loading">Scanning file system</span></div>';
  fetchJSON("/api/files").then(function(files) {
    if (!files || !Array.isArray(files)) {
      fileList.innerHTML = '<div style="text-align:center;color:#ff4d5e;font-family:IBM Plex Mono;font-size:12px;padding:30px">Failed to load files</div>';
      return;
    }
    allFiles = files.sort(function(a, b) { return b.modified - a.modified; });
    window._allFiles = allFiles;
    renderFileList();
  });

  return container;
}

  overlay.onclick = function(e) { if(e.target===overlay) overlay.remove(); };

    var content = panel.querySelector("div:last-child");
    content.innerHTML = "<p style=\"color:#9fb3c8;margin-bottom:12px\">"+name+"</p><p>This document provides comprehensive guidance on "+name.toLowerCase()+". All information is sourced from the knowledge base and kept up to date as systems evolve.</p><p style=\"color:#6b7a90;font-size:11px;margin-top:16px\">📄 Type: "+type.toUpperCase()+" | 📅 Last updated: Today</p>";
  }, 300);
}

// ========== RENDER GALLERY ==========
function renderGallery() {
  var container = div({style:"height:100%;display:flex;flex-direction:column"});
  var header = document.createElement("div");
  header.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-shrink:0";
  header.innerHTML = '<span style="width:6px;height:14px;background:#ff5cc8;box-shadow:0 0 10px #ff5cc8"></span><span style="font-family:Chakra Petch;font-weight:600;font-size:13px;letter-spacing:.18em;color:#eaf6ff">GALLERY</span>';
  var loadBtn = document.createElement("button");
  loadBtn.id = "galleryLoadBtn";
  loadBtn.style.cssText = "margin-left:auto;padding:5px 14px;background:rgba(24,224,255,.1);border:1px solid rgba(24,224,255,.3);color:#18e0ff;font-family:IBM Plex Mono;font-size:10px;cursor:pointer;letter-spacing:.08em";
  loadBtn.textContent = "LOAD MORE";
  header.appendChild(loadBtn);
  var grid = document.createElement("div");
  grid.id = "galleryGrid";
  grid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;flex:1;overflow-y:auto;padding-right:4px";
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:40px">Loading images...</div>';
  container.appendChild(header);
  container.appendChild(grid);

  var allMedia = [];
  var loadedCount = 0;
  var batchSize = 24;

  function renderBatch() {
    var end = Math.min(loadedCount + batchSize, allMedia.length);
    for (var i = loadedCount; i < end; i++) {
      var m = allMedia[i];
      var item = document.createElement("div");
      item.style.cssText = "aspect-ratio:1;background:#0b1019;border:1px solid rgba(120,140,170,.13);overflow:hidden;position:relative;border-radius:4px;cursor:pointer";
      if (m.type === "video") {
        var vid = document.createElement("video");
        vid.src = m.url;
        vid.style.cssText = "width:100%;height:100%;object-fit:cover";
        vid.preload = "metadata";
        vid.muted = true;
        item.appendChild(vid);
        var playIcon = document.createElement("div");
        playIcon.style.cssText = "position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;pointer-events:none";
        playIcon.textContent = "▶";
        item.appendChild(playIcon);
        item.addEventListener("click", (function(media){ return function(){ openLightbox(media); }; })(m));
      } else {
        var img = document.createElement("img");
        img.src = m.url;
        img.style.cssText = "width:100%;height:100%;object-fit:cover";
        img.loading = "lazy";
        img.addEventListener("click", (function(media){ return function(){ openLightbox(media); }; })(m));
        item.appendChild(img);
      }
      var label = document.createElement("div");
      label.style.cssText = "position:absolute;bottom:0;left:0;right:0;padding:5px 8px;background:linear-gradient(transparent,rgba(5,7,13,.92));font-family:IBM Plex Mono;font-size:8px;color:#9fb3c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis";
      label.textContent = m.name;
      item.appendChild(label);
      grid.appendChild(item);
    }
    loadedCount = end;
    if (loadedCount >= allMedia.length) {
      loadBtn.style.display = "none";
    } else {
      loadBtn.style.display = "inline-block";
      loadBtn.textContent = "LOAD MORE (" + (allMedia.length - loadedCount) + " remaining)";
    }
  }

  loadBtn.addEventListener("click", renderBatch);

  fetch("/api/media").then(function(r){return r.json()}).then(function(media){
    if (!media || media.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:12px;padding:40px">No images found</div>';
      loadBtn.style.display = "none";
      return;
    }
    allMedia = media;
    renderBatch();
  }).catch(function(){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ff4d5e;font-family:IBM Plex Mono;font-size:12px;padding:40px">Failed to load images</div>';
  });

  return container;
}

function openLightbox(m) {

  var content = document.createElement("div");

    vid.style.cssText = "max-width:90vw;max-height:90vh;display:block";

// ========== RENDER SKILLS ==========
// Loads /api/skills-catalog (data/skills.json) and renders a categorized
// skill browser with search filter. Mirrors the user's reference layout:
// header → search → category list with cards (external links + local badges).
var __skillsCatalog = null;  // cached after first load

function skillsColor(cat) {
  var palette = {
    'AI Skills': '#18e0ff',
    'Browser & Automation': '#ff5cc8',
    'Video & Media': '#2fe08a',
    'Finance & Data': '#ffb020',
    'Infrastructure': '#9b7bff',
    'Internal': '#ff4d5e',
    'Platforms': '#7b9bff',
    'Tools': '#ffd60a',
  };
  return palette[cat] || '#18e0ff';
}

async function loadSkillsCatalog() {
  if (__skillsCatalog) return __skillsCatalog;
  try {
    var r = await fetchJSON('/api/skills-catalog');
    __skillsCatalog = r && r.categories ? r : { categories: [], total: 0 };
  } catch (e) {
    __skillsCatalog = { categories: [], total: 0 };
  }
  return __skillsCatalog;
}

function renderSkillsBody() {
  // Returns an HTMLElement containing the full skills UI.
  var root = document.createElement('div');
  root.style.cssText = 'display:flex;flex-direction:column;height:100%;min-height:0';
  root.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
      '<span style="width:6px;height:14px;background:#2fe08a;box-shadow:0 0 10px #2fe08a"></span>' +
      '<span style="font-family:Chakra Petch;font-weight:600;font-size:13px;letter-spacing:.18em;color:#eaf6ff">SKILLS</span>' +
      '<span id="skillsTotalCount" style="margin-left:auto;font-family:IBM Plex Mono;font-size:9px;color:#5b6b82;letter-spacing:.08em">LOADING...</span>' +
    '</div>' +
    '<div style="position:relative;margin-bottom:10px">' +
      '<input id="skillsSearch" type="text" placeholder="Search skills..." ' +
      'style="width:100%;padding:8px 12px 8px 32px;background:#0b1019;border:1px solid rgba(24,224,255,.14);color:#eaf6ff;font-family:IBM Plex Mono;font-size:12px;outline:none;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);">' +
      '<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#5b6b82;font-size:13px;pointer-events:none">⌕</span>' +
    '</div>' +
    '<div style="display:flex;gap:10px;flex:1;min-height:0">' +
      '<div id="skillsSidebar" style="width:170px;flex-shrink:0;border:1px solid rgba(24,224,255,.1);background:#070b12;overflow-y:auto;padding:6px"></div>' +
      '<div id="skillsGrid" style="flex:1;overflow-y:auto;padding-right:4px"></div>' +
    '</div>';

  loadSkillsCatalog().then(function(cat) {
    var allSkills = cat.categories.reduce(function(a, c) {
      return a.concat((c.skills || []).map(function(s) { return Object.assign({}, s, { category: c.category }); }));
    }, []);
    document.getElementById('skillsTotalCount').textContent =
      cat.total + ' SKILLS · ' + cat.categories.length + ' CATEGORIES';

    // Sidebar: category list with counts + 'All' option
    var sidebar = document.getElementById('skillsSidebar');
    function buildSidebar(activeIdx) {
      var html = '<div data-cat-idx="-1" class="skills-cat" style="padding:8px 10px;cursor:pointer;font-family:Chakra Petch;font-weight:600;font-size:11px;letter-spacing:.12em;color:' + (activeIdx===-1?'#18e0ff':'#cfe6f5') + ';border-left:3px solid ' + (activeIdx===-1?'#18e0ff':'transparent') + ';background:' + (activeIdx===-1?'rgba(24,224,255,.06)':'transparent') + '">' +
        '<span>ALL CATEGORIES</span><span style="float:right;font-size:9px;color:#5b6b82">' + cat.total + '</span></div>';
      cat.categories.forEach(function(c, i) {
        var active = activeIdx === i;
        var col = skillsColor(c.category);
        html += '<div data-cat-idx="' + i + '" class="skills-cat" style="padding:8px 10px;cursor:pointer;font-family:Chakra Petch;font-weight:600;font-size:10.5px;letter-spacing:.1em;color:' + (active?col:'#cfe6f5') + ';border-left:3px solid ' + (active?col:'transparent') + ';background:' + (active?'rgba(120,140,170,.06)':'transparent') + ';text-transform:uppercase">' +
          '<span>' + esc(c.category) + '</span><span style="float:right;font-size:9px;color:#5b6b82">' + (c.skills||[]).length + '</span></div>';
      });

        el.onclick = function() {
          var idx = parseInt(this.getAttribute('data-cat-idx'), 10);
          buildSidebar(idx);

      sections.forEach(function(section) {

          if (!query) return true;

          return hay.indexOf(query) >= 0;
        });
        if (!matches.length && query) return;  // hide empty sections when searching
        var col = skillsColor(section.category);
        html += '<div style="margin-bottom:18px">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">' +
            '<span style="display:inline-block;width:5px;height:12px;background:' + col + ';box-shadow:0 0 6px ' + col + '"></span>' +
            '<span style="font-family:Chakra Petch;font-weight:600;font-size:11px;letter-spacing:.16em;color:' + col + ';text-transform:uppercase">' + esc(section.category) + '</span>' +
            '<span style="font-family:IBM Plex Mono;font-size:9px;color:#5b6b82">' + matches.length + ' skill' + (matches.length!==1?'s':'') + '</span>' +
          '</div>' +
          '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px">' +
            matches.map(function(s) {
              totalShown++;
              var isLocal = !!s.local;
              var hasLink = !!s.link;
              var cardBorder = isLocal ? 'rgba(255,77,94,.18)' : 'rgba(24,224,255,.14)';
              var cardBg = 'linear-gradient(180deg,#0b1019,#080b12)';
              var linkHtml;
              if (hasLink) {
                // External: link goes to GitHub with chevron
                linkHtml = '<a href="' + esc(s.link) + '" target="_blank" rel="noopener" ' +

                  '<span>→ ' + esc(s.link.replace(/^https?:\/\/(www\.)?github\.com\//, 'github.com/')) + '</span></a>';
              } else if (isLocal) {
                linkHtml = '<span style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-family:IBM Plex Mono;font-size:10px;color:#ff4d5e">' +
                  '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff4d5e;box-shadow:0 0 6px #ff4d5e"></span>' +
                  '<span>LOCAL · INTERNAL SKILL</span></span>';
              }
              return '<div style="padding:12px 14px;background:' + cardBg + ';border:1px solid ' + cardBorder + ';clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);transition:border-color .15s, transform .15s" ' +
                'onmouseenter="this.style.borderColor=\'' + col + '\';this.style.transform=\'translateY(-1px)\'" ' +
                'onmouseleave="this.style.borderColor=\'' + cardBorder + '\';this.style.transform=\'translateY(0)\'">' +
                '<div style="font-family:Chakra Petch;font-weight:600;font-size:13px;color:#eaf6ff;letter-spacing:.04em;margin-bottom:6px">' + esc(s.name) + '</div>' +
                (s.desc ? '<div style="font-family:IBM Plex Mono;font-size:10.5px;color:#9fb3c8;line-height:1.5">' + esc(s.desc) + '</div>' : '') +
                linkHtml +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>';
      });
      if (!totalShown) {
        html = '<div style="padding:30px 16px;text-align:center;color:#5b6b82;font-family:IBM Plex Mono;font-size:11px">No skills match &quot;' + esc(query) + '&quot;</div>';
      }
      grid.innerHTML = html;
    }

    buildSidebar(-1);
    renderGrid(-1);

    document.getElementById('skillsSearch').oninput = function() {
      renderGrid(parseInt(document.querySelector('.skills-cat[style*="border-left: 3px solid"]:not([data-cat-idx="-1"])')?.getAttribute('data-cat-idx') || '-1', 10));
    };
  });

  return root;
}

function renderSkills() {
  var container = div({style:'height:100%;min-height:0'}, []);
  container.appendChild(renderSkillsBody());
  return container;
}

// ========== HELPER: iframe ==========
function iframe(url) {
  var el = document.createElement('iframe');
  el.src = url;
  el.style.cssText = 'width:100%;height:100%;border:0;background:#05070d';
  el.setAttribute('allow', 'clipboard-read; clipboard-write');
  el.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-popups allow-modals');
  return el;
}

// ========== HELPER: div ==========
function div(props, children) {
  var el = document.createElement('div');
  if (props.style) el.style.cssText = props.style;
  if (props.text) el.textContent = props.text;
  if (props.className) el.className = props.className;
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (c) el.appendChild(typeof c === 'string' ? document.createRange().createContextualFragment(c) : c);
    });
  }
  return el;
}

// ========== MAIN RENDER ==========
function render() {
  renderLeftRail();

  var mainCol = document.getElementById('main-col');
  mainCol.style.cssText = 'grid-column:2;display:flex;flex-direction:column;min-width:0;overflow:hidden;z-index:10';
  mainCol.innerHTML = '';
  mainCol.appendChild(renderHeader());

  var content = div({style:'flex:1;overflow-y:auto;overflow-x:hidden;padding:18px'});

  if (state.tab === 'overview') content.appendChild(renderOverview());
  else if (state.tab === 'board') content.appendChild(renderBoard());
  else if (state.tab === 'agents') content.appendChild(renderAgents());
  else if (state.tab === 'activity') content.appendChild(renderActivity());
  else if (state.tab === 'messages') content.appendChild(renderMessages());
  else if (state.tab === 'galaxy') content.appendChild(renderGalaxy());
  else if (state.tab === 'placeholder') {
    var pn = state.placeholderName;
    if (pn === 'Todo') content.appendChild(renderTodo());
    else if (pn === 'Calendar') content.appendChild(renderCalendar());
    else if (pn === 'Projects') content.appendChild(renderProjects());
    else if (pn === 'RAGx') content.appendChild(renderRagx());
    else if (pn === 'Leads') content.appendChild(renderLeads());
    else if (pn === 'Content') content.appendChild(renderContent());
    else if (pn === 'Studio') content.appendChild(renderStudio());
    else if (pn === 'Desktop') content.appendChild(renderDesktop());
    else if (pn === 'Workspace') content.appendChild(renderWorkspace());
    else if (pn === 'Docs') content.appendChild(renderDocs());
    else if (pn === 'Gallery') content.appendChild(renderGallery());
    else if (pn === 'Skills') content.appendChild(renderSkills());
    else if (pn === 'Secrets') content.appendChild(renderSecrets());
    else if (pn === 'Knowledge') content.appendChild(renderKnowledge());
    else if (pn === 'Old') content.appendChild(renderOld());
    else content.appendChild(renderPlaceholder());
  }
  else content.appendChild(renderPlaceholder());

  mainCol.appendChild(content);

  // Chat sidebar
  var chatEl = document.getElementById('chat-sidebar');
  if (state.chatCollapsed) {
    chatEl.innerHTML = '';
    chatEl.style.display = 'none';
  } else {
    chatEl.style.display = '';
    var sidebar = renderChatSidebar();
    chatEl.innerHTML = '';
    if (sidebar) chatEl.appendChild(sidebar);
  }

  // Update root class
  var root = document.getElementById('dc-root');
  if (state.chatCollapsed) root.classList.add('feed-collapsed');
  else root.classList.remove('feed-collapsed');

  renderOverlays();
  renderCallWidget();
  renderFeedToggle();
  if (state.tab === 'galaxy') renderGalaxyScene();
}

// ========== RENDER FEED TOGGLE (collapsed state) ==========
function renderFeedToggle() {
  var existing = document.getElementById('feed-toggle-btn');
  if (!state.chatCollapsed) {
    if (existing) existing.remove();
    return;
  }
  if (existing) return;
  var notifCount = state.tasks.filter(function(t){ return t.status === 'review' && !state.resolved[t.id]; }).length;
  var btn = button({
    id: 'feed-toggle-btn',
    onclick: function(){ state.chatCollapsed = false; render(); },
    style: 'appearance:none;cursor:pointer;position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 9px;background:linear-gradient(180deg,#0c1320,#0a0f18);border:1px solid rgba(24,224,255,.35);border-right:0;color:#18e0ff;box-shadow:-6px 0 22px rgba(0,0,0,.4)'
  }, [
    span({style:'font-size:14px', text:'⟨'}),
    span({style:'writing-mode:vertical-rl;font-family:\'IBM Plex Mono\';font-size:10px;letter-spacing:.16em;text-transform:uppercase', text:'Live Feed'}),
    notifCount > 0 ? span({style:'min-width:16px;height:16px;background:#ff4d5e;color:#fff;font-family:\'IBM Plex Mono\';font-size:9px;border-radius:8px;display:flex;align-items:center;justify-content:center', text:String(notifCount)}) : null
  ].filter(Boolean));
  document.body.appendChild(btn);
}

// ========== ACTIONS ==========
function setTab(tab, name) {
  state.tab = tab;
  state.placeholderName = name || '';
  state.notifOpen = false;
  render();
}

function closeOverlay() {
  state.openTaskId = null;
  state.openAgentId = null;
  render();
}

function startCall() {
  var online = getOnlineAgents();
  state.callAgentId = online.length > 0 ? online[0].id : 'forge';
  state.callStart = Date.now();
  render();
}

function endCall() {
  state.callAgentId = null;
  render();
}

function approveTask(id) {
  state.resolved[id] = 'approved';
  render();
}

function denyTask(id) {
  state.resolved[id] = 'denied';
  render();
}

// Expose to global scope for inline onclick handlers
window.setTab = setTab;
window.closeOverlay = closeOverlay;
window.startCall = startCall;
window.endCall = endCall;
window.approveTask = approveTask;
window.denyTask = denyTask;

// ========== STAR FIELD ==========
function generateStars() {
  var sf = document.getElementById('star-field');
  if (!sf) return;
  var html = '';
  for (var i = 0; i < 80; i++) {
    var x = Math.random() * 100;
    var y = Math.random() * 100;
    var delay = Math.random() * 3;
    var opacity = 0.2 + Math.random() * 0.6;
    html += '<div class="star" style="left:'+x+'%;top:'+y+'%;animation-delay:'+delay+'s;opacity:'+opacity+'"></div>';
  }
  sf.innerHTML = html;
}

// ========== ENHANCED GALAXY ==========
function renderGalaxyScene() {
  var container = document.getElementById('galaxy-canvas-container');
  if (!container) return;
  var projects = {};
  state.tasks.forEach(function(t) {
    var p = t.project || 'General';
    if (!projects[p]) projects[p] = { name: p, count: 0, agents: [], active: 0 };
    projects[p].count++;
    if (t.assignee) {
      projects[p].agents.push(t.assignee);
      var ag = state.agents.find(function(a){ return a.id === t.assignee; });
      if (ag && ag.status === 'active') projects[p].active++;
    }
  });

  var colors = ['#18e0ff','#2fe0c8','#c77bff','#ff8a3d','#9be23d','#7b9bff','#ffb020','#ff5cc8'];
  var positions = [[26,30],[60,22],[78,46],[44,52],[18,64],[68,72],[86,70],[36,80]];
  var keys = Object.keys(projects);
  var html = '';

  // Orbital rings
  html += '<div class="galaxy-ring" style="width:300px;height:300px;border-color:rgba(24,224,255,.15);animation:acSpin 60s linear infinite"></div>';
  html += '<div class="galaxy-ring" style="width:420px;height:420px;border-color:rgba(255,92,200,.1);animation:acSpin 90s linear infinite reverse"></div>';
  html += '<div class="galaxy-ring" style="width:540px;height:540px;border-color:rgba(47,224,138,.08);animation:acSpin 120s linear infinite"></div>';
  html += '<div class="galaxy-ring" style="width:180px;height:180px;border-color:rgba(255,176,32,.12);animation:acSpin 40s linear infinite reverse"></div>';

  // Center orb
  html += '<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#18e0ff,#0a88aa);box-shadow:0 0 40px #18e0ff88,0 0 80px #18e0ff44"></div>';
  html += '<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:\'Chakra Petch\';font-weight:700;font-size:14px;color:#05070d;z-index:2">ax</div>';

  // Planets
  keys.slice(0, 8).forEach(function(pk, i) {
    var p = projects[pk];
    var color = colors[i % colors.length];
    var sz = 30 + p.count * 7;

// ========== CLOCK ==========
function updateClock() {
  var d = new Date();
  var p = function(n){ return String(n).padStart(2,'0'); };
  state.clock = p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
  var clockEl = document.getElementById('clock');
  if (clockEl) clockEl.textContent = state.clock;
}

// ========== INIT ==========
async function init() {
  updateClock();
  setInterval(updateClock, 1000);

  // Tick for animations
  setInterval(function(){ state.tick++; }, 1700);

  generateStars();
  await fetchAll();
  render();
  renderGalaxyScene();

  // Refresh data every 30s
  setInterval(async function(){
    await fetchAll();
    render();
  }, 30000);
}

init();

function loadTodos() {
  var todos = JSON.parse(localStorage.getItem('agent_todos') || '[]');
  var el = document.getElementById('todoList');
  if (!el) return;
  if (todos.length === 0) {
    el.innerHTML = '<div style="color:#6b7a90;font-family:IBM Plex Mono;font-size:12px;padding:20px;">No tasks yet. Add one above.</div>';
    return;
  }
  el.innerHTML = todos.map(function(t, i) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(180deg,#0b1019,#080b12);border:1px solid rgba(120,140,170,.13);' + (t.done ? 'opacity:.5;' : '') + '">' +
      '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTodo(' + i + ')" style="accent-color:#18e0ff;width:16px;height:16px;">' +
      '<span style="flex:1;font-size:13px;color:' + (t.done ? '#6b7a90' : '#eaf6ff') + ';text-decoration:' + (t.done ? 'line-through' : 'none') + ';">' + t.text + '</span>' +
      '<button onclick="deleteTodo(' + i + ')" style="color:#ff4d5e;background:none;border:0;cursor:pointer;font-size:14px;">x</button>' +
      '</div>';
  }).join('');
}

function addTodo() {
  var input = document.getElementById('todoInput');
  if (!input || !input.value.trim()) return;
  var todos = JSON.parse(localStorage.getItem('agent_todos') || '[]');
  todos.push({ text: input.value.trim(), done: false });
  localStorage.setItem('agent_todos', JSON.stringify(todos));
  input.value = '';
  loadTodos();
}

function toggleTodo(i) {
  var todos = JSON.parse(localStorage.getItem('agent_todos') || '[]');
  todos[i].done = !todos[i].done;
  localStorage.setItem('agent_todos', JSON.stringify(todos));
  loadTodos();
}

function deleteTodo(i) {
  var todos = JSON.parse(localStorage.getItem('agent_todos') || '[]');
  todos.splice(i, 1);
  localStorage.setItem('agent_todos', JSON.stringify(todos));
  loadTodos();
}
