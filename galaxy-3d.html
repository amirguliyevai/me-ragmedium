const W=window.innerWidth,H=window.innerHeight;
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000011,0.000015);

const camera=new THREE.PerspectiveCamera(55,W/H,1,600);
camera.position.set(0,30,120);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

const labelRenderer=new CSS2DRenderer();
labelRenderer.setSize(W,H);labelRenderer.domElement.style.position='fixed';
labelRenderer.domElement.style.top='0';labelRenderer.domElement.style.pointerEvents='none';
document.body.appendChild(labelRenderer.domElement);

// Orbit Controls
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.08;
controls.minDistance=15;controls.maxDistance=250;
controls.zoomSpeed=1.2;controls.rotateSpeed=0.5;
controls.target.set(0,0,0);controls.update();

// ─── Lighting ───
scene.add(new THREE.AmbientLight(0x111133,0.6));
const sun=new THREE.PointLight(0xff9944,80,200);sun.position.set(0,0,0);scene.add(sun);
const blueLight=new THREE.PointLight(0x4488ff,30,150);blueLight.position.set(40,20,-30);scene.add(blueLight);

// ─── Background Stars ───
const stars=new THREE.BufferGeometry();
const starPositions=new Float32Array(2000*3);

  starPositions[i+1]=r*Math.sin(phi)*Math.sin(theta);
  starPositions[i+2]=r*Math.cos(phi);
}
stars.setAttribute('position',new THREE.BufferAttribute(starPositions,3));
scene.add(new THREE.Points(stars,new THREE.PointsMaterial({color:0xffffff,size:0.15,transparent:true,opacity:0.5})));

// Grid

// ─── Fibonacci sphere positions ───
function fibSphere(n,radius){
  const pts=[];
  const phi=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<n;i++){
    const y=1-(i/(n-1))*2;
    const rAtY=Math.sqrt(1-y*y);
    const theta=phi*i;
    pts.push({x:Math.cos(theta)*rAtY*radius,y:y*radius,z:Math.sin(theta)*rAtY*radius});
  }
  return pts;
}

// ─── Build Scene ───
const projectMeshes={},shipGroups=[],shipLabels={},connectors=[];
const positions=fibSphere(PROJECTS.length,60); // Spread across sphere radius 60

PROJECTS.forEach((p,i)=>{

  const planet=new THREE.Mesh(geo,mat);
  planet.position.set(pos.x,pos.y,pos.z);
  planet.userData={isProject:true,projectId:p.id,project:p};

    new THREE.TorusGeometry(p.size*1.4,0.06,16,48),

// ─── Sub-Planets (proper planets near parent, fade in on zoom) ───
const subPlanetMeshes=[],subPlanetLabels=[],subPlanetConnectors=[];
PROJECTS.forEach(p=>{
  if(!p.children)return;
  const parentMesh=projectMeshes[p.id];
  if(!parentMesh)return;
  const pp=parentMesh.position;
  p.children.forEach((child,ci)=>{
    const childSize=1.4;
    // Ghost-like physical planet
    const childGeo=new THREE.SphereGeometry(childSize,24,24);
    const childMat=new THREE.MeshPhysicalMaterial({
      color:child.color,emissive:child.color,emissiveIntensity:0.3,
      roughness:0.2,metalness:0.1,transparent:true,opacity:0.15,
      clearcoat:0.1,clearcoatRoughness:0.3
    });
    const childMesh=new THREE.Mesh(childGeo,childMat);
    // Wireframe halo
    const childWire=new THREE.Mesh(
      new THREE.SphereGeometry(childSize*1.1,12,12),
      new THREE.MeshBasicMaterial({color:child.color,wireframe:true,transparent:true,opacity:0.05})
    );
    childMesh.add(childWire);
    // Position in a cluster around parent (not orbiting — fixed layout)
    const angle=(ci/p.children.length)*Math.PI*2;
    const dist=p.size*2.2+ci*0.5;
    childMesh.position.set(
      pp.x+Math.cos(angle)*dist,
      pp.y+(Math.sin(angle*1.7)*1.5),
      pp.z+Math.sin(angle)*dist
    );
    childMesh.userData={isProject:true,projectId:child.name.toLowerCase().replace(/\s/g,'-'),project:{name:child.name,desc:child.desc||'',tier:'child',color:child.color,agents:[]},parentId:p.id,basePos:childMesh.position.clone()};
    childMesh.visible=true;
    scene.add(childMesh);
    subPlanetMeshes.push(childMesh);
    // Label
    const lbl=document.createElement('div');
    lbl.textContent=child.name;
    lbl.style.cssText='color:rgba(255,255,255,0.3);font-size:7px;font-weight:500;letter-spacing:0.3px;text-shadow:0 0 6px rgba(0,0,0,0.8);white-space:nowrap;transition:opacity 0.5s;pointer-events:none';
    const labelObj=new CSS2DObject(lbl);
    labelObj.position.copy(childMesh.position);
    labelObj.position.y+=childSize+0.8;
    labelObj.userData={baseOpacity:0.3,childData:child};
    scene.add(labelObj);
    subPlanetLabels.push({mesh:childMesh,label:labelObj});
    // Connector line to parent
    const lineGeo=new THREE.BufferGeometry().setFromPoints([childMesh.position,pp]);
    const lineMat=new THREE.LineBasicMaterial({color:child.color,transparent:true,opacity:0.08,depthWrite:false});
    const line=new THREE.Line(lineGeo,lineMat);
    line.userData={child:childMesh,parent:parentMesh};
    scene.add(line);
    subPlanetConnectors.push(line);
  });
});

// ─── Agent Ships ───
function buildShip(agent,size,color){
  const g=new THREE.Group();
  const c=new THREE.Color(color);
  const m=new THREE.MeshPhysicalMaterial({color,emissive:color,emissiveIntensity:0.5,roughness:0.2,metalness:0.8});
  // Hull
  const hull=new THREE.Mesh(new THREE.CylinderGeometry(size*0.12,size*0.28,size*0.9,10),m);g.add(hull);
  // Nose
  const nose=new THREE.Mesh(new THREE.ConeGeometry(size*0.12,size*0.35,10),m);nose.position.y=size*0.62;g.add(nose);
  // Cockpit
  const cockpit=new THREE.Mesh(new THREE.SphereGeometry(size*0.14,8,8),
    new THREE.MeshPhysicalMaterial({color:0x88ccff,emissive:0x88ccff,emissiveIntensity:0.5,roughness:0.1,transparent:true,opacity:0.5}));
  cockpit.position.set(0,size*0.04,size*0.12);g.add(cockpit);
  // Wings
  for(let i=0;i<2;i++){
    const wing=new THREE.Mesh(new THREE.BoxGeometry(size*0.6,size*0.03,size*0.12),m);
    wing.position.set(i===0?-size*0.25:size*0.25,0,0);wing.rotation.z=i===0?0.15:-0.15;g.add(wing);
  }
  // Engine glow
  for(let i=0;i<2;i++){
    const glow=new THREE.Mesh(new THREE.SphereGeometry(size*0.08,6,6),
      new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false}));
    glow.position.set(i===0?size*0.3:-size*0.3,0,-size*0.06);g.add(glow);
  }
  return g;
}

function buildMothership(size,color){
  const g=new THREE.Group();
  const c=new THREE.Color(color);
  const m=new THREE.MeshPhysicalMaterial({color,emissive:color,emissiveIntensity:0.7,roughness:0.1,metalness:0.9,clearcoat:0.3});
  const body=new THREE.Mesh(new THREE.CylinderGeometry(size*0.25,size*0.4,size*0.6,14),m);g.add(body);
  const bridge=new THREE.Mesh(new THREE.CylinderGeometry(size*0.2,size*0.25,size*0.25,14),
    new THREE.MeshPhysicalMaterial({color:0xffdd88,emissive:0xffdd88,emissiveIntensity:0.6,roughness:0.1,transparent:true,opacity:0.6}));
  bridge.position.y=size*0.45;g.add(bridge);
  for(let i=0;i<3;i++){
    const r=new THREE.Mesh(new THREE.TorusGeometry(size*(0.5+i*0.15),0.03,8,24),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending,depthWrite:false}));
    r.rotation.x=Math.random()*Math.PI;r.userData={spin:0.1+Math.random()*0.2};g.add(r);
  }
  const core=new THREE.Mesh(new THREE.SphereGeometry(size*0.2,16,16),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.2,blending:THREE.AdditiveBlending,depthWrite:false}));
  core.position.y=size*0.08;g.add(core);
  return g;
}

AGENTS.forEach(a=>{
  const targetMesh=projectMeshes[a.target];
  if(!targetMesh)return;
  const tPos=targetMesh.position;
  const size=a.level===0?8:4.5;
  const group=a.level===0?buildMothership(size,a.color):buildShip(a,size,a.color);
  
  const angle=Math.random()*Math.PI*2;
  const orbitR=(PROJECTS.find(p=>p.id===a.target)?.size||3)*2.8+2;
  group.position.set(tPos.x+Math.cos(angle)*orbitR,tPos.y+(Math.random()-0.5)*2,tPos.z+Math.sin(angle)*orbitR);
  group.userData={agent:a,targetId:a.target,orbitRadius:orbitR,speed:0.15+Math.random()*0.2,angle,yOff:(Math.random()-0.5)*3,baseEmissive:0.5};
  scene.add(group);

  lb.textContent=`${a.name} · ${a.task}`;
  lb.style.cssText='color:rgba(255,255,255,0.7);font-size:8px;letter-spacing:0.5px;font-family:monospace;opacity:0;transition:opacity 0.2s;background:rgba(0,0,0,0.7);padding:2px 6px;border-radius:3px;white-space:nowrap;pointer-events:none';
  const lblObj=new CSS2DObject(lb);

  scene.add(lblObj);
  shipLabels[a.id]={obj:lblObj,el:lb,ship:group};
});

// ─── Connector Lines (between agents that share a project) ───
function updateConnectors(){
  connectors.forEach(c=>scene.remove(c));
  connectors.length=0;
  
  const projectAgents={};
  AGENTS.forEach(a=>{if(!projectAgents[a.target])projectAgents[a.target]=[];projectAgents[a.target].push(a);});
  
  Object.values(projectAgents).forEach(agentList=>{
    for(let i=0;i<agentList.length;i++){
      for(let j=i+1;j<agentList.length;j++){
        const s1=shipGroups.find(s=>s.userData.agent?.id===agentList[i].id);
        const s2=shipGroups.find(s=>s.userData.agent?.id===agentList[j].id);
        if(!s1||!s2)continue;
        const geo=new THREE.BufferGeometry().setFromPoints([s1.position,s2.position]);
        const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x4488ff,transparent:true,opacity:0.08,depthWrite:false}));
        line.userData={a:s1,b:s2};
        connectors.push(line);
        scene.add(line);
      }
    }
  });
}
updateConnectors();

  controls.target.lerp(target,0.5);

};
window.viewTier=function(tier){

// ─── Raycaster for clicks/hover ───
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hovered=null;

renderer.domElement.addEventListener('click',(e)=>{
  const iw=window.innerWidth,ih=window.innerHeight;
  mouse.x=(e.clientX/iw)*2-1;mouse.y=-(e.clientY/ih)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  // Check ships first (they're interactive)
  const shipHits=raycaster.intersectObjects(shipGroups,true);
  if(shipHits.length){
    let obj=shipHits[0].object;
    while(obj&&!obj.userData?.agent)obj=obj.parent;
    if(obj?.userData?.agent){focusShip(obj.userData.agent.id);return;}
  }
  
  // Then check planets + sub-planets
  const planetHits=raycaster.intersectObjects([...Object.values(projectMeshes),...subPlanetMeshes]);
  if(planetHits.length){
    const obj=planetHits[0].object;
    // Check if it's a sub-planet
    const spData=obj.userData;
    if(spData?.parentId){
      // Sub-planet clicked — show full detail
      const parentProj=PROJECTS.find(p=>p.id===spData.parentId);
      const childName=spData.project?.name||'Sub-module';
      const modal=document.getElementById('info-modal');
      document.getElementById('modal-content').innerHTML=`
        <div class="modal-title" style="color:#${new THREE.Color(spData.project.color).getHexString()}">${childName}</div>
        <div class="modal-sub">${spData.project.desc||'Sub-module of '+parentProj?.name} · <span style="color:rgba(255,255,255,0.4)">Parent: ${parentProj?.name||''}</span></div>
        <div class="modal-card"><h4>Description</h4><p style="font-size:11px;color:rgba(255,255,255,0.5)">${spData.project.desc||'Part of '+parentProj?.name+' ecosystem'}</p></div>
        <div class="modal-card"><h4>Connected to</h4><p style="font-size:11px;color:rgba(255,255,255,0.4)">🪐 ${parentProj?.name||''}</p></div>
        <div class="modal-card">
          <h4>Quick Actions</h4>
          <button class="top-btn" onclick="focusProject('${spData.parentId}')" style="margin:2px">🪐 Zoom to ${parentProj?.name||'Parent'}</button>
          <button class="top-btn" onclick="window.open('/slack','_blank')" style="margin:2px">💬 Discuss in Slack</button>
        </div>
      `;
      modal.classList.add('open');
      return;
    }
    const p=spData?.projectId;
    if(p){focusProject(p);return;}
  }
  
  closeModal();
});

renderer.domElement.addEventListener('pointermove',(e)=>{
  const iw=window.innerWidth,ih=window.innerHeight;
  mouse.x=(e.clientX/iw)*2-1;mouse.y=-(e.clientY/ih)*2+1;
  raycaster.setFromCamera(mouse,camera);
  
  const hits=raycaster.intersectObjects(shipGroups,true);
  let found=null;
  if(hits.length){
    let obj=hits[0].object;
    while(obj&&!obj.userData?.agent)obj=obj.parent;
    if(obj?.userData?.agent)found=obj.userData.agent.id;
  }
  
  if(hovered!==found){
    // Hide old
    if(hovered&&shipLabels[hovered])shipLabels[hovered].el.style.opacity='0';
    // Show new
    if(found&&shipLabels[found])shipLabels[found].el.style.opacity='1';
    hovered=found;
    renderer.domElement.style.cursor=found?'pointer':'grab';
  }
});

// ─── Status polling ───
let agentStatus={};
async function pollStatus(){
  try{
    const r=await fetch('/api/agents/status');
    const d=await r.json();
    // Update agent statuses from _cronJobs
    if(d._cronJobs){
      d._cronJobs.forEach(j=>{
        const n=j.name?.toLowerCase()||'';
        if(n.includes('cmo'))agentStatus.cmo=j.lastStatus==='ok'?'active':'resting';
        if(n.includes('cto'))agentStatus.cto=j.lastStatus==='ok'?'active':'resting';
        if(n.includes('cfo'))agentStatus.cfo=j.lastStatus==='ok'?'active':'resting';
      });
    }
    // Also mark agents as active if they have recent outputs
    if(d.outputs){
      Object.keys(d.outputs).forEach(agentId=>{
        const outs=d.outputs[agentId];
        if(outs&&outs.length>0){
          const lastOutput=outs[outs.length-1];
          const lastTime=lastOutput?.time?new Date(lastOutput.time):null;
          const isRecent=lastTime&&(Date.now()-lastTime.getTime())<3600000;
          if(isRecent)agentStatus[agentId]='active';
        }
      });
    }
    // Update ship emissive based on status
    shipGroups.forEach(s=>{
      const a=s.userData?.agent;
      if(!a)return;
      const st=agentStatus[a.id]||'active';
      s.traverse(c=>{
        if(c.material?.emissiveIntensity!==undefined){
          c.material.emissiveIntensity=st==='active'?0.8:st==='resting'?0.3:0.15;
        }
      });
    });
    // Update planet colors based on assigned agent statuses
    PROJECTS.forEach(p=>{
      const mesh=projectMeshes[p.id];
      if(!mesh)return;
      const pAgents=p.agents||[];
      if(pAgents.length===0)return;
      let activeCount=0,blockedCount=0;
      pAgents.forEach(aId=>{
        const st=agentStatus[aId]||'active';
        if(st==='active')activeCount++;
        if(st==='blocked'||st==='error')blockedCount++;
      });
      const ratio=activeCount/pAgents.length;
      let targetColor;
      if(blockedCount>0){
        targetColor=new THREE.Color(0xef4444);
      }else if(ratio>=0.5){
        targetColor=new THREE.Color(0x22c55e);
      }else if(ratio>0){
        targetColor=new THREE.Color(0xeab308);
      }else{
        targetColor=new THREE.Color(0x6b7280);
      }
      mesh.material.color.lerp(targetColor,0.15);
      mesh.material.emissive.lerp(targetColor,0.15);
    });
    // Update panel dots
    document.querySelectorAll('.ap-agent').forEach(el=>{
      const id=el.dataset.agent;
      const st=agentStatus[id]||'active';
      const dot=el.querySelector('.ap-dot');
      if(dot){
        dot.style.background=st==='active'?'#22c55e':st==='resting'?'#eab308':'#6b7280';
        dot.style.boxShadow=`0 0 6px ${st==='active'?'#22c55e':st==='resting'?'#eab308':'#6b7280'}`;
      }
    });
  }catch(e){}
}
setInterval(pollStatus,15000);
setTimeout(pollStatus,3000);

// ─── Animate ───
function animate(){
  requestAnimationFrame(animate);
  
  const t=performance.now()*0.001;
  
  // Orbit ships
  shipGroups.forEach(s=>{
    const ud=s.userData;
    if(!ud?.targetId)return;
    const targetMesh=projectMeshes[ud.targetId];
    if(!targetMesh||!targetMesh.visible){s.visible=false;return;}
    s.visible=true;
    ud.angle+=ud.speed*0.01;
    const tp=targetMesh.position;
    s.position.x=tp.x+Math.cos(ud.angle)*ud.orbitRadius;
    s.position.z=tp.z+Math.sin(ud.angle)*ud.orbitRadius;
    s.position.y=tp.y+Math.sin(ud.angle*1.3)*ud.yOff;
    s.rotation.y=ud.angle+Math.PI/2;
    s.rotation.z=Math.sin(t*0.5+ud.angle)*0.15;
    
    // Update label position
    const lbl=shipLabels[ud.agent?.id];
    if(lbl)lbl.obj.position.copy(s.position).add(new THREE.Vector3(0,ud.agent?.level===0?8:4,0));
  });
  
  // Spin rings
  projectMeshes && Object.values(projectMeshes).forEach(p=>{
    if(p.userData?.ring)p.userData.ring.rotation.z+=0.003;
  });
  
  // Sub-planet visibility (fade in when camera is close, update connectors)
  subPlanetMeshes.forEach((sm,i)=>{
    const parentMesh=projectMeshes[sm.userData.parentId];
    if(!parentMesh||!parentMesh.visible){sm.material.opacity=Math.max(0.05,sm.material.opacity-0.02);sm.visible=sm.material.opacity>0.06;}
    else{
      const dist=camera.position.distanceTo(parentMesh.position);
      const targetOpacity=dist<20?0.7:dist<40?0.7-((dist-20)/20)*0.55:0.15;
      sm.material.opacity+=(targetOpacity-sm.material.opacity)*0.03;
      sm.visible=sm.material.opacity>0.06;
    }
    // Update related label opacity
    if(subPlanetLabels[i])subPlanetLabels[i].label.element.style.opacity=sm.material.opacity;
    // Update connector line
    if(subPlanetConnectors[i]){
      const conn=subPlanetConnectors[i];
      conn.visible=sm.material.opacity>0.1;
      conn.material.opacity=sm.material.opacity*0.4;
      conn.geometry.dispose();
      conn.geometry=new THREE.BufferGeometry().setFromPoints([sm.position,parentMesh.position]);
    }
  });
  
  // Update connector lines
  connectors.forEach(c=>{
    if(c.userData?.a&&c.userData?.b){
      const pos=[c.userData.a.position,c.userData.b.position];
      c.geometry.dispose();
      c.geometry=new THREE.BufferGeometry().setFromPoints(pos);
    }
  });
  
  updateHandControl(0.016); // Hand gesture control (~60fps dt)
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
  
  // Hide loading
  const loader=document.getElementById('loading');
  if(loader&&t>2)loader.style.display='none';
  
  // Fade help hint
  const hint=document.getElementById('help-hint');
  if(hint&&t>8)hint.style.opacity=Math.max(0,parseFloat(hint.style.opacity||1)-0.003);
}

// ─── HAND TRACKING (Dual-Hand MediaPipe) ───
let handTracking=false,handLandmarksL=null,handLandmarksR=null;
let gestureState={left:'idle',right:'idle',lPinchHeld:0,rPinchHeld:0,lZoomHeld:0,rZoomHeld:0};
let prevHandLX=null,prevHandLY=null,prevHandRX=null,prevHandRY=null;
let prevLPinch=null,prevRPinch=null;

// Cursor DOM elements
let cursorL,cursorR;
function createCursors(){
  cursorL=document.createElement('div');cursorL.id='cursorL';
  cursorL.style.cssText='position:fixed;width:24px;height:24px;border-radius:50%;border:2px solid rgba(59,130,246,0.8);background:rgba(59,130,246,0.15);pointer-events:none;z-index:100;transform:translate(-50%,-50%);display:none;box-shadow:0 0 12px rgba(59,130,246,0.3);transition:width 0.15s,height 0.15s';
  cursorR=document.createElement('div');cursorR.id='cursorR';
  cursorR.style.cssText='position:fixed;width:24px;height:24px;border-radius:50%;border:2px solid rgba(249,115,22,0.8);background:rgba(249,115,22,0.15);pointer-events:none;z-index:100;transform:translate(-50%,-50%);display:none;box-shadow:0 0 12px rgba(249,115,22,0.3);transition:width 0.15s,height 0.15s';
  document.body.appendChild(cursorL);document.body.appendChild(cursorR);
}
createCursors();

animate();

window.toggleHandTracking=function(){
  handTracking=!handTracking;
  const btn=document.getElementById('hand-toggle');
  const hint=document.getElementById('help-hint');
  const cam=document.getElementById('cam-preview');
  if(handTracking){
    btn.textContent='🖐️ Hands ON';btn.classList.add('on');
    hint.textContent='✊ Pinch+drag=rotate · 👆 Point=fly toward · ✌️ Peace=zoom out · 👊 Fist=zoom in · 🤏 Both=rotate/zoom';
    cam.classList.add('on');
    startHandTracking();
  }else{
    btn.textContent='🖐️ Hands';btn.classList.remove('on');
    hint.textContent='🖱 Drag to rotate · Scroll to zoom · Click planets & ships';cam.classList.remove('on');
    stopHandTracking();controls.enabled=true;
    if(cursorL)cursorL.style.display='none';
    if(cursorR)cursorR.style.display='none';
  }
};

async function startHandTracking(){
  try{
    const[{HandLandmarker,FilesetResolver}]=await Promise.all([import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm')]);
    const vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
    const handLandmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',delegate:'GPU'},
      runningMode:'VIDEO',numHands:2
    });
    const video=document.getElementById('cam-video');
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    video.srcObject=stream;await video.play();
    controls.enabled=false;
    let lastTime=performance.now();
    async function detectFrame(){
      if(!handTracking)return;
      const now=performance.now();
      if(now-lastTime<33){requestAnimationFrame(detectFrame);return;}lastTime=now; // ~30fps for smoothness
      try{
        const results=handLandmarker.detectForVideo(video,performance.now());
        // Classify left/right hands by wrist x-position
        handLandmarksL=null;handLandmarksR=null;
        if(results.landmarks){
          for(let i=0;i<results.landmarks.length;i++){
            const lm=results.landmarks[i];
            const h=results.handedness?.[i];
            if(h&&h[0]?.categoryName==='Left')handLandmarksR=lm; // mirrored camera: Left=right hand
            else if(h&&h[0]?.categoryName==='Right')handLandmarksL=lm;
            else{
              // Fallback: wrist x determines side
              if(!handLandmarksR)handLandmarksR=lm;
              else if(!handLandmarksL)handLandmarksL=lm;
            }
          }
        }
      }catch(e){handLandmarksL=null;handLandmarksR=null;}
      requestAnimationFrame(detectFrame);
    }
    detectFrame();
  }catch(e){console.warn('Hand tracking:',e.message);document.getElementById('hand-toggle').textContent='🖐️ Camera denied';handTracking=false;}
}

function stopHandTracking(){
  const video=document.getElementById('cam-video');
  if(video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
  handLandmarksL=null;handLandmarksR=null;prevHandLX=null;prevHandLY=null;prevHandRX=null;prevHandRY=null;
}

function updateHandControl(dt){
  if(!handTracking)return;
  const W=window.innerWidth,H=window.innerHeight;
  
  // Track combined two-hand state
  let bothPinching=false,bothDelta=0,bothAvgDX=0,bothAvgDY=0;
  
  function processHand(lm,side,cursor){
    if(!lm)return;
    const thumb=lm[4],index=lm[8],middle=lm[12],ring=lm[16],pinky=lm[20],wrist=lm[0],indexMcp=lm[5],middleMcp=lm[9];
    // Mirror for front camera
    const wx=1-wrist.x,wy=wrist.y;
    // Pointing: index extended, others curled
    const indexCurl=Math.hypot(index.x-indexMcp.x,index.y-indexMcp.y,index.z-indexMcp.z);
    const middleCurl=Math.hypot(middle.x-middleMcp.x,middle.y-middleMcp.y,middle.z-middleMcp.z);
    const ringCurl=Math.hypot(ring.x-lm[13].x,ring.y-lm[13].y,ring.z-lm[13].z);
    const pinkyCurl=Math.hypot(pinky.x-lm[17].x,pinky.y-lm[17].y,pinky.z-lm[17].z);
    const pinchDist=Math.hypot(thumb.x-index.x,thumb.y-index.y,(thumb.z||0)-(index.z||0));
    const allCurled=indexCurl<0.1 && middleCurl<0.1 && ringCurl<0.1 && pinkyCurl<0.1;
    const indexExtended=indexCurl>0.1;
    const middleExtended=middleCurl>0.1;
    const allExtended=indexExtended && middleExtended && ringCurl>0.1 && pinkyCurl>0.1;
    const isPointing=indexExtended && middleCurl<0.1 && ringCurl<0.1 && pinkyCurl<0.1;
    const isPeace=indexExtended && middleExtended && ringCurl<0.1 && pinkyCurl<0.1;
    const isPinching=pinchDist<0.1;
    
    // Update cursor position + style
    if(cursor){
      cursor.style.display='block';
      cursor.style.left=(wx*W)+'px';
      cursor.style.top=(wy*H)+'px';
      if(isPinching){cursor.style.width='32px';cursor.style.height='32px';cursor.style.borderColor='rgba(34,197,94,0.8)';}
      else if(allCurled){cursor.style.width='18px';cursor.style.height='18px';cursor.style.borderColor='rgba(239,68,68,0.8)';}
      else if(isPeace){cursor.style.width='36px';cursor.style.height='36px';cursor.style.borderColor='rgba(168,85,247,0.8)';}
      else if(isPointing){cursor.style.width='28px';cursor.style.height='28px';cursor.style.borderColor='rgba(249,115,22,0.8)';}
      else{cursor.style.width='24px';cursor.style.height='24px';cursor.style.borderColor=side==='l'?'rgba(59,130,246,0.8)':'rgba(249,115,22,0.8)';}
    }
    
    // ── GESTURE: Pinch = GRAB/SELECT (priority over fist/palm) ──
    if(isPinching){
      const key=side+'PinchHeld';
      gestureState[key]=(gestureState[key]||0)+dt;
      // Long pinch (>0.2s) = GRAB + ROTATE
      if(gestureState[key]>0.2){
        const px=side==='l'?prevHandLX:prevHandRX;
        const py=side==='l'?prevHandLY:prevHandRY;
        if(px!==null&&py!==null){
          const dx=wx-px,dy=wy-py;
          if(Math.abs(dx)>0.001||Math.abs(dy)>0.001){
            const s=new THREE.Spherical().setFromVector3(camera.position.clone().sub(controls.target));
            s.theta-=dx*2.5;s.phi-=dy*2.5;
            s.phi=Math.max(0.05,Math.min(Math.PI-0.05,s.phi));
            camera.position.copy(controls.target).add(new THREE.Vector3().setFromSpherical(s));
            camera.lookAt(controls.target);
          }
        }
      }
      if(side==='l'){prevHandLX=wx;prevHandLY=wy;}
      else{prevHandRX=wx;prevHandRY=wy;}
      return;
    }
    // Not pinching — check if quick tap just released
    const pinchKey=side+'PinchHeld';
    const wasHeld=gestureState[pinchKey]||0;
    if(wasHeld>0.05 && wasHeld<0.3){
      performSelect(side==='l'?prevHandLX:prevHandRX, side==='l'?prevHandLY:prevHandRY);
    }
    gestureState[pinchKey]=0;
    if(side==='l'){prevHandLX=null;prevHandLY=null;}
    else{prevHandRX=null;prevHandRY=null;}
    
    // ── GESTURE: Fist ZOOM IN (more sensitive) ──
    if(allCurled){
      const key=side+'ZoomHeld';
      gestureState[key]=(gestureState[key]||0)+dt;
      const speed=120*(1+gestureState[key]*4);
      camera.position.multiplyScalar(1-speed*0.0005*dt*60);
      camera.position.clampLength(5,500);
      return;
    }else{gestureState[side+'ZoomHeld']=0;}
    
    // ── GESTURE: Peace sign ZOOM OUT ──
    if(isPeace){
      const key=side+'ZoomHeld';
      gestureState[key]=(gestureState[key]||0)+dt;
      const speed=80*(1+gestureState[key]*3);
      camera.position.multiplyScalar(1+speed*0.0003*dt*60);
      camera.position.clampLength(5,500);
      return;
    }else if(!allCurled && !isPinching){gestureState[side+'ZoomHeld']=0;}
    
    // ── GESTURE: Point = ZOOM IN toward finger direction (free 3D navigation) ──
    if(isPointing){
      // Finger direction vector (normalized, from wrist toward index tip)
      const fx=index.x-wrist.x,fy=index.y-wrist.y,fz=(index.z||0)-(wrist.z||0);
      const flen=Math.hypot(fx,fy,fz)||1;
      const fdx=fx/flen,fdy=fy/flen,fdz=fz/flen;
      // Move camera along finger direction (mirrored for front camera)
      const speed=0.8*dt*60;
      camera.position.x+=fdx*speed*3;
      camera.position.y-=fdy*speed*3;
      camera.position.z+=fdz*speed*3;
      camera.position.clampLength(4,500);
      // Also move look target slightly toward finger direction
      controls.target.x+=fdx*speed*2;
      controls.target.y-=fdy*speed*2;
      controls.target.z+=fdz*speed*2;
      camera.lookAt(controls.target);
      return;
    }
    
    // Reset position tracking if not in any gesture
    if(side==='l'){prevHandLX=null;prevHandLY=null;}
    else{prevHandRX=null;prevHandRY=null;}
  }
  
  // Process both hands individually first
  processHand(handLandmarksL,'l',cursorL);
  processHand(handLandmarksR,'r',cursorR);
  
  // ── COMBINED TWO-HAND GESTURES ──
  if(handLandmarksL&&handLandmarksR){
    const lw=handLandmarksL[0],rw=handLandmarksR[0];
    const lPinch=Math.hypot(handLandmarksL[4].x-handLandmarksL[8].x,handLandmarksL[4].y-handLandmarksL[8].y);
    const rPinch=Math.hypot(handLandmarksR[4].x-handLandmarksR[8].x,handLandmarksR[4].y-handLandmarksR[8].y);
    bothPinching=lPinch<0.07 && rPinch<0.07;
    
    if(bothPinching){
      const lwx=1-lw.x,lwy=lw.y,rwx=1-rw.x,rwy=rw.y;
      // Two-hand pinch ROTATE: both hands move same direction
      if(prevHandLX!==null&&prevHandLY!==null&&prevHandRX!==null&&prevHandRY!==null){
        const ldx=lwx-prevHandLX,ldy=lwy-prevHandLY;
        const rdx=rwx-prevHandRX,rdy=rwy-prevHandRY;
        // Average movement direction
        const avgDX=(ldx+rdx)/2,avgDY=(ldy+rdy)/2;
        if(Math.abs(avgDX)>0.002||Math.abs(avgDY)>0.002){
          const spherical=new THREE.Spherical().setFromVector3(camera.position.clone().sub(controls.target));
          spherical.theta-=avgDX*3.0;spherical.phi-=avgDY*3.0;
          spherical.phi=Math.max(0.05,Math.min(Math.PI-0.05,spherical.phi));
          camera.position.copy(controls.target).add(new THREE.Vector3().setFromSpherical(spherical));
          camera.lookAt(controls.target);
        }
      }
      prevHandLX=1-lw.x;prevHandLY=lw.y;prevHandRX=1-rw.x;prevHandRY=rw.y;
    }else{
      // Two-hand ZOOM: distance between hands
      const dist=Math.hypot((1-lw.x)-(1-rw.x),lw.y-rw.y);
      if(prevLPinch!==null){
        const delta=prevLPinch-dist;
        if(Math.abs(delta)>0.003){
          camera.position.multiplyScalar(1-delta*4);
          camera.position.clampLength(5,500);
        }
      }
      prevLPinch=dist;
    }
  }else{
    prevLPinch=null;
  }
  
  // Hide cursors if no landmarks
  if(!handLandmarksL&&cursorL)cursorL.style.display='none';
  if(!handLandmarksR&&cursorR)cursorR.style.display='none';
  
  // Update debug
  const gesEl=document.getElementById('hd-gesture');
  if(gesEl){
    const gL=handLandmarksL?(gestureState.lPinchHeld>0?'PINCH':gestureState.lZoomHeld>0?'ZOOM':'POINT'):'—';
    const gR=handLandmarksR?(gestureState.rPinchHeld>0?'PINCH':gestureState.rZoomHeld>0?'ZOOM':'POINT'):'—';
    gesEl.textContent=`L:${gL} R:${gR}${bothPinching?' BOTH':''}`;
  }
}

// Raycaster for pinch-to-select
function performSelect(wx,wy){
  mouse.x=wx*2-1;mouse.y=-(wy*2-1);
  raycaster.setFromCamera(mouse,camera);
  const shipHits=raycaster.intersectObjects(shipGroups,true);
  if(shipHits.length){
    let obj=shipHits[0].object;
    while(obj&&!obj.userData?.agent)obj=obj.parent;
    if(obj?.userData?.agent){focusShip(obj.userData.agent.id);return;}
  }
  const planetHits=raycaster.intersectObjects([...Object.values(projectMeshes),...subPlanetMeshes]);
  if(planetHits.length){
    const obj=planetHits[0].object;
    if(obj.userData?.parentId){
      // Sub-planet — trigger click on parent's coordinates
      const parentMesh=projectMeshes[obj.userData.parentId];
      if(parentMesh)focusProject(obj.userData.parentId);
      return;
    }
    const p=obj.userData?.projectId;
    if(p){focusProject(p);return;}
  }
}

// ─── Resize ───
window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);labelRenderer.setSize(w,h);
});

// ─── Voice Calling (Web Speech API) ───
let voiceListening=false,recognition=null,voiceTimer=null,voiceSeconds=0;
window.toggleVoice=function(){
  const btn=document.getElementById('voice-btn-fixed');
  const status=document.getElementById('voice-status');
  if(!btn)return;
  if(voiceListening){stopVoice();return;}
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){btn.textContent='🚫';btn.title='Voice not supported';return;}
  voiceListening=true;voiceSeconds=0;
  btn.classList.add('listening');btn.textContent=voiceSeconds+'s';
  status.style.display='block';status.textContent='🎤 Listening...';
  voiceTimer=setInterval(()=>{voiceSeconds++;btn.textContent=voiceSeconds+'s';},1000);
  recognition=new SpeechRecognition();
  recognition.continuous=true;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onstart=()=>{status.style.display='block';status.textContent='🎤 Listening...';};
  recognition.onresult=(e)=>{
    let transcript='';
    for(let i=0;i<e.results.length;i++)transcript+=e.results[i][0].transcript;
    status.textContent=transcript||'...';
    if(e.results[e.results.length-1].isFinal){
      status.textContent='✅ '+transcript;
      stopVoice();
      if(transcript.trim()){
        fetch('/api/commands',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text:'[Voice from Galaxy]: '+transcript,threadId:'galaxy-voice',send:true,modes:[]})}).then(r=>r.json()).then(d=>{
          status.textContent='✅ Sent: '+transcript.slice(0,50)+(transcript.length>50?'...':'')+' — done';
          setTimeout(()=>{status.style.display='none';},3000);
        }).catch(()=>{status.textContent='⚠️ Send failed';});
      }
    }
  };
  recognition.onerror=(e)=>{status.textContent='❌ '+e.error;status.style.color='#ef4444';stopVoice();};
  recognition.onend=()=>{if(voiceListening)stopVoice();};
  try{recognition.start();}catch(e){stopVoice();btn.textContent='🎤';}
};
function stopVoice(){
  voiceListening=false;
  clearInterval(voiceTimer);
  const btn=document.getElementById('voice-btn-fixed');
  const status=document.getElementById('voice-status');
  if(btn){btn.classList.remove('listening');btn.textContent='🎤';}
  if(status){status.style.display='none';status.style.color='#22c55e';}
  if(recognition){try{recognition.stop();}catch(e){}}
}
