// ─── VAULT KNOWLEDGE GRAPH (full data, interactive, stable) ───
let vaultNodes=[], vaultEdges=[], vaultAnim=null, vaultGraphData=null;
let vaultSearchTerm='', vaultFilterType='all';

function vaultSearchChange(val){ vaultSearchTerm=val.toLowerCase(); applyVaultFilters(); }
function vaultFilterChange(val){ vaultFilterType=val; applyVaultFilters(); }

function applyVaultFilters(){
  const canvas=$('vaultCanvas'); if(!canvas)return;
  // Rebuild visible nodes based on filter+search
  const all=vaultGraphData?.nodes||[];
  vaultNodes=all.filter(n=>{
    if(vaultFilterType!=='all' && n.type!==vaultFilterType) return false;
    if(vaultSearchTerm && !n.label.toLowerCase().includes(vaultSearchTerm) && !(n.meta?.keywords||[]).some(k=>String(k).toLowerCase().includes(vaultSearchTerm))) return false;
    return true;
  });
  // Filter edges to only connect visible nodes
  const visibleIds=new Set(vaultNodes.map(n=>n.id));
  vaultEdges=(vaultGraphData?.edges||[]).filter(e=>visibleIds.has(e.source)&&visibleIds.has(e.target));
  const stats=$('vaultStats');
  if(stats)stats.textContent=vaultNodes.length+'/'+all.length+' nodes';
}

// Node style config
const NODE_STYLES={
  chat:{color:'#58a6ff',shape:'circle',icon:'💬',label:'Chat'},
  business:{color:'#e06c75',shape:'hexagon',icon:'🏢',label:'Business'},
  document:{color:'#98c379',shape:'square',icon:'📄',label:'Doc'},
  account:{color:'#c678dd',shape:'diamond',icon:'🔗',label:'Account'},
  post:{color:'#d19a66',shape:'circle',icon:'📝',label:'Post'},
  persona:{color:'#56b4e9',shape:'triangle',icon:'👤',label:'Persona'},
  task:{color:'#3eb489',shape:'square',icon:'✅',label:'Task'}
};
const NODE_RADIUS={chat:7,business:14,document:9,account:8,post:6,persona:7,task:5};

function renderVaultGraph(){
  try{
    const canvas=$('vaultCanvas'); if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const wrap=canvas.parentElement;
    let W=wrap.clientWidth, H=wrap.clientHeight;
    if(W===0||H===0){ W=600; H=400; }
    canvas.width=W*2; canvas.height=H*2;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.scale(2,2);

    const loading=$('vaultLoading'); if(loading)loading.style.display='block';
    const empty=$('vaultEmpty'); if(empty)empty.style.display='none';
    const stats=$('vaultStats'); if(stats)stats.textContent='Loading…';

    if(vaultAnim){cancelAnimationFrame(vaultAnim);vaultAnim=null;}

    fetch('/api/vault/graph').then(r=>r.json()).then(data=>{
      try{
        if(loading)loading.style.display='none';
        if(data.ok && data.graph?.nodes?.length>0){
          vaultGraphData=data.graph;
          const all=data.graph.nodes;
          const cx=W/2, cy=H/2;
          const nodeCount=all.length;
          const layerR=Math.max(Math.min(W,H)*0.35, Math.sqrt(nodeCount)*25);
          all.forEach((n,i)=>{
            const angle=(i/all.length)*Math.PI*2 + (Math.random()-0.5)*0.3;
            const r=layerR*(0.4+Math.random()*0.6);
            n.x=cx+Math.cos(angle)*r;
            n.y=cy+Math.sin(angle)*r;
            n.vx=(Math.random()-0.5)*2;
            n.vy=(Math.random()-0.5)*2;
            n.radius=NODE_RADIUS[n.type]||7;
          });
          vaultGraphData.nodes=all;
          applyVaultFilters();
          if(vaultNodes.length>0 && typeof fitVaultView==='function') fitVaultView(W,H,vaultNodes);
          startForceSimulation(canvas,ctx,W,H);
        } else {
          if(empty)empty.style.display='block';
          if(stats)stats.textContent='0 nodes';
        }
      }catch(e2){
        if(loading)loading.textContent='Graph error: '+e2.message;
        if(stats)stats.textContent='Error';
        console.error('Vault graph render error:', e2);
      }
    }).catch(e=>{
      if(loading)loading.textContent='Network error: '+e.message;
      if(stats)stats.textContent='Error';
      console.error('Vault fetch error:', e);
    });
  }catch(e){
    const lm=$('vaultCanvasWrap');
    if(lm)lm.innerHTML='<div style="padding:20px;color:var(--red);font-size:12px">Vault init error: '+escHtml(e.message)+'</div>';
    console.error('Vault init error:', e);
  }
}

function startForceSimulation(canvas,ctx,W,H){
  if(vaultAnim){cancelAnimationFrame(vaultAnim);vaultAnim=null;}
  if(!vaultNodes || vaultNodes.length===0) return;

  // Force simulation with alpha decay (settles to equilibrium)
  let alpha=1.0;
  const alphaDecay=0.005;
  const alphaMin=0.001;

  // Expose zoom/pan to button controls via window
  window._vaultScale=1; window._vaultPanX=0; window._vaultPanY=0; window._vaultBounds=computeVaultBounds(); window._vaultBoundsCompute=computeVaultBounds;
  window._vaultBounds=computeVaultBounds();
  let hoverNode=null, selectedNode=null;
  let mx=0, my=0, isDragging=false, dragNode=null, dragOffX=0, dragOffY=0;
  let panX=0, panY=0, isPanning=false, panStartX=0, panStartY=0, panStartPX=0, panStartPY=0;
  let scale=1;

  let settled=false; // true = physics off, just draw
  let needRedraw=true; // flag for idle loop to redraw

  function physTick(){
    if(settled) return; // physics off
    const centerForce=0.002*alpha;
    const repForce=300*alpha;
    const edgeForce=0.0005*alpha;

    let maxSpeedSq=0;
    for(let i=0;i<vaultNodes.length;i++){
      const n=vaultNodes[i];
      if(n===dragNode) continue;
      for(let j=0;j<vaultNodes.length;j++){
        if(i===j) continue;
        const o=vaultNodes[j];
        let dx=n.x-o.x, dy=n.y-o.y;
        const dist=Math.max(Math.sqrt(dx*dx+dy*dy),1);
        const f=repForce/(dist*dist);
        n.vx+=dx*f; n.vy+=dy*f;
      }
      n.vx+=(W/2-n.x)*centerForce;
      n.vy+=(H/2-n.y)*centerForce;
      for(const e of vaultEdges){
        if(e.source===n.id || e.target===n.id){
          const other=n.id===e.source?e.target:e.source;
          const o=vaultNodes.find(x=>x.id===other);
          if(!o) continue;
          let dx=o.x-n.x, dy=o.y-n.y;
          const dist=Math.sqrt(dx*dx+dy*dy)||1;
          const targetDist=80+(n.radius||7)+(o.radius||7);
          const f=(dist-targetDist)*edgeForce;
          n.vx+=dx/dist*f; n.vy+=dy/dist*f;
        }
      }
      n.vx*=0.85; n.vy*=0.85;
      n.x+=n.vx; n.y+=n.vy;
      const margin=400;
      if(n.x<-margin)n.x=-margin+(n.x+margin)*0.5;
      if(n.x>W+margin)n.x=W+margin+(n.x-W-margin)*0.5;
      if(n.y<-margin)n.y=-margin+(n.y+margin)*0.5;
      if(n.y>H+margin)n.y=H+margin+(n.y-H-margin)*0.5;
      const spd=n.vx*n.vx+n.vy*n.vy;
      if(spd>maxSpeedSq)maxSpeedSq=spd;
    }

    alpha=Math.max(alphaMin,alpha-alphaDecay);

    // Settle when alpha is low AND speeds are near zero
    if(alpha<=alphaMin && maxSpeedSq<0.01 && !dragNode && !isDragging){
      settled=true;
      // Zero out remaining velocity
      for(const n of vaultNodes){ n.vx=0; n.vy=0; }
    }

    needRedraw=true;
  }

  function simulate(){
    physTick();

    // Sync zoom/pan from button controls
    if(window._vaultScale !== undefined && Math.abs(window._vaultScale-scale)>0.001){
      scale=window._vaultScale;
      panX=window._vaultPanX||0;
      panY=window._vaultPanY||0;
      if(typeof clampVaultPan==='function')clampVaultPan();
      needRedraw=true;
      const label=$('vaultZoomLabel');
      if(label)label.textContent='\uD83D\uDD0D '+(scale*100).toFixed(0)+'% \u00B7 '+vaultNodes.length+'/'+(vaultGraphData?.nodes?.length||vaultNodes.length)+' nodes';
    }
    clampVaultPan();
    window._vaultScale=scale;
    window._vaultPanX=panX;
    window._vaultPanY=panY;

    if(needRedraw){ draw(); needRedraw=false; }

    if(!settled || needRedraw){
      vaultAnim=requestAnimationFrame(simulate);
    } else {
      // Fully settled — stop anim loop, set up idle redraw on interaction only
      vaultAnim=null;
    }
  }

  // Wake sim on any interaction
  function wakeSim(){
    if(settled && !dragNode){
      alpha=Math.min(0.3,alpha+0.15);
      settled=false;
    }
    needRedraw=true;
    if(!vaultAnim){
      vaultAnim=requestAnimationFrame(simulate);
    }
  }

  function draw(){
    ctx.save();
    ctx.clearRect(0,0,W,H);
    ctx.translate(panX,panY);
    ctx.scale(scale,scale);

    // Draw edges
    if(vaultEdges.length>0){
      ctx.strokeStyle='rgba(88,166,255,0.12)';
      ctx.lineWidth=1;
      ctx.beginPath();
      vaultEdges.forEach(e=>{
        const s=vaultNodes.find(n=>n.id===e.source);
        const t=vaultNodes.find(n=>n.id===e.target);
        if(!s||!t) return;
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(t.x,t.y);
      });
      ctx.stroke();
    }

    // Draw nodes
    for(const n of vaultNodes){
      const isHover=n===hoverNode;
      const isSel=n===selectedNode;
      const style=NODE_STYLES[n.type]||{color:'#8b949e',shape:'circle'};
      const r=(isSel?n.radius+5:isHover?n.radius+3:n.radius)*1;
      const x=n.x, y=n.y;

      ctx.save();
      ctx.globalAlpha=n.type==='document'?0.75:0.9;
      ctx.beginPath();
      switch(style.shape){
        case 'hexagon':{
          for(let i=0;i<6;i++){
            const a=Math.PI/3*i-Math.PI/6;
            const hx=x+r*Math.cos(a), hy=y+r*Math.sin(a);
            i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
          }
          ctx.closePath(); break;
        }
        case 'square':{
          const s=r*1.2;
          ctx.rect(x-s,y-s,s*2,s*2); break;
        }
        case 'diamond':{
          ctx.moveTo(x,y-r*1.3);
          ctx.lineTo(x+r*1.3,y);
          ctx.lineTo(x,y+r*1.3);
          ctx.lineTo(x-r*1.3,y);
          ctx.closePath(); break;
        }
        case 'triangle':{
          ctx.moveTo(x,y-r*1.3);
          ctx.lineTo(x+r*1.3,y+r*1);
          ctx.lineTo(x-r*1.3,y+r*1);
          ctx.closePath(); break;
        }
        default:{
          ctx.arc(x,y,r,0,Math.PI*2);
        }
      }
      ctx.fillStyle=style.color;
      ctx.fill();
      ctx.globalAlpha=1;

      if(isSel){
        ctx.strokeStyle='#fff';
        ctx.lineWidth=2.5;
        ctx.stroke();
        // Glow
        ctx.shadowColor=style.color;
        ctx.shadowBlur=15;
        ctx.stroke();
        ctx.shadowBlur=0;
      } else if(isHover){
        ctx.strokeStyle='rgba(255,255,255,0.6)';
        ctx.lineWidth=1.5;
        ctx.stroke();
      }

      // Label
      if(r>5 || isHover || isSel){
        ctx.fillStyle='rgba(230,237,243,0.85)';
        ctx.font='9px system-ui,sans-serif';
        ctx.textAlign='center';
        const label=n.label.length>16?n.label.slice(0,15)+'…':n.label;
        ctx.fillText(label,x,y+r+12);
      }
      ctx.restore();
    }
    ctx.restore();

    // Draw minimap
    drawVaultMiniMap(ctx,W,H,panX,panY,scale);
  }

  // Mouse interaction
  function getMousePos(e){
    const rect=canvas.getBoundingClientRect();
    const ex=e.clientX||(e.touches?e.touches[0].clientX:0);
    const ey=e.clientY||(e.touches?e.touches[0].clientY:0);
    return {
      x:(ex-rect.left-panX)/scale,
      y:(ey-rect.top-panY)/scale
    };
  }

  canvas.onmousedown=function(e){
    const pos=getMousePos(e);
    // Check for node hit
    for(let i=vaultNodes.length-1;i>=0;i--){
      const n=vaultNodes[i];
      const dx=pos.x-n.x, dy=pos.y-n.y;
      const hitR=(n.radius||7)+8;
      if(dx*dx+dy*dy<hitR*hitR){
        isDragging=true; dragNode=n;
        dragOffX=pos.x-n.x; dragOffY=pos.y-n.y;
        selectedNode=n;
        showVaultDetail(n);
        return;
      }
    }
    // Start pan
    isPanning=true;
    panStartX=e.clientX; panStartY=e.clientY;
    panStartPX=panX; panStartPY=panY;
    needRedraw=true;
    canvas.style.cursor='grabbing';
  };

  canvas.onmousemove=function(e){
    const pos=getMousePos(e);
    if(isDragging && dragNode){
      dragNode.x=pos.x-dragOffX;
      dragNode.y=pos.y-dragOffY;
      wakeSim();
      return;
    }
    if(isPanning){
      panX=panStartPX+(e.clientX-panStartX);
      panY=panStartPY+(e.clientY-panStartY);
      clampVaultPan();
      needRedraw=true;
      if(!vaultAnim){ vaultAnim=requestAnimationFrame(simulate); }
      return;
    }
    // Hover detection
    mx=pos.x; my=pos.y;
    hoverNode=null;
    for(let i=vaultNodes.length-1;i>=0;i--){
      const n=vaultNodes[i];
      const dx=mx-n.x, dy=my-n.y;
      const hitR=(n.radius||7)+6;
      if(dx*dx+dy*dy<hitR*hitR){ hoverNode=n; break; }
    }
    canvas.style.cursor=hoverNode?'pointer':'grab';
  };

  canvas.onmouseup=function(){
    if(isDragging && dragNode){ wakeSim(); }
    isDragging=false; dragNode=null;
    isPanning=false;
    clampVaultPan();
    needRedraw=true;
    canvas.style.cursor='grab';
  };

  canvas.onmouseleave=function(){
    hoverNode=null; isDragging=false; dragNode=null;
    isPanning=false;
  };

  canvas.onclick=function(e){
    if(isPanning||isDragging) return;
    const pos=getMousePos(e);
    for(let i=vaultNodes.length-1;i>=0;i--){
      const n=vaultNodes[i];
      const dx=pos.x-n.x, dy=pos.y-n.y;
      const hitR=(n.radius||7)+6;
      if(dx*dx+dy*dy<hitR*hitR){
        selectedNode=n;
        showVaultDetail(n);
        return;
      }
    }
    selectedNode=null;
    closeVaultDetail();
  };

  // Touch support
  let touchStartX=0, touchStartY=0;
  canvas.ontouchstart=function(e){
    const t=e.touches[0];
    const pos=getMousePos(e);
    touchStartX=t.clientX; touchStartY=t.clientY;
    // Check node
    for(let i=vaultNodes.length-1;i>=0;i--){
      const n=vaultNodes[i];
      const dx=pos.x-n.x, dy=pos.y-n.y;
      const hitR=(n.radius||7)+12;
      if(dx*dx+dy*dy<hitR*hitR){
        selectedNode=n;
        showVaultDetail(n);
        return;
      }
    }
  };
  canvas.ontouchmove=function(e){
    e.preventDefault();
    if(e.touches.length===2){
      // Pinch zoom
      const t1=e.touches[0], t2=e.touches[1];
      const dist=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
      if(!canvas._pinchDist){ canvas._pinchDist=dist; return; }
      scale=Math.max(0.2,Math.min(5,scale*(dist/canvas._pinchDist)));
      canvas._pinchDist=dist;
      needRedraw=true;
      wakeSim();
    } else {
      const t=e.touches[0];
      panX+=t.clientX-touchStartX;
      panY+=t.clientY-touchStartY;
      clampVaultPan();
      touchStartX=t.clientX; touchStartY=t.clientY;
      needRedraw=true;
      wakeSim();
    }
  };
  canvas.ontouchend=function(){ canvas._pinchDist=null; };

  // Zoom with scroll wheel — zoom toward cursor
  canvas.onwheel=function(e){
    e.preventDefault();
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    const oldScale=scale;
    const delta=e.deltaY>0?0.88:1.14;
    scale=Math.max(0.15,Math.min(6,scale*delta));
    // Adjust pan so the point under the cursor stays fixed
    panX=mx-(mx-panX)*(scale/oldScale);
    panY=my-(my-panY)*(scale/oldScale);
    clampVaultPan();
    needRedraw=true;
    // Update zoom label
    const label=$('vaultZoomLabel');
    if(label)label.textContent='\uD83D\uDD0D '+(scale*100).toFixed(0)+'% \u00B7 '+vaultNodes.length+'/'+(vaultGraphData?.nodes?.length||vaultNodes.length)+' nodes';
    wakeSim();
  };

  const stats=$('vaultStats');
  if(stats)stats.textContent=vaultNodes.length+' nodes · '+(scale*100).toFixed(0)+'%';

  // Compute bounds of vault graph for pan clamping
  window._vaultBounds=computeVaultBounds();

  // Draw zoom level display in corner
  function drawZoomLabel(){
    const existing=$('vaultZoomLabel');
    if(existing)existing.textContent='🔍 '+(scale*100).toFixed(0)+'% · '+vaultNodes.length+'/'+(vaultGraphData?.nodes?.length||vaultNodes.length)+' nodes';
    else{
      const label=document.createElement('div');
      label.id='vaultZoomLabel';
      label.style.cssText='position:absolute;bottom:12px;left:12px;font-size:11px;color:var(--muted);background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:6px;pointer-events:none;z-index:5';
      label.textContent='🔍 '+(scale*100).toFixed(0)+'% · '+vaultNodes.length+'/'+(vaultGraphData?.nodes?.length||vaultNodes.length)+' nodes';
      const wrap=canvas.parentElement;
      if(wrap)wrap.appendChild(label);
    }
  }

  // Add zoom controls
  const zoomControlsId='vaultZoomControls';
  if(!$(zoomControlsId)){
    const wrap=canvas.parentElement;
    if(wrap){
      const ctrl=document.createElement('div');
      ctrl.id=zoomControlsId;
      ctrl.style.cssText='position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:5';
      ctrl.innerHTML=
        '<button onclick="vaultZoomIn()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center">+</button>'+
        '<button onclick="vaultZoomReset()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">⟲</button>'+
        '<button onclick="vaultZoomOut()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center">−</button>';
      wrap.appendChild(ctrl);
    }
  }
  drawZoomLabel();

  alpha=1.0;
  simulate();
}

function showVaultDetail(n){
  const panel=$('vaultDetail');
  const icon=$('vaultDetailIcon');
  const title=$('vaultDetailTitle');
  const body=$('vaultDetailBody');
  if(!panel||!body)return;

  panel.style.width='320px';
  panel.style.minWidth='320px';
  if(icon){
    const style=NODE_STYLES[n.type]||{icon:'📋'};
    icon.textContent=style.icon;
  }
  if(title)title.textContent=n.label;
  if(!body)return;

  const m=n.meta||{};
  let html='';

  // Type badge
  const st=NODE_STYLES[n.type];
  html+='<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">';
  html+='<span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:'+(st?.color||'#555')+'22;color:'+(st?.color||'#888')+'">'+(st?.label||n.type||'Node')+'</span>';
  if(n.type==='chat' && m.messages>0) html+='<span style="color:var(--muted);font-size:10px">'+m.messages+' messages</span>';
  if(n.type==='document') html+='<span style="color:var(--muted);font-size:10px">'+m.sections+' sections</span>';
  html+='</div>';

  switch(n.type){
    case 'chat':{
      if(m.lastPreview) html+='<div style="background:var(--bg);border-radius:6px;padding:8px;margin-bottom:8px;font-size:11px;color:var(--text);line-height:1.5">'+escHtml(m.lastPreview.slice(0,500))+'</div>';
      if(m.businessIds?.length>0) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Businesses: '+m.businessIds.join(', ')+'</div>';
      if(m.tags?.length>0) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Tags: '+m.tags.join(', ')+'</div>';
      if(m.lastTime) html+='<div style="font-size:10px;color:var(--dim)">Last activity: '+new Date(m.lastTime).toLocaleString()+'</div>';
      break;
    }
    case 'business':{
      html+='<div style="font-size:12px;margin-bottom:6px">Status: <strong>'+(m.status||'\-')+'</strong></div>';
      html+='<div style="font-size:12px;margin-bottom:6px">Stage: <strong>'+(m.stage||'\-')+'</strong></div>';
      if(m.description) html+='<div style="font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:6px">'+escHtml(m.description)+'</div>';
      if(m.tags?.length>0) html+='<div style="font-size:11px;color:var(--muted)">Tags: '+m.tags.join(', ')+'</div>';
      break;
    }
    case 'document':{
      if(m.path) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Path: '+escHtml(m.path)+'</div>';
      if(m.preview) html+='<div style="background:var(--bg);border-radius:6px;padding:8px;margin-bottom:8px;font-size:11px;color:var(--text);line-height:1.5">'+escHtml(m.preview.slice(0,500))+'</div>';
      if(m.keywords?.length>0) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Keywords: '+m.keywords.slice(0,15).map(k=>typeof k==='object'?k.word:k).join(', ')+(m.keywords.length>15?' +'+(m.keywords.length-15)+' more':'')+'</div>';
      if(m.size) html+='<div style="font-size:10px;color:var(--dim)">Size: '+(m.size/1024).toFixed(1)+' KB</div>';
      break;
    }
    case 'post':{
      html+='<div style="font-size:12px;margin-bottom:4px">Status: <strong>'+(m.status||'\-')+'</strong></div>';
      html+='<div style="font-size:12px;margin-bottom:4px">Type: <strong>'+(m.type||'\-')+'</strong></div>';
      if(m.platform) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Platform: '+escHtml(m.platform)+'</div>';
      if(m.impressions) html+='<div style="font-size:11px;color:var(--muted)">Impressions: '+m.impressions+' | Engagement: '+(m.engagement||0)+'</div>';
      break;
    }
    case 'account':{
      html+='<div style="font-size:12px;margin-bottom:4px">Platform: <strong>'+(m.platform||'\-')+'</strong></div>';
      if(m.handle) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Handle: @'+escHtml(m.handle)+'</div>';
      if(m.followers) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Followers: '+m.followers+'</div>';
      if(m.status) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Status: '+escHtml(m.status)+'</div>';
      break;
    }
    case 'persona':{
      html+='<div style="font-size:12px;margin-bottom:4px">Voice: <strong>'+(m.voice||'\-')+'</strong></div>';
      if(m.audience) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Audience: '+escHtml(m.audience)+'</div>';
      if(m.accounts?.length>0) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Accounts: '+m.accounts.join(', ')+'</div>';
      break;
    }
    case 'task':{
      html+='<div style="font-size:12px;margin-bottom:4px">Priority: <strong>'+(m.priority||'medium')+'</strong></div>';
      html+='<div style="font-size:12px;margin-bottom:4px">Date: <strong>'+(m.date||'\-')+'</strong></div>';
      if(m.project) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Project: '+escHtml(m.project)+'</div>';
      if(m.minutes) html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Est: '+m.minutes+' min</div>';
      break;
    }
    default:{
      html+='<div style="font-size:11px;color:var(--muted)">ID: '+escHtml(n.id)+'</div>';
    }
  }

  // Show connected edges (relationships)
  const relEdges=vaultEdges.filter(e=>e.source===n.id||e.target===n.id);
  if(relEdges.length>0){
    html+='<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">';
    html+='<div style="font-size:11px;font-weight:600;margin-bottom:4px">Connections ('+relEdges.length+'):</div>';
    for(const e of relEdges.slice(0,20)){
      const otherId=e.source===n.id?e.target:e.source;
      const other=vaultGraphData?.nodes?.find(x=>x.id===otherId);
      if(!other) continue;
      const os=NODE_STYLES[other.type]||{icon:'📋',color:'#888'};
      html+='<div style="display:flex;gap:6px;align-items:center;padding:3px 0;font-size:11px">';
      html+='<span style="font-size:10px">'+os.icon+'</span>';
      html+='<span style="color:var(--muted)">'+escHtml(other.label)+'</span>';
      if(e.label) html+='<span style="color:var(--dim);font-size:10px">→ '+escHtml(e.label)+'</span>';
      html+='</div>';
    }
    if(relEdges.length>20) html+='<div style="color:var(--dim);font-size:10px;margin-top:2px">+'+(relEdges.length-20)+' more</div>';
    html+='</div>';
  }

  body.innerHTML=html;
  // Smooth open the edge-connected nodes
  alpha=Math.max(alpha,0.5);
}

// Vault zoom controls
function vaultZoomIn(){
  const canvas=$('vaultCanvas');
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const mx=rect.width/2, my=rect.height/2;
  const oldScale=window._vaultScale||1;
  const newScale=Math.min(6,oldScale*1.3);
  const pX=window._vaultPanX||0, pY=window._vaultPanY||0;
  window._vaultScale=newScale;
  window._vaultPanX=mx-(mx-pX)*(newScale/oldScale);
  window._vaultPanY=my-(my-pY)*(newScale/oldScale);
  const label=$('vaultZoomLabel');
  if(label)label.textContent='\uD83D\uDD0D '+(newScale*100).toFixed(0)+'%';
}
function vaultZoomOut(){
  const canvas=$('vaultCanvas');
  if(!canvas)return;
  const rect=canvas.getBoundingClientRect();
  const mx=rect.width/2, my=rect.height/2;
  const oldScale=window._vaultScale||1;
  const newScale=Math.max(0.15,oldScale*0.77);
  const pX=window._vaultPanX||0, pY=window._vaultPanY||0;
  window._vaultScale=newScale;
  window._vaultPanX=mx-(mx-pX)*(newScale/oldScale);
  window._vaultPanY=my-(my-pY)*(newScale/oldScale);
  const label=$('vaultZoomLabel');
  if(label)label.textContent='\uD83D\uDD0D '+(newScale*100).toFixed(0)+'%';
}
function vaultZoomReset(){
  window._vaultScale=1;
  window._vaultPanX=0;
  window._vaultPanY=0;
  const label=$('vaultZoomLabel');
  if(label)label.textContent='\uD83D\uDD0D 100%';
}

function closeVaultDetail(){
  const panel=$('vaultDetail');
  if(panel) panel.style.width='0';
}

async function vaultRagSearch(query){
  if(!query||!query.trim()) return;
  const body=$('vaultDetailBody');
  if(body) body.innerHTML='<div style="color:var(--muted);font-size:12px">Searching data sources for <strong>'+escHtml(query)+'</strong>...</div>';
  try{
    const r=await fetch('/api/vault/rag-search',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({query})});
    const d=await r.json();
    if(d.ok&&d.results?.length>0){
      const panel=$('vaultDetail');
      if(panel){ panel.style.width='320px'; panel.style.minWidth='320px'; }
      const icon=$('vaultDetailIcon'); if(icon)icon.textContent='🔍';
      const title=$('vaultDetailTitle'); if(title)title.textContent='Search: '+query;
      if(body){
        let html='<div style="margin-bottom:8px;color:var(--muted);font-size:11px">Found '+d.results.length+' results</div>';

function computeVaultBounds(){
  if(!vaultNodes||vaultNodes.length===0) return {minX:-200,minY:-200,maxX:200,maxY:200};
  let b={minX:Infinity,minY:Infinity,maxX:-Infinity,maxY:-Infinity};
  for(const n of vaultNodes){
    const r=(n.radius||7)+20;
    if(n.x-r<b.minX)b.minX=n.x-r;if(n.y-r<b.minY)b.minY=n.y-r;
    if(n.x+r>b.maxX)b.maxX=n.x+r;if(n.y+r>b.maxY)b.maxY=n.y+r;
  }
  if(!isFinite(b.minX)){b.minX=-200;b.maxX=200;b.minY=-200;b.maxY=200;}
  const pad=Math.max((b.maxX-b.minX)*0.15,100);
  b.minX-=pad;b.minY-=pad;b.maxX+=pad;b.maxY+=pad;
  return b;
}

function clampVaultPan(){
  const c=document.getElementById('vaultCanvas');
  if(!c)return;
  const w=c.parentElement;
  const W=w.clientWidth,H=w.clientHeight;
  const s=window._vaultScale||1;
  const b=window._vaultBounds||computeVaultBounds();
  if(!b||!isFinite(b.minX))return;
  const viewW=W/s,viewH=H/s;
  const slackW=Math.max(viewW*0.3,(b.maxX-b.minX)*0.1);
  const slackH=Math.max(viewH*0.3,(b.maxY-b.minY)*0.1);
  const minPX=-(b.minX*s-slackW*s)+W;
  const maxPX=-(b.maxX*s+slackW*s)+W;
  const minPY=-(b.minY*s-slackH*s)+H;
  const maxPY=-(b.maxY*s+slackH*s)+H;
  const pX=window._vaultPanX||0,pY=window._vaultPanY||0;
  window._vaultPanX=Math.max(minPX,Math.min(maxPX,pX));
  window._vaultPanY=Math.max(minPY,Math.min(maxPY,pY));
}

function drawVaultMiniMap(ctx,W,H,panX,panY,scale){
  const b=window._vaultBounds;
  if(!b||!isFinite(b.minX))return;
  const mmW=120,mmH=80;
  const bw=b.maxX-b.minX,bh=b.maxY-b.minY;
  if(bw<=0||bh<=0)return;
  const mmScale=Math.min(mmW/bw,mmH/bh)*0.45;
  const ox=(mmW-bw*mmScale)/2,oy=(mmH-bh*mmScale)/2;
  const ml=W-mmW-8,mt=H-mmH-8;
  // bg
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(ml,mt,mmW,mmH,6);
  else ctx.rect(ml,mt,mmW,mmH);
  ctx.fill();
  // dots
  for(const n of vaultNodes||[]){
    const nx=ox+(n.x-b.minX)*mmScale;
    const ny=oy+(n.y-b.minY)*mmScale;
    const st=NODE_STYLES[n.type]||{color:'#8b949e'};
    ctx.fillStyle=st.color;
    ctx.globalAlpha=0.7;
    ctx.beginPath();
    ctx.arc(ml+nx,mt+ny,1.5,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  // viewport rect
  const vx=ox+(-panX/scale-b.minX)*mmScale;
  const vy=oy+(-panY/scale-b.minY)*mmScale;
  const vw=(W/scale)*mmScale,vh=(H/scale)*mmScale;
  if(vw>0&&vh>0){
    ctx.strokeStyle='rgba(255,255,255,0.5)';
    ctx.lineWidth=1.5;
    ctx.strokeRect(ml+vx,mt+vy,vw,vh);
  }
  ctx.restore();
}

// ─── Play notification chime (audio file + Web Audio fallback) ──
let _audioCtx=null;
let _chimeAudio=null;
function preloadChime(){
  if(typeof Audio==='undefined')return;
  _chimeAudio=new Audio('/audio/chime.mp3');
  _chimeAudio.volume=0.5;
}
function playNotificationChime(type){
  if(!notifPrefs.sound)return;
  // Try HTML5 Audio first
  if(typeof Audio!=='undefined'&&_chimeAudio){
    try{
      const a=_chimeAudio.cloneNode();
      a.volume=0.5;
      // Different sound for different types
      if(type==='task') a.src='/audio/chime-task.mp3';
      else a.src='/audio/chime.mp3';
      a.play().catch(function(){});
      return;
    }catch(e){}
  }
  // Fallback: Web Audio API two-tone
  try{
    if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const c=_audioCtx;
    const t=c.currentTime;
    const o=c.createOscillator();
    const g=c.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(880,t);
    o.frequency.setValueAtTime(1108.73,t+0.08);
    g.gain.setValueAtTime(0.3,t);
    g.gain.exponentialRampToValueAtTime(0.01,t+0.3);
    o.connect(g);
    g.connect(c.destination);
    o.start(t);
    o.stop(t+0.3);
  }catch(e){}
}

// ─── PWA Push Subscription ───────────────────────────────
let _pushSub=null;
let _vapidKey=null;
async function fetchVapidKey(){
  try{
    const r=await fetch('/api/notifications/vapid-key');
    const d=await r.json();
    if(d.ok)_vapidKey=d.publicKey;
  }catch(e){}
}
function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const b64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=window.atob(b64);
  const buf=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)buf[i]=raw.charCodeAt(i);
  return buf;
}
async function subscribePush(){
  if(!('serviceWorker' in navigator&&'PushManager' in window))return;
  try{
    const reg=await navigator.serviceWorker.ready;
    const existing=await reg.pushManager.getSubscription();
    if(existing){_pushSub=existing;updatePushStatus();return;}
    if(!_vapidKey)await fetchVapidKey();
    if(!_vapidKey)return;
    const sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(_vapidKey)
    });
    _pushSub=sub;
    await fetch('/api/notifications/subscribe',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({endpoint:sub.endpoint,keys:sub.toJSON().keys})
    });
    updatePushStatus();
  }catch(e){console.error('Push subscribe error:',e);}
}
async function unsubscribePush(){
  if(!_pushSub)return;
  try{
    const endpoint=_pushSub.endpoint;
    await _pushSub.unsubscribe();
    await fetch('/api/notifications/unsubscribe',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({endpoint})
    });
    _pushSub=null;
    updatePushStatus();
  }catch(e){console.error('Push unsubscribe error:',e);}
}
function updatePushStatus(){
  const el=$('pushSubStatus');
  if(!el)return;
  if(!('PushManager' in window)||!('serviceWorker' in navigator)){
    el.textContent='Unavailable';
    return;
  }
  if(!notifPrefs.push){el.textContent='Disabled';return;}
  if(_pushSub){el.textContent='✅ Active';return;}
  el.textContent='⏳ Pending...';
}
async function togglePushSub(){
  if(!notifPrefs.push){await unsubscribePush();return;}
  await subscribePush();
}

// ─── Init notification system on load ─────────────────────
function initNotifications(){
  loadNotifPrefs();
  preloadChime();
  if(notifPrefs.desktop)requestNotifPermission();
  fetchVapidKey();
  // Check existing push sub
  if('serviceWorker' in navigator&&'PushManager' in window&&notifPrefs.push){
    navigator.serviceWorker.ready.then(function(reg){
      reg.pushManager.getSubscription().then(function(sub){
        _pushSub=sub;
        updatePushStatus();
      });
    });
  }
  // Register service worker (only if none exists)
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      // Check if any existing sw is our new one
      const hasGoodSW=regs.some(function(r){return r.active&&r.active.scriptURL&&r.active.scriptURL.includes('sw.js');});
      // Unregister old empty ones first
      // Force update: always unregister old SW and register fresh
      // Prevents stale JavaScript cache issues
      for(const r of regs){
        if(r.active && r.active.scriptURL && r.active.scriptURL.includes('sw.js')){
          // Send update message to activate new SW immediately
          try { r.update(); } catch(e) {}
        } else {
          r.unregister();
        }
      }
      // Register fresh on each load to ensure latest code
      navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(e){console.error('SW reg error:',e);});
    });
  }
  // Prompt for notifications if never asked
  if('Notification' in window && Notification.permission==='default'){
    setTimeout(function(){
      const el=document.getElementById('notifPrefDesktop');
      if(el && !notifPrefs.desktop){
        const bell=$('chatBarNotifBell');
        if(bell) bell.style.boxShadow='0 0 8px var(--accent)';
        setTimeout(function(){ if(bell) bell.style.boxShadow=''; }, 5000);
      }
    }, 5000);
  }
}

async function load(skipPageRender){
  try{
    state=await api('/api/state');
    // Only restore server's activeThread if current thread doesn't exist anymore
    // (prevents polling from ripping user back to latest thread when browsing history)
    const currentValid = state.brain.threads?.find(t=>t.id===activeThread);
    if(!currentValid){
      if(state.brain?.activeThread && state.brain.threads?.find(t=>t.id===state.brain.activeThread)){
        activeThread = state.brain.activeThread;
      } else {
        // Fallback: use the thread with the most recent non-system message
        const threads = (state.brain?.threads||[]).filter(t=>(t.messages||[]).some(m=>m.role!=='system'));
        if(threads.length){
          threads.sort((a,b)=>{
            const aLast = (a.messages||[]).filter(m=>m.role!=='system').slice(-1)[0];
            const bLast = (b.messages||[]).filter(m=>m.role!=='system').slice(-1)[0];
            return (bLast?.at||'').localeCompare(aLast?.at||'');
          });
          activeThread = threads[0].id;
        } else {
          // No threads exist — create a fresh one for current page
          activeThread = 'thread_'+Date.now();
        }
      }
    }
  }catch(e){
    document.title='Dashboard offline';
    // Even on error, ensure we have a valid activeThread so renderChat doesn't fail
    if(!activeThread) activeThread = 'thread_'+Date.now();
    return;
  }
  navButtons();
  loadNotif();
  if(!skipPageRender){
    if(activePage==='home')renderHomeStats();
    else if(activePage==='todo')renderTodos();
    else if(activePage==='projects')renderProjects();
    else if(activePage==='project-detail')renderProjectDetail();
    else if(activePage==='calendar')renderCalendar();
    else if(activePage==='chat'){_lastActiveThread=null;renderChat();}
    else if(activePage==='board')renderBoard();
    else if(activePage==='vault'){renderVault();renderVaultGraph();}
    else if(activePage==='gallery'){renderGallery();}
    else if(activePage==='inbox'){renderInbox();}
    else if(activePage==='content'){switchContentTab('board');renderContentBoard();}
    else if(activePage==='skills'){renderSkills();}
    else if(activePage==='studio'){}

    else if(activePage==='goals'){renderGoals();}
    else if(activePage==='secrets'){renderSecrets();}
    else if(activePage==='approvals'){renderApprovals();}
    else if(activePage==='aiTeam'){renderAITeam();}
    else if(activePage==='code'){renderCodePage();}
    else if(activePage==='leads'){renderLeads();}

  }

let chatResizeActive=false,chatResizeStartY=0,chatResizeStartH=0;
function startChatResize(e){
  chatResizeActive=true;
  chatResizeStartY=e.touches?e.touches[0].clientY:e.clientY;
  const p=$('chatPanel');
  chatResizeStartH=p?p.offsetHeight:300;
  e.preventDefault();

  if(!chatResizeActive)return;
  const p=$('chatPanel');if(!p)return;
  const dy=chatResizeStartY-e.clientY;
  const nh=Math.min(Math.max(chatResizeStartH+dy,120),window.innerHeight*0.9);
  p.style.height=nh+'px';p.style.maxHeight='none';
});
document.addEventListener('touchmove',e=>{
  if(!chatResizeActive)return;
  const p=$('chatPanel');if(!p)return;
  const dy=chatResizeStartY-(e.touches[0]?.clientY||0);
  const nh=Math.min(Math.max(chatResizeStartH+dy,120),window.innerHeight*0.9);
  p.style.height=nh+'px';p.style.maxHeight='none';
},{passive:false});
document.addEventListener('mouseup',()=>{chatResizeActive=false;});

// Page-aware thread map — each page gets its own thread
const pageThreads={};
async function refreshChat(){
  // Visual feedback: spin the refresh button briefly
  const btn = document.querySelector('[title="Refresh chat view"]');
  if(btn){btn.classList.add('refreshing');btn.style.cursor='default';}
  try {
    if(window._chatLiveTimer){clearInterval(window._chatLiveTimer);window._chatLiveTimer=null;}
    // Preserve current active thread — don't navigate away on refresh
    const currentThread = activeThread;
    // Fetch latest state WITHOUT re-rendering (load() would override activeThread)
    await load(true);
    // Restore the thread we were on instead of jumping to latest
    if(currentThread && state.brain?.threads?.find(t=>t.id===currentThread)){
      activeThread = currentThread;
    } else if(state.brain?.threads?.length) {
      activeThread = state.brain.threads[0].id;
    }
    renderChat();
  } finally {
    if(btn){setTimeout(function(){btn.classList.remove('refreshing');btn.style.cursor='';},400);}
  }
}
async function deleteThread(id){
  if(!confirm('Delete this conversation?')) return;
  state.brain=state.brain||{};state.brain.threads=state.brain.threads||[];
  state.brain.threads=state.brain.threads.filter(t=>t.id!==id);
  if(activeThread===id) activeThread=(state.brain.threads[0]||{}).id||'';
  // Delete on server via proper endpoint (not full-state overwrite)
  fetch('/api/threads/'+id,{method:'DELETE'}).catch(()=>{});
  renderChatHist();renderChat();
  if(activePage==='code'){codeThreads=state.brain?.threads||[];switchCodeProject($('codeProject')?.value||'__all',false);}
}
function ensureFreshThread(){if(!state||!state.brain){state=state||{};state.brain={threads:[],activeThread:''};}};
  state.brain=state.brain||{};state.brain.threads=state.brain.threads||[];
  // Check if this page already has a thread
  const existingId=pageThreads[activePage];
  if(existingId){
    const t=state.brain.threads.find(x=>x.id===existingId);
    if(t){ activeThread=existingId; return t; }
  }
  // Create fresh thread for this page
  const tid='thread_'+Date.now();
  const pageLabel=tabs.find(t=>t[0]===activePage)?.[2]||activePage;
  const threadTitle=pageLabel+' chat '+(state.brain.threads.length+1);
  state.brain.threads.unshift({id:tid,title:threadTitle,messages:[],context:{businessIds:[],page:activePage}});
  activeThread=tid;
  pageThreads[activePage]=tid;
  // Persist empty thread to server immediately so load() doesn't override activeThread
  fetch('/api/threads',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:tid,title:threadTitle,messages:[],context:{businessIds:[],page:activePage}})}).catch(function(){});
  return state.brain.threads[0];
}

async function sendCodeCommand(){
  const input=$('codeInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  
  const project=$('codeProject').value;
  _activeCodeProject=project;
  
  // Use the thread the user is currently viewing (set by openCodeChat)
  let threadId=_activeCodeThread;
  
  if(!threadId){
    // No thread selected yet — create a new one via state
    const s=await api('/api/state');
    s.brain=s.brain||{};s.brain.threads=s.brain.threads||[];
    const tid='code-'+Date.now();
    s.brain.threads.unshift({id:tid,title:'⌘ Code: '+clip(text,40),messages:[],context:{businessIds:project==='__all'?[]:[project],page:'code'},scope:'Coding workspace chat'});
    // Use threads API (not full-state overwrite)
    fetch('/api/threads',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:tid,title:'⌘ Code: '+clip(text,40),context:{businessIds:project==='__all'?[]:[project],page:'code'},scope:'Coding workspace chat'})}).catch(()=>{});
    state=s;
    threadId=tid;
  }
  
  // Send the message via /api/commands
  await fetch('/api/commands',{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({text:text,threadId:threadId,send:true})
  });
  
  // Stay on code page — show the thread with Thinking… and poll for response
  await load();
  renderCodePage();
  openCodeChat(threadId);
  
  // Poll for AI response every 2s (up to 120s)
  let polls=0;
  const pollTimer=setInterval(async ()=>{
    polls++;
    if(polls>60){
      clearInterval(pollTimer);
      // Timeout — update local state to show error
      var fresh2=await fetch('/api/state');var sd2=await fresh2.json();state=sd2;
      var t2=state.brain?.threads?.find(function(x){return x.id===threadId;});
      if(t2&&(t2.messages||[]).some(function(m){return m.pending;})){
        var pIdx=(t2.messages||[])._findLastIdx(function(m){return m.role==='assistant'&&m.pending;});
        if(pIdx>=0)t2.messages.splice(pIdx,1);
        t2.messages.push({id:'sys_'+Date.now(),role:'system',text:'⚠️ Request timed out. Try using Telegram for real-time AI interaction.',at:new Date().toISOString(),threadId:threadId});
        // Persist timeout message via targeted endpoint
        fetch('/api/threads/'+threadId+'/messages',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({message:'⚠️ Request timed out.',localOnly:true})}).catch(()=>{});
      }
      openCodeChat(threadId);
      return;
    }
    try{
      const fresh=await api('/api/state');
      state=fresh;
      const t=fresh.brain?.threads?.find(x=>x.id===threadId);
      if(t){
        const msgs=t.messages||[];
        const hasPending=msgs.some(m=>m.pending);
        if(!hasPending){
          // AI responded — update the view
          clearInterval(pollTimer);
          openCodeChat(threadId);
          // Trigger notification
          loadNotif();
        }
      }
    }catch(e){}
  },2000);
}

async function renderSecrets(){
  try{
    const r=await fetch('/api/secrets');

    secretsData=d.secrets||[];
  }catch(e){secretsData=[];}
  const list=document.getElementById('secList');
  const stats=document.getElementById('secStats');
  if(!list)return;
  const q=(document.getElementById('secSearch')||{}).value||'';
  const filtered=secretsData.filter(s=>{
    if(!q)return true;
    const l=q.toLowerCase();
    return (s.project||'').toLowerCase().includes(l)||(s.key||'').toLowerCase().includes(l)||(s.notes||'').toLowerCase().includes(l);
  });
  if(stats)stats.textContent=filtered.length+'/'+secretsData.length+' secrets';
  
  // Group by project
  const groups={};
  for(const s of filtered){
    const p=s.project||'Uncategorized';
    if(!groups[p])groups[p]=[];
    groups[p].push(s);
  }
  const typeIcons={'api-key':'🔑','password':'🔒','token':'🪙','db':'🗄️','other':'📎'};
  
  if(!filtered.length){
    list.innerHTML='<div style="text-align:center;padding:40px;color:var(--dim);font-size:13px">🔐 No secrets saved yet.<br><br><button class="btn" onclick="showSecretForm()" style="background:var(--blue);color:#fff">＋ Add your first secret</button></div>';
    return;
  }
  
  list.innerHTML=Object.keys(groups).sort().map(project=>{
    const items=groups[project];
    return '<div style="margin-bottom:12px">'+
      '<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;margin-bottom:6px">'+
        '<span style="font-size:14px">📁</span>'+
        '<span style="font-size:13px;font-weight:600">'+esc(project)+'</span>'+
        '<span style="font-size:10px;color:var(--dim)">('+items.length+')</span>'+
      '</div>'+
      items.map(s=>{
        const icon=typeIcons[s.type||'other']||'📎';
        return '<div style="background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px">'+
          '<span style="font-size:16px;flex-shrink:0">'+icon+'</span>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:13px;font-weight:600">'+esc(s.key)+'</div>'+
            '<div style="font-size:10px;color:var(--muted);display:flex;gap:6px;align-items:center;margin-top:2px">'+
              '<span style="font-family:var(--mono);font-size:9px;color:var(--dim)">••••••••••</span>'+
              (s.notes?'<span>· '+esc(s.notes)+'</span>':'')+
            '</div>'+
          '</div>'+
          '<div style="display:flex;gap:4px;flex-shrink:0">'+
            '<button onclick="revealSecret(\''+s.id+'\')" title="Show" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px">👁️</button>'+
            '<button onclick="copySecret(\''+s.id+'\')" title="Copy" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;font-size:12px">📋</button>'+

function showSecretForm(secret){
  const overlay=document.getElementById('secFormOverlay');
  if(!overlay)return;
  const projSelect=document.getElementById('secProject');
  if(projSelect){
    const biz=state.businesses||[];
    const extras=['ragmedium','grademy','pripitch','syneticx','apify','openai','google','github','aws','linode','vps','misc'];
    const projects=[...new Set([...(biz.map(b=>b.name)),...extras,...(secretsData||[]).map(s=>s.project)])].filter(Boolean);
    projSelect.innerHTML='<option value="">Select project…</option>'+projects.map(p=>'<option value="'+esc(p)+'"'+(secret&&secret.project===p?' selected':'')+'>'+esc(p)+'</option>').join('');
  }

}

function toggleSecVisibility(){

}

async function saveSecret(){
  const project=document.getElementById('secProject')?.value||'';
  const key=document.getElementById('secKey')?.value?.trim()||'';
  const value=document.getElementById('secValue')?.value||'';
  const notes=document.getElementById('secNotes')?.value||'';
  const type=document.getElementById('secType')?.value||'other';
  if(!project||!key){alert('Project and key name are required.');return;}
  if(!secFormId&&!value){alert('Secret value is required for new secrets.');return;}
  const payload={project,key,value,notes,type};
  try{
    if(secFormId){
      // Update - only send value if changed
      if(!value)delete payload.value;
      await fetch('/api/secrets/'+secFormId,{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
    } else {
      await fetch('/api/secrets',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
    }
    closeSecretForm();
    state=await fetch('/api/state').then(r=>r.json());
    renderSecrets();
  }catch(e){alert('Error saving secret: '+e.message);}
}

async function revealSecret(id){
  try{
    const r=await fetch('/api/secrets/decrypt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();
    if(d.value){
      showSecretForm(secretsData.find(s=>s.id===id));
      document.getElementById('secValue').value=d.value;
    }
  }catch(e){alert('Error decrypting: '+e.message);}
}

async function copySecret(id){
  try{
    const r=await fetch('/api/secrets/decrypt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();
    if(d.value){
      await navigator.clipboard.writeText(d.value);
      // Show brief feedback
      const btn=event?.target;
      if(btn){const orig=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1500);}
    }
  }catch(e){alert('Error: '+e.message);}
}

async function deleteSecret(id){
  if(!confirm('Delete this secret? This cannot be undone.'))return;
  try{
    await fetch('/api/secrets/'+id,{method:'DELETE'});
    state=await fetch('/api/state').then(r=>r.json());
    renderSecrets();
  }catch(e){alert('Error deleting: '+e.message);}
}

async function renderAgentKanban(){
  const container = document.getElementById('agentKanban');
  if(!container) return;
  
  // Show loading skeleton
  document.querySelectorAll('.kanban-items').forEach(el => { el.innerHTML = '<div class="kb-empty">Loading…</div>'; });
  
  try {
    const res = await fetch('http://localhost:1707/api/tasks');
    const data = await res.json();
    const tasks = Array.isArray(data) ? data : (data.tasks || []);
    
    // Clear columns
    document.querySelectorAll('.kanban-items').forEach(el => { el.innerHTML = ''; });
    
    // Group tasks by status
    const cols = {};
    for(const t of tasks){
      const s = t.status || 'pending';
      if(!cols[s]) cols[s] = [];
      cols[s].push(t);
    }
    
    // Render each column
    const colMap = {pending:'pending', in_progress:'in_progress', needs_review:'needs_review', blocked:'blocked', done:'done', failed:'blocked', cancelled:'done'};
    for(const [status, items] of Object.entries(cols)){
      const targetCol = colMap[status] || 'pending';
      const colEl = document.querySelector('.kanban-col[data-col="'+targetCol+'"] .kanban-items');
      if(!colEl) continue;
      
      for(const t of items){
        const prioClass = t.priority <= 1 ? 'p-high' : t.priority <= 2 ? 'p-med' : 'p-low';
        const prioLabel = t.priority <= 1 ? 'HIGH' : t.priority <= 2 ? 'MED' : 'LOW';
        const card = document.createElement('div');
        card.className = 'kb-card';
        card.innerHTML = `
          <span class="kb-priority ${prioClass}">${prioLabel}</span>
          ${t.title}
          <div class="kb-agent">${t.agent_type || 'Unassigned'}</div>
        `;
        colEl.appendChild(card);
      }
      
      if(colEl.children.length === 0){
        colEl.innerHTML = '<div class="kb-empty">No tasks</div>';
      }
    }
    
    // Update counts
    document.querySelectorAll('.kanban-col').forEach(col => {
      const status = col.dataset.col;
      const count = col.querySelector('.kanban-items').children.length;
      const countEl = col.querySelector('.kanban-count');
      if(countEl) countEl.textContent = count;
    });
    
    // Update refresh time
    const rt = document.getElementById('agentRefreshTime');
    if(rt) rt.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e){
    console.error('[kanban]', e);
    document.querySelectorAll('.kanban-items').forEach(el => { el.innerHTML = '<div class="kb-empty" style="color:#f55">⚠️ Failed to load — jarvis-core unreachable</div>'; });
  }
}

// ── MarkItDown file converter ──
const CONVERT_API = '/convert/api/convert';
let convertResult = '';

async function handleDrop(e) {
  const file = e.dataTransfer.files[0];
  if (file) await convertFile(file);
}
async function handleFileInput(input) {
  const file = input.files[0];

async function convertFile(file) {
  document.getElementById('uploadPrompt').classList.add('hidden');
  document.getElementById('converting').classList.remove('hidden');
  document.getElementById('resultArea').classList.add('hidden');
  
  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch(CONVERT_API, { method: 'POST', body: form });
    const d = await r.json();
    
    document.getElementById('converting').classList.add('hidden');
    
    if (d.error) {
      alert('Error: ' + d.error);
      resetConvert();
      return;
    }
    
    convertResult = d.text_content || '';
    document.getElementById('resultFilename').textContent = d.filename + ' (' + (d.title || 'no title') + ')';
    document.getElementById('resultLength').textContent = convertResult.length + ' chars · ready for AI';
    document.getElementById('resultText').value = convertResult;
    document.getElementById('resultArea').classList.remove('hidden');
  } catch(e) {
    document.getElementById('converting').classList.add('hidden');
    alert('Conversion failed: ' + e.message);
    resetConvert();
  }
}
function copyResult() {
  if (!convertResult) return;
  navigator.clipboard.writeText(convertResult).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
function resetConvert() {
  document.getElementById('uploadPrompt').classList.remove('hidden');
  document.getElementById('converting').classList.add('hidden');
  document.getElementById('resultArea').classList.add('hidden');
  convertResult = '';
}
</script>
</body></html>
