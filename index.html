a{color:var(--g-accent);text-decoration:none}

/* Sidebar */

/* Sidebar collapse - full hide with bookmark tab */

/* Sidebar toggle - always fixed top-left as a tab-like button */
#sidebarToggle{position:fixed;top:8px;left:8px;z-index:200;width:36px;height:36px;border-radius:8px;border:1px solid var(--g-glass-border);background:var(--g-glass);backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);color:var(--g-text-secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);padding:0;line-height:1;gap:4px}

}

.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:opacity .2s ease;opacity:0}

/* Model Selector */
.model-select{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--g-radius-sm);border:1px solid var(--g-glass-border);background:var(--g-glass-strong);cursor:pointer;font-size:11px;color:var(--g-text-secondary);transition:var(--g-transition)}
.model-select:hover{border-color:var(--g-glass-border-active);color:var(--g-text)}

/* Main content area */
#appWrap{margin-left:var(--sidebar-w);width:calc(100% - var(--sidebar-w));height:100%;display:flex;flex-direction:column;transition:margin-left 0.3s cubic-bezier(0.16,1,0.3,1),width 0.3s cubic-bezier(0.16,1,0.3,1);overflow:hidden}

.card{background:var(--g-glass);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius-lg);padding:18px;margin-bottom:12px;transition:var(--g-transition)}

.kanbanCard .kcTag{font:500 9px var(--mono);padding:2px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.kanbanCard .kcTag.high{border-color:var(--red);color:var(--red)}
.kanbanCard .kcTag.medium{border-color:var(--amber);color:var(--amber)}
.kanbanCard .kcTag.low{border-color:var(--dim);color:var(--dim)}
.kanbanCard .kcDate{font-size:9px;color:var(--dim);margin-top:3px}
.kanbanEmpty{color:var(--dim);font-size:11px;text-align:center;padding:18px 8px}
.boardCol{min-width:280px;max-width:320px;flex-shrink:0;background:rgba(28,28,34,.45);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius-lg);display:flex;flex-direction:column;max-height:100%;min-height:200px;scroll-snap-align:start}
.boardColHead{padding:12px 14px 8px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);flex-shrink:0}

.boardColBody{overflow-y:auto;padding:8px;flex:1;min-height:60px}
.boardCard{background:var(--g-glass);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:var(--g-transition);position:relative}
.boardCard:hover{border-color:var(--g-accent);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

.boardCard .bcActions button:hover{background:var(--soft);color:var(--text);border-color:var(--blue);transform:scale(1.1)}
.boardCard .bcActions .bcDoneBtn:hover{border-color:var(--green);color:var(--green)}

/* Task Description */
.tpDesc{background:var(--soft);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.5;min-height:50px;white-space:pre-wrap}

/* Menu Grid - 2x2 */
.menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}

.btn:hover{box-shadow:0 0 20px var(--g-accent-glow);transform:translateY(-1px)}.btn.alt{background:var(--g-glass-strong);color:var(--g-text);border:1px solid var(--g-glass-border)}.btn.alt:hover{border-color:var(--g-glass-border-active)}.btn.ghost{background:transparent;color:var(--g-text-secondary)}.btn.ghost:hover{background:var(--g-glass-strong);color:var(--g-text)}

/* Todo list */
.todoList{display:grid;gap:8px}

.tag.high{color:var(--g-red)}

/* Project cards */
.projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

.project .desc{font-size:12px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* Stats grid */
.statGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.statCard{background:var(--g-glass);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius);padding:16px;text-align:center}
.statCard b{font-size:20px;font-weight:700;display:block}
.statCard span{font-size:11px;color:var(--muted)}

/* ─── EXECUTIVE DASHBOARD ─── */
.exec-dash{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.exec-dash .full-width{grid-column:1/-1}
.exec-dash .half{grid-column:span 1}
.exec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 2px}
.exec-header h2{margin:0;font-size:16px;font-weight:600;color:var(--fg)}
.exec-header .ts{font-size:10px;color:var(--dim);font-family:var(--mono)}
.exec-card{background:var(--g-glass);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius-lg);padding:14px}
.exec-card .card-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.exec-card .card-hdr .dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Project radar */
.projRadar{display:flex;flex-direction:column;gap:6px}
.projRow{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;transition:var(--transition);cursor:pointer}
.projRow:hover{background:var(--bg2)}
.projRow .health{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.projRow .health.green{background:var(--green)}
.projRow .health.amber{background:var(--amber)}
.projRow .health.red{background:var(--red)}
.projRow .health.gray{background:var(--dim)}
.projRow .pname{flex:1;font-size:12px;font-weight:500;color:var(--text);min-width:0}
.projRow .pstatus{font-size:10px;color:var(--dim);font-family:var(--mono)}
.projRow .pmetrics{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap}

/* Today's mission */
.todoMini{display:flex;flex-direction:column;gap:4px}
.todoMini .trow{display:flex;align-items:flex-start;gap:7px;padding:4px 6px;border-radius:4px;transition:var(--transition);cursor:pointer}
.todoMini .trow:hover{background:var(--bg2)}
.todoMini .trow .cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;margin-top:2px;cursor:pointer;display:grid;place-items:center;font-size:8px;transition:all .12s}
.todoMini .trow .cb.done{background:var(--green);border-color:var(--green);color:#fff}
.todoMini .trow .ttext{font-size:12px;line-height:1.35}
.todoMini .trow .ttext .done{text-decoration:line-through;opacity:.4}
.todoMini .trow .tprio{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:600;text-transform:uppercase}
.todoMini .trow .tprio.high{background:var(--red);color:#fff}
.todoMini .trow .tprio.medium{background:var(--amber);color:#fff}
.todoMini .trow .tprio.low{background:var(--dim);color:var(--text)}

/* Non-negotiables */
.nnRow{display:flex;align-items:center;gap:7px;padding:3px 6px;font-size:11px;color:var(--muted)}
.nnRow .cb{width:12px;height:12px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;display:grid;place-items:center;font-size:7px;cursor:pointer;transition:all .12s}
.nnRow .cb.done{background:var(--accent);border-color:var(--accent);color:#fff}
.nnRow .nnlabel{flex:1}
.nnRow .nnlabel.done{text-decoration:line-through;opacity:.4}

/* Activity feed */
.actFeed{display:flex;flex-direction:column;gap:3px;max-height:240px;overflow-y:auto}
.actFeed::-webkit-scrollbar{width:3px}
.actFeed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.actItem{display:flex;align-items:flex-start;gap:6px;padding:4px 6px;border-radius:4px;font-size:11px;line-height:1.4;color:var(--muted);transition:var(--transition)}
.actItem:hover{background:var(--bg2)}
.actItem .atime{font-size:9px;color:var(--dim);font-family:var(--mono);white-space:nowrap;flex-shrink:0;margin-top:1px}
.actItem .atext{flex:1;min-width:0}
.actItem .atype{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:5px}
.actItem .atype.msg{background:var(--blue)}
.actItem .atype.cmd{background:var(--amber)}
.actItem .atype.task{background:var(--green)}
.actItem .atype.pay{background:var(--purple)}
.actItem .atype.sys{background:var(--dim)}

/* Processes / integrations */
.procGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.procItem{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;background:var(--soft);font-size:11px}
.procItem .proc-icon{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:11px;flex-shrink:0}
.procItem .proc-icon.green{background:rgba(46,160,67,.15);color:var(--green)}
.procItem .proc-icon.amber{background:rgba(210,153,34,.15);color:var(--amber)}
.procItem .proc-icon.dim{background:rgba(92,101,112,.15);color:var(--dim)}
.procItem .proc-name{flex:1;min-width:0}
.procItem .proc-name .plabel{font-weight:500;font-size:11px;color:var(--text)}
.procItem .proc-name .pdesc{font-size:9px;color:var(--dim)}
.procItem .proc-status{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.procItem .proc-status.live{background:rgba(46,160,67,.15);color:var(--green)}
.procItem .proc-status.stub{background:rgba(210,153,34,.15);color:var(--amber)}
.procItem .proc-status.off{background:rgba(92,101,112,.15);color:var(--dim)}

/* Health strip */
.healthStrip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.healthItem{text-align:center;padding:10px 6px;border-radius:8px;background:var(--soft)}
.healthItem .hval{font-size:18px;font-weight:700;display:block;line-height:1.2}
.healthItem .hval.green{color:var(--green)}
.healthItem .hval.amber{color:var(--amber)}
.healthItem .hval.accent{color:var(--accent)}
.healthItem .hval.blue{color:var(--blue)}
.healthItem .hlab{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px}

/* Quick actions mini */
.miniGrid{display:flex;gap:4px;flex-wrap:wrap}
.miniGrid .mt{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-size:11px;color:var(--muted);background:var(--soft);border:1px solid var(--line);cursor:pointer;transition:var(--transition)}
.miniGrid .mt:hover{background:var(--bg2);color:var(--fg);border-color:var(--accent)}

/* Daily Check-in (compact within exec dashboard) */
.checkinCompact{display:flex;align-items:center;gap:12px;padding:6px 0;flex-wrap:wrap}
.checkinCompact .moodRow{display:flex;gap:4px;margin:0}
.checkinCompact .moodBtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:transparent;font-size:15px;cursor:pointer;display:grid;place-items:center;transition:all .12s;padding:0}
.checkinCompact .moodBtn:hover,.checkinCompact .moodBtn.sel{border-color:var(--blue);background:var(--soft);transform:scale(1.08)}
.checkinCompact .scoreRow{display:flex;align-items:center;gap:6px;margin:0;flex-shrink:0}
.checkinCompact .scoreRow input[type=range]{width:60px;height:4px}
.checkinCompact .scoreRow span{font-size:11px;min-width:14px;text-align:center}
.checkinCompact .miniChart{display:flex;gap:2px;align-items:flex-end;height:24px}
.checkinCompact .miniChart .bar{width:8px;border-radius:2px 2px 0 0;transition:height.2s}
.checkinCompact .miniChart .bar.mood-bar{background:var(--blue)}
.checkinCompact .miniChart .bar.prod-bar{background:var(--accent)}

@media(max-width:720px){.exec-dash{grid-template-columns:1fr}.healthStrip{grid-template-columns:1fr 1fr}.procGrid{grid-template-columns:1fr}}

/* Daily Check-in */
.checkinCard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-xl);padding:16px;margin-bottom:12px}
.checkinHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.moodBtn:hover,.moodBtn.sel{border-color:var(--blue);background:var(--soft);transform:scale(1.1)}
.scoreRow{display:flex;align-items:center;gap:10px;margin:8px 0}
.scoreRow input[type=range]{flex:1}
.scoreRow span{font-size:18px;font-weight:700;min-width:24px;text-align:center}
.hoursRow{display:flex;align-items:center;gap:8px;margin:8px 0}

.hoursRow label{font-size:13px;color:var(--muted)}
.miniChart{display:flex;gap:4px;align-items:flex-end;height:60px;margin-top:8px}
.miniBar{flex:1;background:var(--blue);border-radius:3px 3px 0 0;min-width:8px;transition:height .3s;position:relative}
.miniBar span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:9px;color:var(--dim);white-space:nowrap}
.miniBar.mood{background:var(--amber)}
.miniBar.prod{background:var(--green)}
.chartRow{display:flex;gap:10px;margin-top:10px}
.chartCol{flex:1}
.chartCol .label{font-size:10px;color:var(--muted);margin-bottom:4px;text-align:center}

/* Revenue */
.revPanel{margin-top:12px}
.revRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.revStat{background:var(--soft);border:1px solid var(--line);border-radius:var(--radius);padding:12px;text-align:center}
.revStat b{font-size:18px;display:block}
.revStat span{font-size:10px;color:var(--muted)}
.barChart{display:flex;align-items:flex-end;gap:12px;height:100px;padding:8px 0}
.barWrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:50px;background:var(--blue);border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}

/* Calendar - Two Column Layout */
.calPage{display:flex;gap:12px;height:100%;overflow:hidden}
.calLeft{flex:1;overflow-y:auto;padding-right:6px;min-width:0;max-width:none}
.calRight{flex:0 0 auto;width:40%;min-width:260px;overflow-y:auto}
@media(max-width:768px){.calPage{flex-direction:column;height:auto}.calLeft{width:100%}.calRight{width:100%;min-width:0}}

.calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.calDay{display:flex;flex-direction:column;border-radius:var(--radius);cursor:pointer;position:relative;padding:3px 2px;min-height:72px;border:1px solid transparent;transition:all .1s}
.calDay:hover{background:var(--soft)}
.calDay.today{background:color-mix(in srgb,var(--blue)15%,var(--soft));border-color:var(--blue)}
.calDay.today .calNum{background:var(--blue);color:var(--bg)}
.calDay.selected{border:2px solid var(--blue);background:var(--soft)}
.calDay.other{opacity:0.3}
.calDay .calNum{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:1px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.calDay.today .calNum{background:var(--blue);color:var(--bg)}
.calDay .calPreview{font-size:9px;line-height:1.3;color:var(--dim);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-word;margin-top:1px}

.calDay .calPreview .cpItem{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;padding:0 1px}
.calDay .calPreview .cpUrgent{color:var(--red);font-weight:600}
.calDay .calPreview .cpDeadline{color:var(--amber)}
.calDay .calPreview .cpEvent{color:var(--blue)}
.calDay .calPreview .cpDone{color:var(--green)}

/* Day View (Right Side) */
.dayView{padding:0 4px}
.dayViewHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.dayViewHead h2{font-size:16px;margin:0}
.dayViewHead .dvLabel{font-size:11px;color:var(--muted)}
.dayViewHead .dvNav{display:flex;gap:4px}
.dayViewHead .dvNav button{padding:4px 10px;border-radius:6px;border:1px solid var(--line);background:var(--card);color:var(--text);cursor:pointer;font-size:12px}
.dayViewHead .dvNav button:hover{background:var(--soft)}

.daySection{margin-bottom:16px}
.daySection h4{font-size:12px;font-weight:600;margin:0 0 8px;color:var(--muted);display:flex;align-items:center;gap:6px}
.daySection h4 .dsCount{font-size:10px;color:var(--dim);font-weight:400}
.eventRow{padding:8px 10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);margin-bottom:6px}
.eventRow:hover{border-color:var(--blue)}
.eventRow .edl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.eventRow .edl .eText{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eventRow .edl .eProj{font:500 9px var(--mono);padding:2px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted);flex-shrink:0}

.eventRow .edl .eTag.medium{border-color:var(--amber);color:var(--amber)}
.eventRow .edl .eTime{font-size:10px;color:var(--dim);flex-shrink:0}
.eventRow .edl .eDesc{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deadlineUrgent{color:var(--red)!important}
.deadlineSoon{color:var(--amber)!important}

.calSync{font-size:10px;color:var(--dim);text-align:center;padding:4px 0;display:flex;justify-content:center;gap:12px}

/* Notification Bell */
.notifBell{position:relative;display:flex;align-items:center;justify-content:center}
.notifBell .badge{position:absolute;top:-2px;right:-4px;background:var(--red);color:var(--bg);font-size:8px;font-weight:700;min-width:14px;height:14px;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1}

.notifPop.open{display:block}

/* Chat Bar Bell (bottom-right) */
.chatBarBell{width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;flex-shrink:0}
.chatBarBell:hover{background:var(--soft);color:var(--fg)}
.chatBarBell .badge{display:flex!important}

/* Mini Notification Popup (above chatBar, bottom-right) */
.notifMiniPop{position:fixed;bottom:70px;right:12px;z-index:210;width:340px;max-height:50vh;overflow-y:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-xl);box-shadow:0 -4px 24px rgba(0,0,0,.5);padding:0;font-size:13px;animation:slideUp .15s ease-out}

.notifMiniPop .notifMiniHead span{flex:1}

.notifMiniPop .notifItem:last-child{border-bottom:0}
.notifMiniPop .notifItem:hover{background:var(--soft)}
.notifMiniPop .notifItem .niIcon{font-size:15px;flex-shrink:0;margin-top:1px}
.notifMiniPop .notifItem .niTitle{font-size:11px;font-weight:600;line-height:1.3}
.notifMiniPop .notifItem .niTime{font-size:9px;color:var(--dim);margin-top:1px}
.notifMiniPop .notifEmpty{padding:20px;text-align:center;color:var(--dim);font-size:11px}

/* Bottom-right Toast */
.toastBottomRight{position:fixed;bottom:80px;right:12px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer;max-width:320px;animation:toastSlideIn .3s ease-out;transition:opacity .3s}
@keyframes toastSlideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* Notification preferences */
.notifSettingsRow{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text);transition:background .1s}
.notifSettingsRow:hover{background:var(--soft)}
.notifSettingsRow input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.notifSettingsRow .toggleDesc{font-size:10px;color:var(--dim);margin-left:auto}
.notifItem{display:flex;gap:10px;padding:10px 8px;border-bottom:1px solid var(--line);align-items:flex-start;cursor:pointer}
.notifItem:last-child{border-bottom:0}
.notifItem:hover{background:var(--soft);border-radius:var(--radius)}
.notifItem .niIcon{font-size:18px;flex-shrink:0;margin-top:1px}
.notifItem .niBody{flex:1;min-width:0}
.notifItem .niTitle{font-size:12px;font-weight:600}
.notifItem .niTime{font-size:9px;color:var(--dim);margin-top:2px}
.notifEmpty{padding:30px;text-align:center;color:var(--dim);font-size:12px}
.calSync span{cursor:default}
.calSync .syncing{color:var(--amber)}
.calSync .synced{color:var(--green)}
.calSync .syncErr{color:var(--red)}

/* Timetable */
.timelineWrap{height:400px;overflow-y:auto;position:relative;overflow-x:hidden}
@media(max-width:600px){.timelineWrap{height:300px}}
.timeline{position:relative}
.timelineHour{position:absolute;left:0;font-size:10px;color:var(--dim)}
.timelineLine{position:absolute;left:40px;right:0;border-top:1px solid var(--line)}
.timetableBlock{position:absolute;left:44px;right:8px;border-radius:6px;padding:4px 8px;overflow:hidden;font-size:11px}
.timetableBlock.meeting{background:color-mix(in srgb,var(--blue)15%,var(--card));border:1px solid color-mix(in srgb,var(--blue)30%,var(--line))}
.timetableBlock.task{background:color-mix(in srgb,var(--green)10%,var(--card));border:1px solid color-mix(in srgb,var(--green)20%,var(--line))}
.tbTitle{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbTime{font-size:10px;color:var(--muted)}

/* Chat page */
.chatWrap{display:flex;flex-direction:column;height:100%;position:relative}
.chatWrap .msgList{flex:1;overflow-y:auto;padding:8px 0 80px;min-height:0}
.chatWrap.has-messages .chatInputWrap{position:relative;bottom:auto;left:auto;transform:none;width:100%}
.chatWrap:not(.has-messages) .chatInputWrap{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);width:min(90%,600px)}
.chatInputWrap{padding:12px 16px;flex-shrink:0}
.msg{display:flex;flex-direction:column;margin-bottom:10px}

.msg .bubble{max-width:85%;padding:10px 14px;border-radius:var(--radius-lg);font-size:13px;line-height:1.5}
.msg .bubble{background:var(--soft);border:1px solid var(--line)}

.msg.system .bubble{background:transparent;font-size:11px;color:var(--dim);text-align:center;max-width:100%}

/* Persistent Chat Bar */
.chatBar{position:fixed;bottom:0;left:var(--sidebar-w);right:0;z-index:100;background:var(--g-glass);backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);border-top:1px solid var(--g-glass-border);padding:8px 12px env(safe-area-inset-bottom);transition:left 0.3s cubic-bezier(0.16,1,0.3,1),width 0.3s cubic-bezier(0.16,1,0.3,1),padding 0.3s cubic-bezier(0.16,1,0.3,1)}
.chatBar textarea{flex:1;border:1px solid var(--g-glass-border);background:var(--g-glass-strong);color:var(--g-text);border-radius:18px;padding:10px 16px;font:inherit;font-size:14px;outline:none;min-height:40px;max-height:120px;resize:none;overflow-y:auto;line-height:1.5;transition:border-color 0.2s,box-shadow 0.2s}
.chatBar textarea:focus{border-color:var(--g-accent);box-shadow:0 0 0 3px var(--g-accent-glow)}
.chatBar .sendBtn{border:0;background:var(--accent);color:#fff;border-radius:12px;width:40px;height:40px;cursor:pointer;font-size:16px;display:grid;place-items:center;flex-shrink:0;transition:all .15s}
.chatBar .sendBtn:hover{opacity:.85;transform:scale(1.05)}
.chatBar .settingsBtn{border:0;background:transparent;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chatBar .settingsBtn:hover{background:var(--soft);color:var(--fg)}
.chatBar .collapseBtn{border:0;background:transparent;color:var(--muted);cursor:pointer;padding:6px 4px;border-radius:8px;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chatBar .collapseBtn:hover{background:var(--soft);color:var(--fg)}
.settingsPop .modeBtn{border:0;background:var(--panel2);color:var(--muted);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.settingsPop .modeBtn:hover,.settingsPop .modeBtn.active{background:var(--accent);color:#fff}
.settingsPop .checkItem{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text);transition:background .1s}
.settingsPop .checkItem:hover{background:var(--soft)}
.settingsPop .checkItem input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}

/* History sidebar toggle for chat */
.historyToggle{position:fixed;left:var(--sidebar-w);top:8px;z-index:105;border:0;background:var(--panel);color:var(--muted);padding:6px 10px;border-radius:0 var(--radius) var(--radius) 0;cursor:pointer;font-size:14px;border-left:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.historyPane{position:fixed;left:var(--sidebar-w);top:0;bottom:0;z-index:101;width:260px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:48px 10px 10px;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),left 0.3s cubic-bezier(0.16,1,0.3,1)}
.historyPane.open{transform:translateX(0)}
.histWrap{position:relative;display:block;margin-bottom:2px}
.histDel{position:absolute;top:2px;right:4px;width:18px;height:18px;border-radius:18px;border:0;background:var(--red);color:#fff;font-size:10px;line-height:18px;text-align:center;cursor:pointer;display:none;z-index:5;padding:0}
.histWrap:hover .histDel{display:flex;align-items:center;justify-content:center}
.histDel:hover{background:#e33}
.threadCard{position:relative}
.threadCard .thrDel{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:20px;border:0;background:var(--red);color:#fff;font-size:11px;line-height:20px;text-align:center;cursor:pointer;display:none;z-index:5;padding:0}
.threadCard:hover .thrDel{display:flex;align-items:center;justify-content:center}
.threadCard .thrDel:hover{background:#e33}
.hist{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--text);padding:10px;border-radius:var(--radius);cursor:pointer;border-bottom:1px solid var(--line)}
.hist:hover{background:var(--soft)}
.hist.active{background:var(--soft);border-left:2px solid var(--blue)}
.hist b{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist small{display:block;font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Settings popup */
.settingsPop{display:none;position:fixed;bottom:64px;right:12px;z-index:212;background:var(--g-surface);backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);border:1px solid var(--g-glass-border);border-radius:var(--g-radius-lg);padding:14px;min-width:180px;box-shadow:var(--g-shadow)}
.settingsPop.open{display:grid;gap:4px}
.settingsPop button{border:0;background:transparent;color:var(--text);padding:8px 12px;border-radius:var(--radius);cursor:pointer;text-align:left;font-size:13px}
.settingsPop button:hover{background:var(--soft)}

/* Chat Overlay */
.chatOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:105;background:rgba(0,0,0,.5)}
.chatOverlay.open{display:block}
.chatPanel{position:fixed;bottom:56px;left:8px;right:8px;max-height:60dvh;max-height:-webkit-fill-available;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-xl) var(--radius-xl) var(--radius-lg) var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)}
@media(max-width:600px){.chatPanel{bottom:60px;left:4px;right:4px;max-height:70dvh;border-radius:var(--radius-lg)}}
.chatPanelHead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.chatDragHandle{height:8px;cursor:ns-resize;background:var(--line);border-radius:0 0 4px 4px;margin:0 40%;flex-shrink:0;transition:background .15s;touch-action:none}
.chatDragHandle:hover,.chatDragHandle:active{background:var(--blue)}
.chatPanel .msgList{flex:1;overflow-y:auto;padding:8px 12px;min-height:100px}

/* Model Picker */
.modelBtn{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);flex-shrink:0}

/* Content */
.contentTabs{display:flex;gap:4px;margin-bottom:12px}
.contentTabs button{border:0;background:var(--soft);color:var(--muted);padding:6px 14px;border-radius:var(--radius-lg);cursor:pointer;font-size:12px;font-weight:600}
.contentTabs button.active{background:var(--ink);color:var(--bg)}
.contentPanel{display:none}.contentPanel.active{display:block}

/* Charts */
.chart canvas{width:100%!important;height:200px!important}

/* Project detail */
.badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}

/* Responsive */
@media(max-width:480px){
  .menuGrid{gap:10px}.menuTile{padding:20px 12px}.projects{grid-template-columns:1fr}
  .kanbanCol{min-width:220px}.boardCol{min-width:240px}
  .notifMiniPop{width:calc(100vw - 24px);right:8px;left:8px}
}
@media(max-width:600px){
  #sidebar{transform:translateX(-100%);opacity:0;pointer-events:none}
  #sidebar.mobile-open{transform:translateX(0);opacity:1;pointer-events:auto}
  #appWrap{margin-left:0;width:100%}
  .chatBar{left:0;width:100%;padding:6px 8px env(safe-area-inset-bottom)}
  #sidebarToggle{left:0!important;top:8px;width:auto;height:32px;border-radius:0 8px 8px 0;background:var(--g-glass);backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);border:1px solid var(--g-glass-border);border-left:0;font-size:13px;padding:0 12px 0 8px;opacity:0.9}
  #sidebarToggle span{display:inline}
  .kpi-strip{grid-template-columns:repeat(3,1fr)!important}
  .boardCols{gap:6px}
  .notifPop{width:calc(100vw - 16px);left:8px!important;right:8px!important}
  .historyPane{left:0;width:85%;max-width:320px;z-index:102}
  #appMain{padding:12px 12px 80px}
  .menuTile{padding:16px 10px;font-size:13px}
  .btn{padding:6px 12px;font-size:12px}
  .taskCard{padding:10px}
  .nav-item{min-height:36px;padding:8px 12px}
  .btn{min-height:36px}
  .kanbanCol{min-width:220px}
}
@media(max-width:767px){
  .historyPane{left:0;width:80%;max-width:300px;z-index:102}
  #msgList{margin-left:0!important}
  .chatBar{left:0!important;width:100%!important;padding:6px 8px env(safe-area-inset-bottom)!important}
  .chatBar textarea{padding:8px 12px;font-size:13px}
  .chatBar .sendBtn{width:36px;height:36px;font-size:14px}
  .settingsPop{min-width:220px!important;right:8px!important}
  .chatWrap .msgList:empty~.chatInputWrap{top:30%;width:95%}
  #appMain{padding-bottom:80px}
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
  .boardCols{gap:8px}
}
@media(min-width:768px){
  .historyPane{left:var(--sidebar-w)}
  .historyPane.open{transform:translateX(0)}
  .historyPane.open ~ #msgList,
  .historyPane.open ~ .chatInputWrap{margin-left:260px}
  .historyToggle{display:none}
  .chatBar{left:var(--sidebar-w)!important;width:calc(100% - var(--sidebar-w))!important}
  #sidebar.hidden~.chatBar{left:0!important;width:100%!important}
  #sidebar.hidden ~ #appWrap .historyPane{left:0;transform:translateX(0)}
  #appMain{padding-bottom:80px}
}

/* ── Executive Dashboard ────────────────────────────── */
/* ─── BRAIN DASHBOARD ─── */
.brain-dash{position:relative;width:100%;height:100%;min-height:400px;overflow:hidden;margin-bottom:0}
.brain-conn{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.brain-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;cursor:pointer;text-align:center;width:140px;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.brain-center .bc-core{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(97,175,239,.25),var(--panel) 70%);border:2px solid rgba(97,175,239,.4);box-shadow:0 0 40px rgba(97,175,239,.25),0 0 80px rgba(97,175,239,.1),inset 0 0 30px rgba(97,175,239,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:brainPulse 4s ease-in-out infinite;position:relative}
.brain-center .bc-core .bc-icon{font-size:28px;margin-bottom:2px}
.brain-center .bc-core .bc-label{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:2px;text-transform:uppercase}
.brain-center .bc-core .bc-sub{font-size:8px;color:var(--muted);margin-top:1px}
.brain-center .bc-ring{position:absolute;border-radius:50%;border:1px solid;pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%)}
.brain-center .bc-ring:nth-child(1){width:180px;height:180px;border-color:rgba(97,175,239,.12);animation:ringExpand 4s ease-in-out infinite}
.brain-center .bc-ring:nth-child(2){width:240px;height:240px;border-color:rgba(97,175,239,.08);animation:ringExpand 4s ease-in-out infinite 1s}
.brain-center .bc-ring:nth-child(3){width:300px;height:300px;border-color:rgba(97,175,239,.05);animation:ringExpand 4s ease-in-out infinite 2s}
@keyframes brainPulse{0%,100%{box-shadow:0 0 40px rgba(97,175,239,.25),0 0 80px rgba(97,175,239,.1)}50%{box-shadow:0 0 60px rgba(97,175,239,.45),0 0 120px rgba(97,175,239,.2);transform:scale(1.04)}}
@keyframes ringExpand{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}

.brain-module{position:absolute;z-index:3;background:var(--g-glass);backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);border:1px solid var(--g-glass-border);border-radius:var(--g-radius);padding:0;overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:160px}
.brain-module:hover{border-color:var(--g-accent);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.brain-module .bm-hdr{display:flex;align-items:center;gap:5px;padding:6px 8px;border-bottom:1px solid transparent;cursor:grab;user-select:none;background:var(--g-glass-strong);min-height:28px;font-size:10px;font-weight:600;color:var(--g-text-secondary)}
.brain-module:not(.collapsed) .bm-hdr{border-bottom-color:var(--line)}
.brain-module .bm-hdr .bm-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.brain-module .bm-hdr .bm-icon{font-size:12px;flex-shrink:0}
.brain-module .bm-hdr .bm-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px}
.brain-module .bm-hdr .bm-pin{width:14px;height:14px;border:0;background:transparent;color:var(--dim);cursor:pointer;font-size:8px;padding:0;display:grid;place-items:center;opacity:.3;transition:opacity .12s;border-radius:3px}
.brain-module .bm-hdr .bm-pin:hover,.brain-module .bm-hdr .bm-pin.pinned{opacity:1}
.brain-module .bm-hdr .bm-pin.pinned{color:var(--amber)}
.brain-module .bm-body{padding:6px 8px;font-size:11px;color:var(--text);overflow-y:auto;max-height:200px}
.brain-module .bm-body::-webkit-scrollbar{width:2px}
.brain-module .bm-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.brain-module .bm-resize{position:absolute;bottom:0;right:0;width:10px;height:10px;cursor:se-resize;opacity:0;transition:opacity .15s;background:linear-gradient(135deg,transparent 40%,var(--dim) 40%,var(--dim) 50%,transparent 50%,transparent 60%,var(--dim) 60%);touch-action:none}
.brain-module:hover .bm-resize{opacity:.4}
.brain-module .bm-resize:hover{opacity:1}
.brain-module.dragging{cursor:grabbing;opacity:.85;z-index:10;transition:none!important}
.brain-module.pinned{border-color:rgba(209,154,102,.5)}
.brain-module.pinned .bm-hdr{background:rgba(209,154,102,.08)}
.brain-module.pinned .bm-pin{color:var(--amber);opacity:1}

/* Focus overlay */
.bf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;animation:fadeIn .2s}
.bf-card{position:fixed;z-index:51;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-xl);width:min(650px,92vw);max-height:80vh;overflow:hidden;left:50%;top:50%;transform:translate(-50%,-50%);animation:focusIn .3s cubic-bezier(.4,0,.2,1)}
.bf-card .bf-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700}
.bf-card .bf-hdr .bf-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bf-card .bf-hdr .bf-close{margin-left:auto;width:22px;height:22px;border-radius:5px;border:0;background:var(--soft);color:var(--muted);cursor:pointer;font-size:12px;display:grid;place-items:center}
.bf-card .bf-hdr .bf-close:hover{background:var(--accent);color:#fff}
.bf-card .bf-body{padding:14px;overflow-y:auto;max-height:calc(80vh - 50px);font-size:12px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes focusIn{from{opacity:0;transform:translate(-50%,-40%) scale(.93)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* Module content re-use */
.brain-module .projRow{padding:3px 4px;gap:5px}
.brain-module .pname{font-size:11px}
.brain-module .trow{padding:3px 4px;gap:5px}
.brain-module .ttext{font-size:11px}
.brain-module .cb{width:12px;height:12px;font-size:7px}
.brain-module .nnRow{gap:5px;font-size:10px}
.brain-module .procItem{padding:3px 4px;background:transparent;font-size:10px}
.brain-module .plabel{font-size:10px}
.brain-module .pdesc{font-size:8px}
.brain-module .proc-status{font-size:8px}
.brain-module .proc-icon{width:16px;height:16px;font-size:9px}
.brain-module .actItem{padding:2px 4px;font-size:10px}
.brain-module .healthItem{padding:4px 2px}
.brain-module .hval{font-size:14px}
.brain-module .hlab{font-size:8px}
.brain-module .miniChart{height:14px;gap:1px}
.brain-module .moodBtn{width:22px;height:22px;font-size:12px}
.brain-module .checkinCompact{gap:4px;flex-wrap:wrap}
.brain-module .scoreRow input{width:35px}
.brain-module .nnlabel{font-size:10px}

@media(max-width:768px){
  .brain-module{position:static!important;margin-bottom:6px;width:100%!important;max-width:100%!important}
  .brain-dash{min-height:auto;overflow-y:auto;overflow-x:hidden;min-height:500px}
  .brain-center{position:relative;transform:none;margin:16px auto;text-align:center;width:120px;height:120px}
  .brain-center .bc-core{width:90px;height:90px}
  .brain-center .bc-core .bc-icon{font-size:22px}
  .brain-center .bc-ring{display:none}
  .brain-conn{display:none}
  #brainDashModules{display:flex;flex-direction:column;gap:6px;padding:6px}
  .bf-card{width:95vw;max-height:90vh}
}

/* KPI Strip */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.kpi-item{background:var(--g-glass);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius);padding:12px 14px;text-align:center;transition:var(--g-transition)}
.kpi-item:hover{border-color:var(--g-glass-border-active)}
.kpi-item .kpi-val{font-size:20px;font-weight:700;line-height:1.2;display:block}
.kpi-item .kpi-val.green{color:var(--green)}
.kpi-item .kpi-val.amber{color:var(--amber)}
.kpi-item .kpi-val.blue{color:var(--blue)}
.kpi-item .kpi-val.accent{color:var(--accent)}
.kpi-item .kpi-lab{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;display:block}
@media(max-width:600px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}

/* Executive Cards */
.exec-card-new{background:var(--g-glass);backdrop-filter:var(--g-blur-light);-webkit-backdrop-filter:var(--g-blur-light);border:1px solid var(--g-glass-border);border-radius:var(--g-radius-lg);padding:14px;margin-bottom:0}
.exec-card-new .ech{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.exec-card-new .ech .edot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Project Cards */
.proj-cards{display:flex;flex-direction:column;gap:5px;max-height:320px;overflow-y:auto}
.proj-card{display:grid;grid-template-columns:auto 1fr auto auto;gap:6px 10px;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;transition:var(--g-transition)}
.proj-card:hover{background:var(--g-glass-strong)}
.proj-card .pc-health{width:8px;height:8px;border-radius:50%}
.proj-card .pc-health.green{background:var(--green)}
.proj-card .pc-health.amber{background:var(--amber)}
.proj-card .pc-health.red{background:var(--red)}
.proj-card .pc-health.gray{background:var(--dim)}
.proj-card .pc-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-card .pc-lane{font-size:9px;color:var(--dim);font-family:var(--mono);padding:2px 6px;border-radius:4px;background:rgba(92,101,112,.15);white-space:nowrap}
.proj-card .pc-metric{font-size:10px;color:var(--muted);text-align:right}
.proj-card .pc-status{font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px}
.proj-card .pc-status.green{background:rgba(46,160,67,.15);color:var(--green)}
.proj-card .pc-status.amber{background:rgba(210,153,34,.15);color:var(--amber)}
.proj-card .pc-status.red{background:rgba(232,120,120,.15);color:var(--red)}
.proj-card .pc-status.gray{background:rgba(92,101,112,.15);color:var(--dim)}

/* Todo/Non-neg section */
.mission-todos{max-height:200px;overflow-y:auto}
.mission-todos .trow{display:flex;align-items:flex-start;gap:7px;padding:4px 6px;border-radius:4px;transition:var(--transition);cursor:pointer}
.mission-todos .trow:hover{background:var(--bg2)}
.mission-todos .trow .cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;margin-top:2px;cursor:pointer;display:grid;place-items:center;font-size:8px;transition:all .12s}
.mission-todos .trow .cb.done{background:var(--green);border-color:var(--green);color:#fff}
.mission-todos .trow .ttext{font-size:12px;line-height:1.35;flex:1;min-width:0}
.mission-todos .trow .ttext.done{text-decoration:line-through;opacity:.4}
.mission-todos .trow .tprio{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:600;text-transform:uppercase}
.mission-todos .trow .tprio.high{background:var(--red);color:#fff}
.mission-todos .trow .tprio.medium{background:var(--amber);color:#fff}
.mission-todos .trow .tprio.low{background:var(--dim)}

/* NN section */
.nn-section{margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.nn-section .nn-row{display:flex;align-items:center;gap:7px;padding:3px 6px;font-size:11px;color:var(--muted)}
.nn-section .nn-row .cb{width:12px;height:12px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;display:grid;place-items:center;font-size:7px;cursor:pointer;transition:all .12s}
.nn-section .nn-row .cb.done{background:var(--accent);border-color:var(--accent);color:#fff}
.nn-section .nn-row .nnlab{flex:1}
.nn-section .nn-row .nnlab.done{text-decoration:line-through;opacity:.4}

/* Processes detail */

<script>
// ─── STATE ────────────────────────────────────────────
let state={},activePage='home',activeThread='general',calCursor=new Date(),selectedDate='',todoView='list',_lastActiveThread=null,agentView='kanban',sidebarHidden=false;
const $=id=>document.getElementById(id);
if(!Array.prototype._findLastIdx){Array.prototype._findLastIdx=function(fn){for(var i=this.length-1;i>=0;i--){if(fn(this[i]))return i;}return-1;}}

// Global error trap — shows errors on screen
window.onerror = function(msg, url, line, col, err) {
  const lm = $('loadingMsg');
  if(lm) {
    lm.innerHTML = `<div style="color:var(--red);font-weight:700">⚠️ JS Error</div><div style="font-size:12px;margin-top:8px">${msg}</div><div style="font-size:10px;color:var(--dim);margin-top:4px">Line ${line}:${col}</div><button class="btn" onclick="location.reload()" style="margin-top:12px;padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer">↻ Reload</button>`;
    lm.style.display = 'block';
  }
  console.error('Fatal:', msg, 'at', line+':'+col);
  return true;
};
const esc=s=>{const d=document.createElement('div');d.textContent=String(s);return d.innerHTML};
const clip=(s,n=140)=>{s=String(s||'').replace(/\s+/g,' ').trim();return s.length>n?s.slice(0,n-1)+'…':s};
function todayKey(d){d=d||new Date();if(d.getHours()<6)d.setDate(d.getDate()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// Close popups on outside click
document.addEventListener('click',function(e){
  const barPop=$('barSettingsPop');
  if(barPop&&barPop.classList.contains('open')&&!barPop.contains(e.target)&&!e.target.closest('.settingsBtn')){
    barPop.classList.remove('open');
  }
  const modelPop=$('modelPop');
  if(modelPop&&modelPop.classList.contains('open')&&!modelPop.contains(e.target)&&!e.target.closest('.modelBtn')&&!e.target.closest('.model-select')){
    modelPop.classList.remove('open');
  }
});

// ─── NOTIFICATIONS ──────────────────────────────
let notifications=[];
let notifUnread=0;
function loadNotif(){
  const notes=[];
  // 1. Server activity log (task completions, project updates, uploads, etc.)
  const activity = (state.ops?.activity||[]).slice(-30).reverse();
  for(const a of activity){
    let icon='📌';
    const t = (a.text||'').toLowerCase();
    if(t.includes('task')||t.includes('todo')) icon='✅';
    else if(t.includes('completed')||t.includes('done')) icon='🎉';
    else if(t.includes('payment')) icon='💰';
    else if(t.includes('upload')) icon='📤';
    else if(t.includes('project')) icon='📁';
    else if(t.includes('business')) icon='🏢';
    else if(t.includes('command')||t.includes('thread')) icon='💬';
    else if(t.includes('calendar')||t.includes('event')) icon='📅';
    notes.push({id:'act_'+a.id,icon,title:clip(a.text,80),desc:'',at:a.at});
  }
  // 2. Recent thread replies
  for(const t of (state.brain?.threads||[])){
    const msgs=t.messages||[];
    const last=msgs[msgs.length-1];
    if(last&&last.role==='assistant'&&!last.pending&&last.at&&Date.now()-new Date(last.at).getTime()<7200000){
      notes.push({id:'thread_'+t.id,icon:'💬',title:'Reply in: '+(t.title||'Chat'),desc:clip(last.text,80),at:last.at});
    }
  }
  // 3. Today's tasks
  const allTodos=Object.values(state.todos||{}).flat();
  for(const t of allTodos.filter(t=>t.createdAt&&Date.now()-new Date(t.createdAt).getTime()<86400000).slice(-5)){
    notes.push({id:'todo_'+t.id,icon:t.done?'🎉':'✅',title:t.done?'Completed: '+clip(t.text,60):'Task added: '+clip(t.text,60),desc:'',at:t.done?t.doneAt:t.createdAt});
  }
  // 4. Today's calendar
  const today=todayKey();
  for(const e of (state.brain?.calendar||[]).filter(e=>e.start&&e.start.startsWith(today))){
    notes.push({id:'cal_'+e.id,icon:'📅',title:'Today: '+clip(e.title,40),desc:'',at:e.start});
  }
  notes.sort((a,b)=>new Date(b.at||0).getTime()-new Date(a.at||0).getTime());
  notifications=notes.slice(0,50);
  notifUnread=notifications.filter(n=>!n.read).length;
  updateNotifBadge();
}
let _lastTodoCount=0;
function updateNotifBadge(){
  // Top nav badge
  const tab=document.querySelector('#sidebar .nav-item:first-child');
  if(!tab)return;
  if(notifUnread>0){
    const existing=tab.querySelector('.badge');
    if(existing)existing.textContent=notifUnread;
    else{const b=document.createElement('span');b.className='badge';b.textContent=notifUnread;tab.appendChild(b);tab.style.position='relative'}
  }else{
    const b=tab.querySelector('.badge');
    if(b)b.remove();
  }
  // Chat bar bell badge
  const bellBadge=$('chatBarNotifBadge');
  if(bellBadge){
    if(notifUnread>0){bellBadge.style.display='flex';bellBadge.textContent=notifUnread>9?'9+':notifUnread;}
    else bellBadge.style.display='none';
  }
  // Track new todos for notification
  const allTodos=Object.values(state.todos||{}).flat().filter(t=>!t.done);
  // Ensure chatBar is not collapsed on init
  var barCollapsed=$('barCollapsed');if(barCollapsed)barCollapsed.style.display='none';
  var barInputRow=$('barInputRow');if(barInputRow)barInputRow.style.display='flex';
  const count=allTodos.length;
  if(_lastTodoCount>0&&count>_lastTodoCount&&notifPrefs.todo){
    // New todos appeared!
    const newCount=count-_lastTodoCount;
    showCompletionToast(newCount+' new task'+(newCount>1?'s':''),{
      icon:'📋',
      bg:'var(--blue)',
      sub:allTodos.slice(0,3).map(t=>clip(t.text,40)).join(' · '),
      tag:'new-todos',
      desktopTitle:'📋 '+newCount+' new task'+(newCount>1?'s':''),
      desktopBody:allTodos.slice(0,3).map(t=>t.text).join(' | ')
    });
  }
  _lastTodoCount=count;
}
function toggleNotifPop(){
  const pop=$('notifPop');
  if(!pop)return;
  pop.classList.toggle('open');
  if(pop.classList.contains('open')) renderNotifList();
}
function renderNotifList(){
  const el=$('notifList');
  if(!el)return;
  loadNotif();
  if(!notifications.length){
    el.innerHTML='<div class="notifEmpty">No recent notifications</div>';
    return;
  }
  el.innerHTML=notifications.map(n=>{
    const ts=n.at?new Date(n.at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    return '<div class="notifItem" onclick="notifClick(\''+n.id+'\', this)">'+
      '<span class="niIcon">'+n.icon+'</span>'+

}
function markAllNotifRead(){
  notifications.forEach(n=>n.read=true);
  notifUnread=0;
  updateNotifBadge();
  renderNotifList();
}
function notifPopClose(){
  const pop=$('notifPop');
  if(pop)pop.classList.remove('open');
}
function notifMarkSingle(id,el){
  const n=notifications.find(x=>x.id===id);
  if(!n)return;
  n.read=!n.read;
  notifUnread+=n.read?-1:1;
  updateNotifBadge();
  if(el){
    const item=el.closest('.notifItem')||el.parentElement;
    if(item)item.style.opacity=n.read?'0.5':'1';
    el.textContent=n.read?'✓':'read';
  }
}
function pushSetupClick(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){
    alert('Push notifications not supported on this browser');
    return;
  }
  if(_pushSub){ updatePushStatus(); return; }
  // Also request desktop Notification permission if not granted
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  if(!notifPrefs.push){ 
    const toggle=document.getElementById('notifPrefPush');
    if(toggle){toggle.checked=true;notifPrefs.push=true;localStorage.setItem('notifPrefs',JSON.stringify(notifPrefs));}
  }
  subscribePush();
}
function notifClick(id,el){
  // Mark this one as read
  const n=notifications.find(x=>x.id===id);
  if(n){n.read=true;notifUnread=Math.max(0,notifUnread-1);updateNotifBadge();}
  if(el)el.style.opacity='0.5';
  
  const type=id.split('_')[0];
  const actualId=id.substring(id.indexOf('_')+1);
  
  if(type==='thread'){
    // Navigate to chat page with this thread
    activeThread=actualId;
    navTo('chat');
  } else if(type==='todo'){
    // Navigate to todo and open task
    navTo('todo');
    if(todoView!=='list'){todoView='list';renderTodos();}
    setTimeout(()=>{
      const task=findTask(actualId);
      if(task) openTaskMenu(actualId);
    },100);
  } else if(type==='cal'){
    // Navigate to calendar
    navTo('calendar');
  }
}

function renderApprovals(){

  if(!list)return;
  list.innerHTML='<div style="text-align:center;padding:40px;color:var(--dim);font-size:13px">Loading approvals...</div>';
  
  fetch('/api/approvals')
    .then(r=>r.json())
    .then(data=>{
      if(!data.ok){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Failed to load approvals</div>';return;}
      
      const items=data.items||[];
      const count=$('approvalsCount');
      if(count)count.textContent=items.length+' pending';
      
      if(items.length===0){
        list.innerHTML='<div style="text-align:center;padding:40px;color:var(--dim);font-size:13px">✅ No pending approvals</div>';
        return;
      }
      
      list.innerHTML=items.map(item=>{
        const date=new Date(item.createdAt);
        const timestamp=date.toLocaleDateString()+' '+date.toLocaleTimeString();
        const fullText = item.description || item.command || item.text || '';
        const itemId = item.id.replace(/[^a-zA-Z0-9]/g,'_');
        // Collapsed preview: first 120 chars
        const preview = fullText.length > 120 ? fullText.slice(0,117)+'…' : fullText;

        return `<div class="card" id="card-${itemId}" style="padding:12px;background:var(--surface);border:1px solid var(--line);border-radius:8px;cursor:pointer" onclick="toggleApprovalDetail('${itemId}')">

          </div>
          <div id="preview-${itemId}" style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;white-space:pre-wrap">${esc(preview)}</div>
          <div id="detail-${itemId}" style="display:none;margin-bottom:10px;padding:10px;background:var(--bg);border:1px solid var(--line);border-radius:6px;font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto">${esc(fullText)}</div>
          <div style="display:flex;gap:6px;justify-content:flex-end;align-items:center">
            <span id="expand-${itemId}" style="font-size:11px;color:var(--dim);margin-right:auto">${needsExpand ? '▼ Click to expand' : ''}</span>

            <button class="btn" style="background:var(--green);color:#fff;padding:6px 16px;font-size:12px;border-radius:6px" onclick="event.stopPropagation();approveItem('${item.id}')">✓ Approve</button>
            <button class="btn" style="background:var(--red);color:#fff;padding:6px 16px;font-size:12px;border-radius:6px" onclick="event.stopPropagation();declineItem('${item.id}')">✗ Decline</button>
          </div>
        </div>`;
      }).join('');

      list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Error: '+esc(err.message)+'</div>';
    });
}

  fetch('/api/approvals/'+id+'/approve',{method:'POST'})

      if(data.ok){renderApprovals();}
      else{alert('Failed to approve: '+(data.error||'Unknown error'));}

function declineItem(id){
  fetch('/api/approvals/'+id+'/decline',{method:'POST'})
    .then(r=>r.json())
    .then(data=>{
      if(data.ok){renderApprovals();}
      else{alert('Failed to decline: '+(data.error||'Unknown error'));}
    })

}


function toggleApprovalDetail(itemId){
  const detail=document.getElementById('detail-'+itemId);
  const preview=document.getElementById('preview-'+itemId);
  const btn=document.getElementById('btn-'+itemId);
  const expand=document.getElementById('expand-'+itemId);
  if(!detail) return;
  if(detail.style.display==='none'){
    detail.style.display='block';
    preview.style.display='none';
    btn.textContent='📄 Less';
    expand.textContent='▲ Click to collapse';
  }else{
    detail.style.display='none';
    preview.style.display='block';
    btn.textContent='📄 More';
    expand.textContent='▼ Click to expand';
  }
}

async function renderAITeam(){
  const log=document.getElementById('aiTeamLog');
  const agentList=document.getElementById('agentStatusList');
  if(!log)return;
  log.innerHTML='<div style="text-align:center;padding:40px;color:var(--dim);font-size:13px">Loading team activity...</div>';
  agentList.innerHTML='';

  try{
    // Fetch agent status from :1707
    let agents=[];
    try{
      const r=await fetch('/agents/api/tasks');
      const d=await r.json();
      if(d.tasks){
        // Get unique agent types from tasks
        const agentTypes=[...new Set(d.tasks.map(t=>t.agent_type).filter(Boolean))];
        agents=agentTypes.map(t=>({name:t,status:'idle',type:t}));
      }
    }catch(e){}

    // Fetch activity from dashboard state
    let activities=[];
    try{
      const r=await fetch('/api/state');
      const s=await r.json();
      if(s.ops&&s.ops.activity){
        activities=s.ops.activity.slice(0,50);
      }
    }catch(e){}

    // Fetch approvals
    let approvals=[];
    try{
      const r=await fetch('/api/approvals');
      const d=await r.json();
      if(d.ok&&d.items)approvals=d.items;
    }catch(e){}

    // Build agent list
    const allAgents=[
      {id:'kaneki-ken',name:'Kaneki Ken',division:'Executive',status:'active',emoji:'🫡'},
      {id:'chief-of-staff',name:'Chief of Staff',division:'Executive',status:'active',emoji:'📋'},
      {id:'ops-director',name:'Ops Director',division:'Operations',status:'active',emoji:'📊'},
      {id:'devops-agent',name:'DevOps',division:'Development',status:'active',emoji:'⚙️'},
      {id:'frontend-dev',name:'Frontend Dev',division:'Development',status:'idle',emoji:'🎨'},
      {id:'backend-dev',name:'Backend Dev',division:'Development',status:'idle',emoji:'🔧'},
      {id:'content-director',name:'Content Director',division:'Content',status:'active',emoji:'🎬'},
      {id:'writer-agent',name:'Writer',division:'Content',status:'idle',emoji:'✍️'},
      {id:'research-director',name:'Research Director',division:'Research',status:'active',emoji:'🔬'},
      {id:'data-analyst',name:'Data Analyst',division:'Research',status:'idle',emoji:'📈'},
      {id:'grademy-lead',name:'Grademy Lead',division:'Grademy',status:'idle',emoji:'🎓'},

      {id:'rema-exteriors-lead',name:'Rema Lead',division:'Rema',status:'idle',emoji:'🏠'},

    // Add ops activity
    for(const a of activities){
      feed.push({type:'activity',title:a.text,agent:a.source||'System',description:'',time:a.at,icon:'📋'});
    }

    // Sort by time desc
    feed.sort((a,b)=>new Date(b.time)-new Date(a.time));

    // Filter by channel

function renderPage(id){
  const main=$('appMain');
  if(!main)return;
  if(pages[id])main.innerHTML=pages[id];
  activePage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  var target=main.querySelector('#'+id);
  if(target)target.classList.add('active');
  navButtons();
  // Render specific page
  if(id==='home')renderHomeStats();
  if(id==='todo')renderTodos();
  if(id==='board')renderBoard();
  if(id==='projects')renderProjects();
  if(id==='calendar'){renderTimetableConfig();generateTimetableForDate(selectedDate||todayKey())}
  if(id==='calendar')renderCalendar();
  if(id==='chat'){_lastActiveThread=null;if(typeof renderChat==='function')renderChat();}
  if(id==='content'){switchContentTab('board');renderContentBoard();}
  if(id==='skills')renderSkills();
  if(id==='docs')renderDocs();
  if(id==='goals'){renderGoals();}else if(id==='secrets')renderSecrets();
  if(id==='inbox')renderInbox();
  if(id==='gallery')renderGallery();
  if(id==='vault'){renderVault();}
  if(id==='approvals')renderApprovals();
  if(id==='aiTeam')renderAITeam();
}

function navTo(id){
  if(id==='project-detail'){
    const main=$('appMain');if(main)main.innerHTML=pages.projectDetail;
    activePage='project-detail';
    navButtons();
    renderProjectDetail();
    return;
  }
  renderPage(id);
  // Switch to this page's thread if it exists
  const tid=pageThreads[id];
  if(tid){ activeThread=tid; renderChatHist(); }
  // Load OpenCode iframe when navigating to workspace
  if(id==='workspace'){
    const frame=$('ocFrame');
    if(frame&&frame.src==='about:blank'){
      frame.src='http://100.111.98.27:1704/';
      setTimeout(()=>{const ld=$('ocLoading');if(ld)ld.style.display='none';},2000);
    }

    <div class="actions">
      <button id="callMuteBtn" onclick="toggleMute()" title="Mute">🔇</button>
      <button id="callEndBtn" class="end-call" onclick="endCall()" title="End call">📞</button>
    </div>
  </div>
</div>`;
  document.body.appendChild(callWidget);

  // ─── Audio Processing Engine ───
  // Local HTML escaper
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  let callActive=false,callMuted=false,callSeconds=0,callTimer=null;
  let callRecognition=null,callSpeaking=false,callAudioCtx=null;
  let callSilenceTimer=null,callNoiseFloor=0,callIsSpeaking=false;
  let callSensitivity=30; // 0-100, lower = less sensitive
  let callFinalTranscript='';

  // Sensitivity slider
  document.getElementById('sensitivitySlider').oninput=function(){
    callSensitivity=parseInt(this.value);
    document.getElementById('sensitivityLabel').textContent=callSensitivity+'%';
  };

  // ─── Noise Gate + Voice Activity Detection via Web Audio API ───
  function initAudioProcessor(){
    try{
      callAudioCtx=new (window.AudioContext||window.webkitAudioContext)();
      const stream=navigator.mediaDevices?null:null; // we use SR's own mic access
    }catch(e){ console.warn('[call] AudioContext not available:',e); }
  }

  // ─── Smart sentence detection ───
  // Detects when user finishes speaking based on:
  // 1. Silence duration after speech
  // 2. Speech confidence threshold
  // 3. Minimum utterance length (ignore tiny blips)
  // 4. Noise floor calibration
  const SILENCE_THRESHOLD_MS = 800;   // ms of silence = end of sentence
  const MIN_UTTERANCE_MS = 300;       // ignore speech shorter than this
  const MIN_CONFIDENCE = 0.45;        // ignore low-confidence results
  const NOISE_FLOOR_SAMPLES = 50;     // samples to calibrate noise floor

  callSensitivity = parseInt(localStorage.getItem('callSensitivity')||'30');

  function calibrateNoiseFloor(){
    // Calibrate during first 1.5s of listening
    callNoiseFloor = 0;
    let samples = 0;
    const calInterval = setInterval(()=>{
      samples++;
      if(samples >= NOISE_FLOOR_SAMPLES){
        clearInterval(calInterval);
        callNoiseFloor = Math.max(callNoiseFloor, 0.02);
        console.log('[call] Noise floor calibrated:', callNoiseFloor.toFixed(4));
      }
    }, 30);
  }

  function isSignificantSpeech(confidence, transcript){
    if(confidence < MIN_CONFIDENCE) return false;
    if(!transcript || transcript.trim().length < 2) return false;
    // Filter out common noise patterns
    const noisePatterns = [/^(um|uh|ah|er|hmm|mm|mhm|the|i|a|an|is|it|to|and|or|but|in|on|at|for|of|with|this|that|be|was|are|has|had|do|did|will|can|could|would|should|may|might|shall|not|very|just|so|if|then|than|too|also|only|even|still|already|since|because|when|where|what|which|who|how|why|all|each|every|both|few|more|most|other|some|such|no|nor|as|by|from|up|out|about|into|over|after|before|between|under|above|below|through|during|without|within|along|across|behind|beyond|near|off|onto|upon|among|throughout|despite|towards|regarding|concerning|including|following|according|per|via|versus|etc|okay|ok|yes|no|yeah|yep|nah|hey|hi|hello|bye|goodbye|thanks|thank|please|sorry|excuse|wow|oh|oops|ouch|ugh|phew|whew|aha|bravo|cheers|damn|dang|gee|gosh|ha|huh|jeez|sheesh|whoa|yikes|yay|yo|sup|wassup|bruh|bro|dude|man|dude|guys|guys|everyone|somebody|nobody|nothing|something|anything|everything|anybody|everybody)$/i];
    const trimmed = transcript.trim().toLowerCase();
    if(noisePatterns.test(trimmed)) return false;
    return true;
  }

  function processFinalTranscript(text){
    if(!text || text.trim().length < 2) return;
    const log=document.getElementById('callLog');
    const status=document.getElementById('callStatus');
    const wave=document.getElementById('callWave');
    wave.classList.remove('listening');
    log.innerHTML+=`<div class="msg user-msg"><div class="msg-label">YOU</div>${esc(text)}</div>`;
    log.scrollTop=log.scrollHeight;
    status.textContent='— thinking...';
    callSpeaking=true;
    sendToAI(text);
  }

  async function sendToAI(text){
    const log=document.getElementById('callLog');
    const status=document.getElementById('callStatus');
    const wave=document.getElementById('callWave');
    try{
      // First try the dashboard /api/commands endpoint
      const r=await fetch('/api/commands',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:text,threadId:'voice-call',send:true,voice:true})
      });
      const data=await r.json();
      let reply=data.reply||data.text;
      // If the dashboard queued it, wait for the AI response via SSE
      if(!reply && data.ok){
        reply=await waitForVoiceResponse(text);
      }
      if(!reply) reply='Got it.';
      log.innerHTML+=`<div class="msg ai-msg"><div class="msg-label">AI</div>${esc(reply)}</div>`;
      log.scrollTop=log.scrollHeight;
      status.textContent='— speaking...';
      speakResponse(reply);
    }catch(e){
      log.innerHTML+=`<div class="msg sys-msg">⚠️ Connection error: ${esc(e.message)}</div>`;
      status.textContent='— error';
      callSpeaking=false;
      if(callActive) startListening();
    }
  }

  // Wait for AI response by polling the voice-call thread
  function waitForVoiceResponse(originalText){
    return new Promise((resolve)=>{
      let attempts=0;
      const maxAttempts=30;
      const check=setInterval(async()=>{
        attempts++;
        if(attempts>maxAttempts){clearInterval(check);resolve(null);return;}
        try{
          const r=await fetch('/api/trace-stream?threadId=voice-call');
          if(r.ok){
            const reader=r.body.getReader();
            const decoder=new TextDecoder();
            let buffer='';
            while(true){
              const {done,value}=await reader.read();
              if(done) break;
              buffer+=decoder.decode(value,{stream:true});
              const lines=buffer.split('\n');
              for(const line of lines){
                if(line.startsWith('data:')){
                  try{
                    const d=JSON.parse(line.slice(5));
                    if(d.role==='assistant' && d.text && d.text!=='Thinking…'){
                      clearInterval(check);
                      resolve(d.text);
                      return;
                    }
                  }catch(e){}
                }
              }
            }
          }
        }catch(e){}
      },1000);
    });
  }

  function speakResponse(text){
    const status=document.getElementById('callStatus');
    const wave=document.getElementById('callWave');
    if(!('speechSynthesis' in window)){
      status.textContent='— listening...';
      callSpeaking=false;
      if(callActive) startListening();
      return;
    }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=1.1; u.pitch=1.0; u.volume=1.0;
    u.onstart=()=>{ wave.classList.remove('listening'); };
    u.onend=()=>{
      if(callActive){
        status.textContent='— listening...';
        wave.classList.add('listening');
        callSpeaking=false;
        startListening();
      }
    };
    u.onerror=()=>{
      status.textContent='— listening...';
      callSpeaking=false;
      if(callActive) startListening();
    };
    window.speechSynthesis.speak(u);
  }

  function startListening(){
    if(!callActive || callMuted) return;
    try{
      if(callRecognition){ callRecognition.stop(); }
      callRecognition=null;
    }catch(e){}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    callRecognition=new SR();
    callRecognition.continuous=true;
    callRecognition.interimResults=true;
    callRecognition.lang='en-US';
    callRecognition.maxAlternatives=1;

    let speechStartTime=0;
    let lastSpeechTime=0;

    callRecognition.onresult=function(e){
      const now=Date.now();
      let interimTranscript='';
      let finalTranscript='';
      let bestConfidence=0;

      for(let i=e.resultIndex;i<e.results.length;i++){
        const result=e.results[i];
        const transcript=result[0].transcript;
        const confidence=result[0].confidence||0;
        if(result.isFinal){
          if(confidence>bestConfidence){
            finalTranscript=transcript;
            bestConfidence=confidence;
          }
        }else{
          interimTranscript+=transcript;
        }
      }

      // Show interim in wave visual
      if(interimTranscript){
        document.getElementById('callWave').classList.add('listening');
        lastSpeechTime=now;
        if(!speechStartTime) speechStartTime=now;
      }

      // Process final results
      if(finalTranscript && isSignificantSpeech(bestConfidence, finalTranscript)){
        const utteranceDuration = now - speechStartTime;
        if(utteranceDuration >= MIN_UTTERANCE_MS){
          // Smart silence-based sentence detection
          clearTimeout(callSilenceTimer);
          callFinalTranscript = finalTranscript.trim();
          lastSpeechTime = now;
          // Wait for silence to confirm end of sentence
          callSilenceTimer = setTimeout(()=>{
            if(callActive && !callSpeaking && callFinalTranscript){
              processFinalTranscript(callFinalTranscript);
              callFinalTranscript='';
            }
          }, SILENCE_THRESHOLD_MS);
        }
      }

      // Also handle interim → if long enough silence after interim, process it
      if(interimTranscript && !finalTranscript){
        clearTimeout(callSilenceTimer);
        callSilenceTimer = setTimeout(()=>{
          const trimmed = interimTranscript.trim();
          if(callActive && !callSpeaking && trimmed.length > 2 && isSignificantSpeech(0.6, trimmed)){
            processFinalTranscript(trimmed);
          }
        }, SILENCE_THRESHOLD_MS + 400);
      }
    };

    callRecognition.onerror=function(e){
      console.warn('[call] SR error:',e);
      if(callActive && !callSpeaking){
        setTimeout(()=>{ if(callActive) startListening(); }, 500);
      }
    };

    callRecognition.onend=function(){
      if(callActive && !callSpeaking){
        try{ callRecognition.start(); }catch(e){}
      }
    };

    try{
      callRecognition.start();
      document.getElementById('callWave').classList.add('listening');
    }catch(e){}
  }

  window.startCall=function(){
    const panel=document.getElementById('callPanel');
    const log=document.getElementById('callLog');
    const status=document.getElementById('callStatus');
    const btn=document.getElementById('callBtn');
    const wave=document.getElementById('callWave');
    const timer=document.getElementById('callTimer');
    panel.classList.add('open');
    btn.classList.add('listening');
    btn.innerHTML='🔴';
    status.textContent='— listening...';
    callActive=true;callSeconds=0;callMuted=false;
    timer.textContent='0:00';
    callTimer=setInterval(()=>{
      callSeconds++;
      const m=Math.floor(callSeconds/60),s=callSeconds%60;
      timer.textContent=m+':'+String(s).padStart(2,'0');
    },1000);
    initAudioProcessor();
    calibrateNoiseFloor();
    startListening();
  };

  window.endCall=function(){
    callActive=false;callSpeaking=false;callMuted=false;
    clearTimeout(callSilenceTimer);
    if(callRecognition){try{callRecognition.stop();}catch(e){}}
    callRecognition=null;
    if(callTimer){clearInterval(callTimer);callTimer=null;}
    window.speechSynthesis&&window.speechSynthesis.cancel();
    const btn=document.getElementById('callBtn');
    btn.classList.remove('listening');
    btn.classList.remove('processing');
    btn.innerHTML='🎤';
    document.getElementById('callStatus').textContent='— ended';
    document.getElementById('callTimer').textContent='';
    document.getElementById('callWave').classList.remove('listening');
  };

  window.closeCall=function(){endCall();document.getElementById('callPanel').classList.remove('open')};

  window.toggleMute=function(){
    callMuted=!callMuted;
    const btn=document.getElementById('callMuteBtn');
    btn.innerHTML=callMuted?'🔈':'🔇';
    btn.classList.toggle('active');
    if(callMuted){
      if(callRecognition) try{callRecognition.stop();}catch(e){}
      document.getElementById('callWave').classList.remove('listening');
    }else{
      if(callActive) startListening();
    }
  };

  document.getElementById('callBtn').onclick=function(){
    if(callActive){endCall();}else{startCall();}
  };
  document.getElementById('globalVoiceBtn')&&document.getElementById('globalVoiceBtn').remove();
  // Reposition when slack opens
  const origToggleClick=toggle.onclick;
  toggle.onclick=()=>{
    origToggleClick();
    if(panel.style.right==='0px')voiceBtn.style.right='405px';
    else voiceBtn.style.right='0';
  };
});

function renderBrainModules(){
  const container = document.getElementById('brainDashModules');
  if(!container) return;
  
  const mods = BRAIN_MODULES;
  // Calculate orbit positions
  const cw = container.offsetWidth || window.innerWidth - 240;
  const ch = container.offsetHeight || (window.innerHeight - 100);
  const cx = cw / 2;
  const cy = ch / 2;
  const rx = Math.min(cx * 0.42, 200);
  const ry = Math.min(cy * 0.38, 170);
  
  // Determine positions: use saved or calculate from orbit
  const hasSaved = mods.some(m => m.x && m.y);
  
  if(!hasSaved){
    // Assign orbit positions
    const angles = [0, 45, 90, 135, 180, 225, 270, 315].map(d => d * Math.PI / 180);
    mods.forEach((m, i) => {
      const a = angles[i % angles.length];
      m.x = cx + rx * Math.cos(a) - m.w/2;
      m.y = cy + ry * Math.sin(a) - 30;
    });
  }
  
  // Determine sizing
  const isMobile = window.innerWidth < 768;
  
  container.innerHTML = mods.map(m => {
    const posStyle = isMobile ? '' : `left:${m.x}px;top:${m.y}px;width:${m.w}px`;
    return `<div class="brain-module ${m.pinned?'pinned':''}" id="bm_${m.id}" style="${posStyle}"
      onmousedown="brainDragStart(event,'${m.id}')">
      <div class="bm-hdr">
        <span class="bm-dot" style="background:${m.color}"></span>
        <span class="bm-icon">${m.icon}</span>
        <span class="bm-label">${m.label}</span>
        <button class="bm-pin ${m.pinned?'pinned':''}" onclick="event.stopPropagation();toggleBrainPin('${m.id}')" title="Pin">📌</button>
      </div>
      <div class="bm-body" id="bmBody_${m.id}">
        <div style="text-align:center;padding:8px;color:var(--dim);font-size:10px">⟳ Loading...</div>
      </div>
      <div class="bm-resize" onmousedown="brainResizeStart(event,'${m.id}')"></div>
    </div>`;
  }).join('');
  
  // Now fill content
  refreshBrainContent();
}
