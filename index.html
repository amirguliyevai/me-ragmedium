<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Agent Command — Amir's Empire</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
/* ════════════════════════════════════════════════════════════════
   AGENT COMMAND v3 — Cyberpunk Command Center
   LIVE WIRED — no hardcoded agents/projects/data
   All 15 feedback items addressed
   ════════════════════════════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070d;--bg2:#080b12;--bg3:#0b1019;--bg4:#0a0e16;
  --surface:rgba(28,28,34,0.6);--elevated:rgba(40,40,50,0.55);
  --glass:rgba(255,255,255,0.04);--glass-strong:rgba(255,255,255,0.08);
  --line:rgba(255,255,255,0.06);--line-active:rgba(255,255,255,0.12);
  --text:#eaf6ff;--text2:#c2d2e2;--text3:#9fb3c8;--muted:#6b7a90;--dim:#5b6b82;
  --cyan:#18e0ff;--cyan-glow:rgba(24,224,255,0.3);
  --green:#2fe08a;--amber:#ffb020;--red:#ff4d5e;--pink:#ff5cc8;--purple:#9b7bff;
  --blue:#7b9bff;
  --rail-w:420px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Audiowide','IBM Plex Sans',system-ui,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
/* FONTS */
@import url('https://fonts.googleapis.com/css2?family=Audiowide&family=IBM+Plex+Sans:wght@400;500;600&display=swap&v=31');

/* ═══ APP LAYOUT (resizable right rail) ═══ */
#app{display:grid;grid-template-columns:74px 1fr 4px var(--rail-w);height:100vh;background:var(--bg);position:relative;overflow:hidden;min-width:0}
#app::before{content:'';position:absolute;inset:0;z-index:60;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(24,224,255,0.025) 0 1px,transparent 1px 3px);mix-blend-mode:screen;animation:acScan 1.2s steps(3) infinite;opacity:.5}
@keyframes acScan{0%{transform:translateY(0)}100%{transform:translateY(6px)}}
@keyframes acPulse{0%,100%{box-shadow:0 0 0 0 rgba(24,224,255,0.5)}50%{box-shadow:0 0 0 5px rgba(24,224,255,0)}}
@keyframes acRise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ LEFT RAIL ═══ */
#leftRail{grid-column:1;border-right:1px solid var(--line);background:linear-gradient(180deg,#080b12,#06080d);display:flex;flex-direction:column;align-items:center;padding:14px 0;overflow-y:auto;z-index:20}
.brand-mark{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(24,224,255,0.4);color:var(--cyan);font-family:'Audiowide';font-weight:700;font-size:15px;box-shadow:0 0 18px rgba(24,224,255,0.25);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);margin-bottom:18px;cursor:pointer}
.nav-main-btn{appearance:none;width:58px;padding:7px 0 5px;margin-bottom:4px;background:transparent;border:0;border-left:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);font-family:'Audiowide';transition:.15s}
.nav-main-btn:hover{color:var(--text2);background:rgba(24,224,255,0.05)}
.nav-main-btn.active{color:var(--cyan);border-left-color:var(--cyan);background:rgba(24,224,255,0.08)}
.nav-main-btn .glyph{font-size:17px;line-height:1}
.nav-main-btn .lbl{font-size:8.5px;letter-spacing:.06em;text-transform:uppercase}
.nav-divider{width:34px;height:1px;background:rgba(24,224,255,0.14);margin:10px 0}
.nav-side-btn{appearance:none;width:58px;padding:8px 0 6px;margin-bottom:3px;background:rgba(255,255,255,0.02);border:1px solid transparent;border-radius:8px;color:#ffffff;font-family:'Audiowide';font-size:10px;font-weight:600;letter-spacing:.02em;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.nav-side-btn:hover{color:#ffffff;background:rgba(24,224,255,0.12);border-color:rgba(24,224,255,0.3);transform:translateX(1px)}
.nav-side-btn.active{color:#ffffff;background:linear-gradient(135deg,rgba(24,224,255,0.18),rgba(255,92,200,0.12));border-color:rgba(24,224,255,0.5);box-shadow:0 0 14px rgba(24,224,255,0.25)}
.nav-side-btn .ico{font-size:18px;line-height:1;display:block}
.nav-side-btn .lbl{font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}

/* ═══ MAIN ═══ */
#main{grid-column:2;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);position:relative}
.topbar{height:48px;border-bottom:1px solid var(--line);background:rgba(8,11,18,0.8);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;backdrop-filter:blur(10px)}
.topbar .title{font-family:'Audiowide';font-weight:700;font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--text)}
.topbar .title em{color:var(--cyan);font-style:normal}
.topbar .clock{margin-left:auto;font-family:'Audiowide';font-size:11px;color:var(--text3)}
.topbar .status{display:flex;align-items:center;gap:6px;font-family:'Audiowide';font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.06em}
.topbar .status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:acPulse 1.6s infinite}

#content{flex:1;overflow:hidden;position:relative;min-height:0}
.page{position:absolute;inset:0;display:none;overflow:hidden}
.page.active{display:flex;flex-direction:column}
.page-padded{padding:16px;overflow-y:auto;flex:1}

/* ═══ RESIZER ═══ */
#railResizer{grid-column:3;width:4px;cursor:col-resize;background:transparent;position:relative;z-index:25;height:100%;flex-shrink:0;align-self:stretch}
#railResizer:hover,#railResizer.dragging{background:var(--cyan);box-shadow:0 0 8px var(--cyan-glow)}

/* ─── Side nav overlay (PWA-friendly) ─── */
.navOverlayToggle{display:none;position:fixed;top:10px;left:10px;z-index:200;width:40px;height:40px;border-radius:50%;background:rgba(24,224,255,0.18);border:1px solid var(--cyan);color:var(--cyan);font-size:20px;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all .15s}
.navOverlayToggle:hover{background:rgba(24,224,255,0.32);transform:scale(1.08)}
.navOverlayBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:140;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.navOverlayBackdrop.open{display:block}
.sideRail-overlay{position:fixed;left:0;top:0;bottom:0;width:240px;background:rgba(8,11,18,0.96);border-right:1px solid var(--cyan-glow);z-index:160;transform:translateX(-100%);transition:transform .22s ease;overflow-y:auto;padding:18px 8px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:8px 0 40px rgba(0,0,0,0.6)}
.sideRail-overlay.open{transform:translateX(0)}
.sideRail-overlay .nav-side-btn{width:100%;flex-direction:row;justify-content:flex-start;padding:10px 14px;margin-bottom:4px;font-size:11px;gap:10px;border-radius:8px;color:var(--text)}
.sideRail-overlay .nav-side-btn .ico{font-size:16px}
.sideRail-overlay .nav-side-btn .lbl{font-size:10px;text-transform:none;letter-spacing:0}
.sideRail-overlay .nav-side-btn.active{background:linear-gradient(135deg,rgba(24,224,255,0.22),rgba(255,92,200,0.10))}
.sideRail-overlay .nav-section-title{font-family:Audiowide;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:14px 14px 4px;opacity:.7}
.sideRail-overlay .nav-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(255,92,200,0.15);border:1px solid var(--pink);color:var(--pink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ─── Subscribe button + push UI ─── */
.push-sub{display:flex;align-items:center;gap:8px;padding:10px 14px;margin:6px 8px 8px;border-radius:10px;background:rgba(24,224,255,0.06);border:1px solid rgba(24,224,255,0.25);color:var(--text);font-family:'Audiowide';font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;width:calc(100% - 16px);text-align:left;transition:all .15s}
.push-sub:hover{background:rgba(24,224,255,0.18);border-color:var(--cyan)}
.push-sub.subscribed{background:rgba(0,200,140,0.12);border-color:var(--green)}
.push-sub.unsupported{opacity:0.5;cursor:not-allowed}
.push-sub .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:pulse 2s infinite}
.push-sub.subscribed .dot{background:var(--green);animation:none}
.push-sub.unsupported .dot{background:var(--red);animation:none}

@media (max-width:768px){
  .navOverlayToggle{display:flex !important}
  #sideRail{position:fixed !important;left:-300px;top:0;height:100vh;z-index:160;background:rgba(8,11,18,0.96);box-shadow:8px 0 40px rgba(0,0,0,0.6);transition:left .22s ease}
  #sideRail.mobileOpen{left:0}
  .fab-call{bottom:14px !important;right:14px !important}
}

/* ─── Pulse animation ─── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* ═══ RIGHT RAIL ═══ */
#rightRail{grid-column:4;border-left:1px solid var(--line);background:linear-gradient(180deg,#080b12,#06080d);display:flex;flex-direction:column;overflow:hidden;min-width:300px;min-height:0}
.rail-tabs{display:flex;border-bottom:1px solid var(--line);background:rgba(8,11,18,0.5)}
.rail-tab{flex:1;padding:10px 8px;background:transparent;border:0;color:var(--muted);font-family:'Audiowide';font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent}
.rail-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(24,224,255,0.05)}
.rail-content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* ═══ STAT CARDS ═══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent,var(--cyan))}
.stat-card .lbl{font-family:'Audiowide';font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.stat-card .val{font-family:'Audiowide';font-weight:700;font-size:24px;color:var(--text);margin-top:4px;letter-spacing:.04em}
.stat-card .sub{font-size:10px;color:var(--dim);margin-top:2px}

/* ═══ PROGRESS BARS ═══ */
.prog-row{padding:10px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;border-left:3px solid var(--proj-color,var(--cyan));transition:all .15s;cursor:pointer}
.prog-row:hover{border-color:var(--cyan);background:rgba(24,224,255,0.05)}
.prog-row .prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
.prog-row .prog-name{font-size:12px;font-weight:600;color:var(--text);text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-row .prog-count{font-size:9px;color:var(--muted);font-family:'Audiowide';white-space:nowrap}
.prog-row .prog-bar{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;display:flex}
.prog-row .prog-bar .seg{height:100%;transition:width .4s}
.prog-row .prog-bar .seg.done{background:var(--green)}
.prog-row .prog-bar .seg.wip{background:var(--cyan);box-shadow:0 0 6px var(--cyan-glow)}
.prog-row .prog-bar .seg.review{background:var(--pink)}
.prog-row .prog-bar .seg.todo{background:var(--purple)}
.prog-row .prog-bar .seg.blocked{background:var(--red);animation:acPulse 1.6s infinite}
.prog-row .prog-bar .seg.backlog{background:var(--dim)}
.prog-row .prog-leg{display:flex;gap:8px;margin-top:6px;font-size:9px;font-family:'Audiowide';color:var(--muted)}
.prog-row .prog-leg .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.prog-row .alert-flag{margin-left:auto;background:var(--red);color:#fff;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;animation:acPulse 1.6s infinite}

/* ═══ AGENT CARDS ═══ */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.agent-card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);position:relative;overflow:hidden}
.agent-card:hover{border-color:var(--cyan);background:rgba(24,224,255,0.05)}
.agent-card .head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.agent-avatar{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Audiowide';font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.agent-card .name{font-size:13px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-card .role{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Audiowide'}
.agent-card .team{font-size:9px;color:var(--muted);font-family:'Audiowide';text-transform:uppercase;letter-spacing:.06em}
.agent-card .actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.agent-card .actions button{flex:1;padding:5px 8px;background:transparent;border:1px solid var(--line);border-radius:5px;color:var(--text3);font-size:10px;font-family:'Audiowide';text-transform:uppercase;letter-spacing:.05em;cursor:pointer}
.agent-card .actions button:hover{border-color:var(--cyan);color:var(--cyan)}
.agent-card .actions button.call{border-color:rgba(24,224,255,0.4);background:linear-gradient(90deg,rgba(24,224,255,0.1),rgba(255,92,200,0.1));color:var(--cyan)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green);animation:acPulse 1.6s infinite}
.status-dot.online{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.status-dot.idle{background:var(--dim)}
.status-dot.offline{background:var(--red);opacity:0.5}

/* ═══ KANBAN ═══ */
.kanban{display:flex;gap:10px;overflow-x:auto;padding:14px;height:100%}
.kanban-col{min-width:222px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:10px;display:flex;flex-direction:column}
.kanban-col h3{font-family:'Audiowide';font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.kanban-col .count{font-size:11px;color:var(--text);background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px}
.kanban-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.task-card{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:8px 10px;cursor:pointer;transition:all .15s;border-left:3px solid var(--project-color,var(--cyan))}
.task-card:hover{border-color:var(--cyan)}
.task-card .title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.task-card .meta{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted);font-family:'Audiowide'}
.task-card .meta .pri{padding:1px 5px;border-radius:3px;font-weight:700}
.task-card .meta .pri.P0{background:rgba(255,77,94,0.2);color:var(--red)}
.task-card .meta .pri.P1{background:rgba(255,176,32,0.2);color:var(--amber)}
.task-card .meta .pri.P2{background:rgba(24,224,255,0.2);color:var(--cyan)}
.task-card .meta .pri.P3{background:rgba(107,122,144,0.2);color:var(--dim)}

/* ═══ ACTIVITY FEED ═══ */
.feed{flex:1;overflow-y:auto;padding:12px}
.feed-item{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--line);align-items:flex-start}
.feed-item .icon{width:24px;height:24px;border-radius:4px;background:rgba(24,224,255,0.1);color:var(--cyan);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.feed-item.ask{border-left:3px solid var(--amber);background:rgba(255,176,32,0.04)}
.feed-item.perm{border-left:3px solid var(--red);background:rgba(255,77,94,0.04)}
.feed-item.done{border-left:3px solid var(--green)}
.feed-item .body{flex:1;min-width:0}
.feed-item .verb{font-size:12px;color:var(--text);font-weight:500}
.feed-item .verb em{color:var(--cyan);font-style:normal}
.feed-item .obj{color:var(--pink);font-size:11px;margin-top:2px}
.feed-item .time{font-size:9px;color:var(--dim);font-family:'Audiowide';margin-top:4px;text-transform:uppercase}
.feed-item .actions{margin-top:6px;display:flex;gap:6px}

/* ═══ SLACK ═══ */
.slack-wrap{display:flex;height:100%;min-height:0}
.slack-channels{width:160px;border-right:1px solid var(--line);background:rgba(8,11,18,0.5);overflow-y:auto;padding:10px 0;flex-shrink:0}
.slack-ch{font-family:'Audiowide';font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:4px 14px;margin-top:8px}
.slack-item{display:flex;align-items:center;gap:8px;padding:5px 14px;cursor:pointer;font-size:11px;color:var(--text3);transition:all .1s}
.slack-item:hover{background:rgba(24,224,255,0.05);color:var(--text)}
.slack-item.active{background:rgba(24,224,255,0.1);color:var(--cyan);border-left:2px solid var(--cyan)}
.slack-item .hash{color:var(--dim);font-size:10px;width:14px}
.slack-item .unread{margin-left:auto;background:var(--pink);color:#fff;font-size:9px;padding:0 5px;border-radius:8px;font-weight:700}
.slack-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.slack-header{padding:10px 14px;border-bottom:1px solid var(--line);background:rgba(8,11,18,0.5);display:flex;align-items:center;gap:10px;flex-shrink:0}
.slack-header .name{font-family:'Audiowide';font-weight:700;font-size:13px;color:var(--text)}
.slack-header .topic{font-size:10px;color:var(--muted)}
.slack-messages{flex:1;overflow-y:auto;padding:12px;min-height:0}
.slack-msg{display:flex;gap:10px;padding:6px 8px;border-radius:6px;margin-bottom:6px;transition:background .15s}
.slack-msg:hover{background:rgba(255,255,255,0.02)}
.slack-msg .avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Audiowide';font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
.slack-msg .bubble{flex:1;min-width:0}
.slack-msg .who{display:flex;align-items:baseline;gap:8px}
.slack-msg .who .name{font-size:12px;font-weight:700;color:var(--cyan)}
.slack-msg .who .time{font-size:9px;color:var(--dim);font-family:'Audiowide'}
.slack-msg .text{font-size:12px;color:var(--text);line-height:1.4;margin-top:2px;white-space:pre-wrap}
.slack-input-wrap{padding:8px 10px;border-top:1px solid var(--line);background:rgba(8,11,18,0.5);display:flex;gap:6px;flex-shrink:0}
.slack-input-wrap input{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--text);padding:7px 10px;border-radius:5px;font-size:11px;outline:none}
.slack-input-wrap input:focus{border-color:var(--cyan)}
.slack-input-wrap button{background:rgba(24,224,255,0.15);border:1px solid var(--cyan);color:var(--cyan);padding:7px 12px;border-radius:5px;font-size:10px;font-family:'Audiowide';text-transform:uppercase;letter-spacing:.05em;font-weight:700;cursor:pointer}
.slack-input-wrap button:hover{background:rgba(24,224,255,0.3)}

/* ═══ BUTTONS ═══ */
.btn{padding:6px 12px;background:rgba(24,224,255,0.1);border:1px solid rgba(24,224,255,0.3);color:var(--cyan);border-radius:6px;font-size:11px;font-family:'Audiowide';text-transform:uppercase;letter-spacing:.06em;cursor:pointer}
.btn:hover{background:rgba(24,224,255,0.2)}
.btn.alt{background:transparent;border-color:var(--line);color:var(--text3)}
.btn.alt:hover{border-color:var(--cyan);color:var(--cyan)}
.btn.green{background:rgba(47,224,138,0.1);border-color:rgba(47,224,138,0.4);color:var(--green)}
.btn.amber{background:rgba(255,176,32,0.1);border-color:rgba(255,176,32,0.4);color:var(--amber)}
.btn.red{background:rgba(255,77,94,0.1);border-color:rgba(255,77,94,0.4);color:var(--red)}
.btn.sm{padding:4px 8px;font-size:10px}

input[type=text],input[type=search],select,textarea{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:6px;font-size:12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan-glow)}

/* ═══ MODAL ═══ */
.overlay{position:absolute;inset:0;background:rgba(5,7,13,0.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:50}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:12px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);max-width:600px;width:90%;max-height:80vh;overflow:auto}
.modal .head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .head h2{font-family:'Audiowide';font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan)}
.modal .body{padding:18px}

/* ═══ KB GRAPHENE ═══ */
.kb-graph{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-top:10px}
.kb-node{padding:8px;border-radius:6px;cursor:pointer;border:1px solid rgba(24,224,255,0.3);transition:transform .15s;position:relative}
.kb-node:hover{transform:scale(1.05);z-index:2}
.kb-node .name{font-size:10px;font-weight:600;color:#eaf6ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-node .count{font-size:9px;color:#9fb3c8;margin-top:2px}
.kb-node .edge-count{position:absolute;top:2px;right:4px;font-size:8px;color:var(--dim);font-family:'Audiowide'}

/* ═══ ORG TREE ═══ */
.org-tree{padding:14px;overflow:auto;height:100%;font-family:'Audiowide';font-size:11px}
.org-node{display:inline-block;padding:6px 12px;background:var(--surface);border:1px solid var(--line);border-radius:6px;margin:4px;color:var(--text);text-align:center;min-width:90px;cursor:pointer;transition:.15s}
.org-node:hover{border-color:var(--cyan);background:rgba(24,224,255,0.08)}
.org-node .org-name{font-weight:700;font-size:11px}
.org-node .org-sub{font-size:9px;color:var(--muted);margin-top:2px}
.org-children{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:8px;position:relative;padding-top:14px}
.org-children::before{content:'';position:absolute;top:0;left:50%;width:1px;height:14px;background:var(--line)}

/* ═══ FAB (call) ═══ */
.fab-call{position:fixed;bottom:24px;right:calc(var(--rail-w) + 24px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--pink));border:0;color:#fff;font-size:22px;cursor:pointer;z-index:80;box-shadow:0 0 24px rgba(24,224,255,0.5),0 4px 16px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab-call:hover{transform:scale(1.08);box-shadow:0 0 32px rgba(24,224,255,0.7),0 4px 20px rgba(0,0,0,0.5)}
.fab-call::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--pink));opacity:0.4;animation:acPulse 1.8s infinite}

/* ═══ RESPONSIVE ═══ */
@media (max-width:900px){
  #app{grid-template-columns:60px 1fr}
  #rightRail{position:absolute;right:0;top:0;bottom:0;width:300px;z-index:30;background:var(--bg2);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .25s}
  .rightRailOpen #rightRail{transform:translateX(0)}
  #railResizer{display:none}
  .fab-call{right:24px}
}
@media (max-width:600px){
  #app{grid-template-columns:1fr}
  #leftRail{display:none}
}

/* ═══ EMPTY STATE ═══ */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty .ico{font-size:36px;margin-bottom:8px;opacity:0.3}

/* ═══ CALENDAR / INBOX WIDGETS ═══ */
.mini-cal{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%)}

  </button>

<script>
// ─── Mobile overlay nav ───
function openOverlayNav(){
  document.getElementById('sideRailOverlay').classList.add('open');
  document.getElementById('navOverlayBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeOverlayNav(){
  document.getElementById('sideRailOverlay').classList.remove('open');
  document.getElementById('navOverlayBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── Push Notification subscribe (works on PWA + desktop) ───
async function subscribePush(evt){
  evt?.preventDefault(); evt?.stopPropagation();
  const btn = evt?.currentTarget || document.getElementById('pushSubWrap')?.querySelector('button');
  if (!('serviceWorker' in navigator)) return alert('Service worker not supported');
  if (!('PushManager' in window))    return alert('Push not supported on this browser');
  if (Notification.permission === 'denied') return alert('Notification permission denied');

  try {
    const reg = await navigator.serviceWorker.ready;
    if (Notification.permission === 'default') {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return alert('Permission not granted');
    }
    const vapidResp = await fetch('/api/notifications/vapid-key');
    const vapidData = await vapidResp.json();
    const vapidKey = vapidData.vapidKey || vapidData.publicKey;
    if (!vapidKey) return alert('No VAPID key from server (response: ' + JSON.stringify(vapidData) + ')');
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(vapidKey),
    });
    const save = await fetch('/api/notifications/subscribe', {
      method: 'POST',
      headers: {'content-type':'application/json'},
      body: JSON.stringify(sub),
    });
    const ok = save.ok;
    if (btn) btn.classList.add('subscribed');
    updatePushSubButton();
    if (ok) {
      // Show confirmation using the SAME push infrastructure
      new Notification('🛎️ Push Enabled', {body: 'You will now receive agent updates on this device. Tag: agent-notification'});
    }
    return ok;
  } catch (e) {
    console.error('subscribePush error:', e);
    alert('Subscribe failed: ' + e.message);
    return false;
  }
}

function urlB64ToUint8Array(b64){
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/\-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; ++i) out[i] = raw.charCodeAt(i);
  return out;
}

async function updatePushSubButton(){
  const wrap = document.getElementById('pushSubWrap');
  if (!wrap) return;
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    wrap.innerHTML = `<button class="push-sub unsupported" title="Not supported" style="cursor:help"><span class="dot"></span><span style="flex:1">Push unsupported</span></button>`;
    return;
  }
  let exists = null;
  try {
    const reg = await navigator.serviceWorker.ready;
    exists = await reg.pushManager.getSubscription();
  } catch(e) {}
  const isSubscribed = !!exists;
  const perm = Notification.permission;
  let label, cls;
  if (perm === 'denied') { label = 'Push blocked'; cls = 'unsupported'; }
  else if (perm === 'granted' && !isSubscribed) { label = 'Enable Push'; cls = ''; }
  else if (isSubscribed) { label = 'Push ON'; cls = 'subscribed'; }
  else { label = 'Enable Push'; cls = ''; }
  wrap.innerHTML = `<button class="push-sub ${cls}" onclick="subscribePush(event)" style="cursor:pointer"><span class="dot"></span><span style="flex:1">${label}</span></button>`;
}

// ─── Also inject the subscribe button inside the existing left rail ───
function injectDesktopSubscribe(){
  const rail = document.querySelector('.nav-side') || document.querySelectorAll('.nav-side-btn')[0]?.parentElement;
  if (!rail) return;
  const existing = document.getElementById('pushSubDesktopRail');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'pushSubDesktopRail';
  div.style.padding = '10px 6px';
  div.innerHTML = '<button class="push-sub" onclick="subscribePush(event)" title="Push notifications to this device" style="cursor:pointer"><span class="dot"></span><span style="flex:1;font-size:9px">PUSH</span></button>';
  rail.appendChild(div);
  setTimeout(updatePushSubButton, 500);
}

// Fire on DOMContentLoaded (faster) instead of window.load which can be delayed forever
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(updatePushSubButton, 100);
  setTimeout(injectDesktopSubscribe, 100);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(e=>console.error('SW err',e));
  }
});
// Also fire periodically in case load was missed
if (document.readyState === 'complete') {
  setTimeout(updatePushSubButton, 200);
  setTimeout(injectDesktopSubscribe, 200);
}

// ESC closes overlay
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlayNav();
});
</script>

<script>
// Voice call launcher — connects to live voice server on :8777 via voice-call-ui.js
function startVoiceCall(agentName){
  // voice-call-ui.js injects window.dcVoice. Use it directly for the FAB.
  if(window.dcVoice && typeof window.dcVoice.startCall === 'function'){
    // Optional: route to a specific agent
    if(agentName){
      // Pre-set the target agent via the call server's start endpoint
      fetch('/ws/voice/api/call/start', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({ agent: agentName, user: 'amir' })
      }).catch(()=>{});
    }
    window.dcVoice.startCall();
    return;
  }
  // Fallback if voice-call-ui.js hasn't loaded yet — wait briefly
  console.warn('[call] voice-call-ui.js not yet loaded, waiting…');
  let waited = 0;
  const iv = setInterval(()=>{
    waited += 100;
    if(window.dcVoice && typeof window.dcVoice.startCall === 'function'){
      clearInterval(iv);
      if(agentName){
        fetch('/ws/voice/api/call/start', {
          method: 'POST', headers: {'content-type':'application/json'},
          body: JSON.stringify({ agent: agentName, user: 'amir' })
        }).catch(()=>{});
      }
      window.dcVoice.startCall();
    } else if(waited > 3000){
      clearInterval(iv);
      // Voice server unreachable — show the dialer as last resort
      openCallDialog(agentName);
    }
  }, 100);
}
</script>

      </div>
      <div class="prog-bar">
        ${(s.done||0) ? `<div class="seg done" style="width:${segW(s.done||0)}%" title="done ${s.done}"></div>` : ''}

    </div>
  `;
}

function renderMiniCalendar(){
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = now.toLocaleString('default',{month:'long'});
  const today = now.getDate();
  const dows = ['S','M','T','W','T','F','S'];
  const events = CALENDAR_EVENTS.length ? CALENDAR_EVENTS : [];
  const eventDays = new Set(events.map(e => { try{return new Date(e.start||e.date).getDate();}catch{return 0;} }));
  let cells = '';
  for(let i=0;i<firstDay;i++) cells += '<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday = d === today;
    const hasEv = eventDays.has(d);
    cells += `<div class="cal-day${isToday?' today':''}${hasEv?' has-event':''}">${d}</div>`;
  }
  const upcoming = events.slice(0,3).map(e => `
    <div class="cal-event">
      <div style="font-weight:600;color:var(--text)">${esc(e.title||e.summary||'Event')}</div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px">${esc((e.start||e.date||'').substring(0,16))}</div>
    </div>
  `).join('') || '<div style="font-size:10px;color:var(--dim);margin-top:8px">No events. Connect Google Calendar in Settings.</div>';
  return `
    <div class="mini-cal">
      <div class="cal-head">
        <div class="cal-title">📅 ${monthName} ${year}</div>
        <a onclick="nav('calendar')" style="color:var(--cyan);font-size:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em">Open →</a>
      </div>
      <div class="cal-grid">
        ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <div style="margin-top:8px">${upcoming}</div>
    </div>
  `;
}

function buildActivity(){
  const items = [];
  // Pending approvals (highlighted as PERMISSION requests)
  APPROVALS.filter(a => a.status==='pending').forEach(a => {
    items.push({
      cls:'perm',icon:'🔐',agent:a.requested_by||'Agent',
      verb:'requests permission for',obj:a.title||'access',
      detail:a.description||a.context||'Awaiting your sign-off',
      time:timeAgo(a.created_at),
      actions:`<button class="btn green sm" onclick="approveOne('${a.id||''}')">Approve</button><button class="btn red sm" onclick="denyOne('${a.id||''}')">Deny</button>`
    });
  });
  // Blocked tasks = questions/permission
  TASKS.filter(t => t.status==='blocked').forEach(t => {
    items.push({
      cls:'perm',icon:'⛔',agent:t.assigned_to||'Team',
      verb:'is blocked on',obj:t.title,
      detail:'Needs intervention: '+t.project,
      time:'live'
    });
  });
  // In-progress = activity
  TASKS.filter(t => t.status==='in_progress' || t.status==='active').slice(0,12).forEach(t => {
    items.push({
      cls:'',icon:'⚡',agent:t.assigned_to||t.created_by||'team',
      verb:'working on',obj:t.title,
      detail:t.project,
      time:'live'
    });
  });
  // In-review = could be a question
  TASKS.filter(t => t.status==='review').forEach(t => {
    items.push({
      cls:'ask',icon:'❓',agent:t.assigned_to||'Team',
      verb:'requests review of',obj:t.title,
      detail:'Approve? Reassign? '+t.project,
      time:'live',
      actions:`<button class="btn green sm" onclick="void(0)">Approve</button><button class="btn amber sm" onclick="void(0)">Reassign</button>`
    });
  });
  // Done = completed
  TASKS.filter(t => t.status==='done').slice(0,5).forEach(t => {
    items.push({
      cls:'done',icon:'✅',agent:t.assigned_to||'team',
      verb:'completed',obj:t.title,
      detail:t.project,
      time:'recent'
    });
  });
  return items;
}

async function approveOne(id){
  if(!id) return;
  try{ await fetch('/api/approvals/'+id+'/approve',{method:'POST'}); fetchApprovals().then(()=>renderActivity()); }catch(e){}
}
async function denyOne(id){
  if(!id) return;
  try{ await fetch('/api/approvals/'+id+'/deny',{method:'POST'}); fetchApprovals().then(()=>renderActivity()); }catch(e){}
}

function timeAgo(iso){
  if(!iso) return 'recently';
  try{
    const t = new Date(iso).getTime();
    const sec = Math.floor((Date.now() - t) / 1000);
    if(sec < 60) return sec+'s ago';
    if(sec < 3600) return Math.floor(sec/60)+'m ago';
    if(sec < 86400) return Math.floor(sec/3600)+'h ago';
    return Math.floor(sec/86400)+'d ago';
  }catch{ return ''; }
}

    headers:{'content-type':'application/json'},

      from_agent: 'Amir',
      to_agent: to,
      subject: isDM ? `💬 DM from Amir: ${txt.substring(0,40)}` : `#${targetAgent}: ${txt.substring(0,40)}`,
      text: txt,

      thread_id: isDM ? `dm_${targetAgent.toLowerCase()}` : `team_${targetAgent}`

// REAL message feed builder — pulls from agent-team /api/team/messages/Amir
// and maps to per-channel view (so the same data drives #command, DMs, #engineering, etc.)
function buildRealSlackMessages(channel, limit=30){
  if(!Array.isArray(MESSAGES) || !MESSAGES.length) return [];
  // MESSAGES shape: { id, type:'agent_message', title, message:{from_agent, to_agent, text, priority, thread_id, sent_at}, is_read, created_at }
  const rows = MESSAGES.slice(0, 500).map(m => {
    const msg = (typeof m.message === 'string') ? (() => { try { return JSON.parse(m.message); } catch { return {}; } })() : (m.message||{});
    return {
      id: m.id,
      from: msg.from_agent || 'unknown',
      to:   msg.to_agent   || 'unknown',
      text: msg.text || m.title || '',
      priority: msg.priority || 'normal',
      thread_id: msg.thread_id,
      sent_at: msg.sent_at || m.created_at,
      is_perm: msg.priority === 'high' || /BLOCKER|request|approval/i.test(m.title||'')
    };
  });

  // Filter by channel
  let filtered;
  if(channel === '#command'){
    // Command center: all messages to Amir + system-wide pings
    filtered = rows.filter(m => m.to === 'Amir' || m.from === 'Amir');
  } else if(channel === '#approvals'){
    filtered = rows.filter(m => m.is_perm);
  } else if(channel.startsWith('#')){
    // Team channel: route by team name embedded in from_agent (e.g. "C-01 (Scroll)" → content, "E-01 (Drift)" → engineering)
    const teamName = channel.slice(1).toLowerCase();
    const teamPrefixes = {
      'engineering':['E-','L-','sys-'],
      'content':['C-','L-03'],
      'client-success':['CS-','L-06'],
      'leadgen':['LG-','L-04'],
      'operations':['O-','L-02'],
      'research':['R-','L-07'],
      'startups':['ST-','L-05'],
      'leadership':['K-','AM-','L-']
    };
    const prefixes = teamPrefixes[teamName] || [];
    filtered = rows.filter(m => prefixes.some(p => (m.from||'').toUpperCase().startsWith(p.toUpperCase())) || (m.to||'').toLowerCase().includes(teamName));
  } else if(channel.startsWith('@')){
    // DM: messages with that agent
    const name = channel.slice(1).toLowerCase();
    filtered = rows.filter(m => (m.from||'').toLowerCase().includes(name) || (m.to||'').toLowerCase().includes(name));
  } else {
    filtered = rows;
  }
  return filtered.slice(0, limit).map(m => {
    const fromAgent = AGENTS.find(a => a.name === m.from || a.codename?.toLowerCase() === m.from?.toLowerCase() || a.name?.toLowerCase().includes(m.from?.toLowerCase()||'___'));
    const team = fromAgent?.team || (m.from?.startsWith('C-') ? 'content' : m.from?.startsWith('E-') || m.from?.startsWith('sys-') ? 'engineering' : m.from?.startsWith('CS-') ? 'client-success' : m.from?.startsWith('LG-') ? 'leadgen' : m.from?.startsWith('O-') ? 'operations' : m.from?.startsWith('R-') ? 'research' : m.from?.startsWith('ST-') ? 'startups' : m.from?.startsWith('K-') || m.from?.startsWith('AM-') ? 'leadership' : 'general');
    return {
      name: m.from,
      team,
      time: new Date(m.sent_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
      text: m.text,
      priority: m.priority,
      id: m.id,
      is_perm: m.is_perm,
      to: m.to
    };
  });
}

function buildActivityFromMessages(){
  // Real activity: latest 20 messages where Amir is the recipient
  if(!Array.isArray(MESSAGES) || !MESSAGES.length) return [];
  return MESSAGES.slice(0, 30).map(m => {
    const msg = (typeof m.message === 'string') ? (() => { try { return JSON.parse(m.message); } catch { return {}; } })() : (m.message||{});
    const isPerm = msg.priority === 'high' || /BLOCKER|request|approval|need|please/i.test(m.title||'');
    const isHigh = msg.priority === 'high';
    return {
      id: m.id,
      cls: isPerm ? 'perm' : (isHigh ? 'ask' : ''),
      icon: isPerm ? '🔐' : (isHigh ? '❓' : '💬'),
      agent: msg.from_agent || 'Agent',
      verb: isPerm ? 'requests permission / blocker' : (msg.to_agent === 'Amir' ? 'sent you' : 'updated'),
      obj: m.title || 'message',
      detail: msg.text || '',
      time: timeAgo(m.created_at || msg.sent_at),
      to: msg.to_agent,
      priority: msg.priority,
      actions: isPerm ? `<button class="btn green sm" onclick="approveNotif(${m.id})">✓</button><button class="btn red sm" onclick="denyNotif(${m.id})">✕</button><button class="btn sm" onclick="dmAgent('${esc((msg.from_agent||'').match(/\(([^)]+)\)/)?.[1] || msg.from_agent)}');closeModal()">💬</button>` : `<button class="btn sm" onclick="dmAgent('${esc((msg.from_agent||'').match(/\(([^)]+)\)/)?.[1] || msg.from_agent)}');closeModal()">💬</button>`
    };
  });
}

async function sendInitChat(initiativeId){
  const input = document.getElementById('initChatInput');
  if(!input || !input.value.trim()) return;
  const msg = input.value.trim();
  try {
    await fetch('/api/initiative_chat', {method: 'POST', headers: {'content-type': 'application/json'}, body: JSON.stringify({initiative_id: initiativeId, from_agent: 'Amir', agent_name: 'Amir', message: msg, is_from_amir: true})});
    input.value = '';
    openInitiative(initiativeId);
  } catch(e) { console.error(e); }
}

// ═══ KB (real graphene + chunks) ═══
function renderKB(){
  const body = document.getElementById('kbBody');
  body.innerHTML = `
    <div style="font-family:'Audiowide';font-size:18px;letter-spacing:.08em;text-transform:uppercase;color:var(--text);margin-bottom:14px">
      <span style="color:var(--purple)">K</span> KNOWLEDGE BASE
    </div>

      <div class="stat-card" style="--accent:var(--cyan)"><div class="lbl">Total Chunks</div><div class="val">${KB_STATS.total||'—'}</div></div>
      <div class="stat-card" style="--accent:var(--green)"><div class="lbl">Topics</div><div class="val">${KB_STATS.topics||0}</div></div>
      <div class="stat-card" style="--accent:var(--amber)"><div class="lbl">Graph Nodes</div><div class="val">${KB_STATS.nodes||0}</div></div>
      <div class="stat-card" style="--accent:var(--purple)"><div class="lbl">Graph Edges</div><div class="val">${KB_STATS.edges||0}</div></div>
    </div>
    <div style="margin-bottom:14px">
      <input type="text" id="kbSearchInput" placeholder="Search knowledge base… (Enter to search)" onkeydown="if(event.key==='Enter')searchKB()">
    </div>
    <div style="font-family:'Audiowide';font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">🕸️ Topic Graph · click a node to load chunks</div>
    <div class="kb-graph" id="kbGraph">${renderKBGraph()}</div>
    <div id="kbResults" style="margin-top:14px"></div>
  `;
}

function renderKBGraph(){
  if(!KB_TOPICS.length) return '<div style="color:var(--dim);font-size:11px;grid-column:1/-1;text-align:center;padding:20px">Loading graph…<br><span style="font-size:9px">Topics query is slow (~10s). If empty, click search above to load chunks.</span></div>';
  // Group by domain for the "graphene" feel — domains share colors
  return KB_TOPICS.slice(0,80).map(t => {
    const chunks = t.chunks || 0;
    const label = t.label || t.id || 'node';
    const color = t.color || '#9b7bff';
    // Convert hex to rgba
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    const opacity = chunks ? Math.min(0.25 + chunks/1500, 0.95) : 0.15;
    return `<div class="kb-node" onclick="searchTopic('${esc(t.id)}')" style="background:rgba(${r},${g},${b},${opacity});border-color:${color}" title="${esc(t.domain||'')}">
      <div class="name">${esc(label)}</div>
      <div class="count">${chunks} chunks</div>
    </div>`;
  }).join('');
}

async function searchKB(){
  const q = document.getElementById('kbSearchInput')?.value || '';
  if(!q) return;
  document.getElementById('kbResults').innerHTML = '<div style="padding:10px;color:var(--muted);font-size:12px">Searching…</div>';
  try{
    const r = await fetch('/api/search?q='+encodeURIComponent(q));
    const d = await r.json();
    const results = d.results || [];
    document.getElementById('kbResults').innerHTML = `<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${results.length} results for "${esc(q)}"</div>` + (results.length ? results.slice(0,15).map(x => `
      <div style="padding:10px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;margin-bottom:6px">
        <div style="font-size:12px;font-weight:600;color:var(--text)">${esc(x.title||x.topic||x.filename||'Result')}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4">${esc((x.text||x.content||x.chunk||'').substring(0,240))}${(x.text||x.content||'').length>240?'…':''}</div>
        ${x.score?`<div style="font-size:9px;color:var(--muted);font-family:'Audiowide';margin-top:4px">relevance: ${(x.score*100).toFixed(0)}%</div>`:''}
      </div>
    `).join('') : '<div style="padding:10px;color:var(--dim);font-size:11px">No results.</div>');
  }catch(e){
    document.getElementById('kbResults').innerHTML = '<div style="padding:10px;color:var(--red);font-size:11px">Error: '+esc(e.message)+'</div>';
  }
}

async function searchTopic(name){
  document.getElementById('kbSearchInput').value = name;
  document.getElementById('kbResults').innerHTML = '<div style="padding:10px;color:var(--muted);font-size:12px">Loading chunks for '+esc(name)+'…</div>';
  try{
    const r = await fetch('/api/training/topic/'+encodeURIComponent(name));
    const d = await r.json();
    const chunks = d.chunks || [];
    document.getElementById('kbResults').innerHTML = `<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${chunks.length} chunks in "${esc(name)}"</div>` + (chunks.length ? chunks.slice(0,12).map(c => `
      <div style="padding:10px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;margin-bottom:6px">
        <div style="font-size:11px;color:var(--text);line-height:1.5;white-space:pre-wrap">${esc((c.text||c.content||'').substring(0,400))}${(c.text||'').length>400?'…':''}</div>
        ${c.source?`<div style="font-size:9px;color:var(--muted);font-family:'Audiowide';margin-top:4px">→ ${esc(c.source)}</div>`:''}
      </div>
    `).join('') : '<div style="padding:10px;color:var(--dim);font-size:11px">No chunks yet for this topic.</div>');
  }catch(e){
    document.getElementById('kbResults').innerHTML = '<div style="padding:10px;color:var(--red);font-size:11px">Error: '+esc(e.message)+'</div>';
  }
}

async function handleDocsUpload(files){
  if(!files || !files.length) return;
  for(const f of files){
    try{
      const buf = await f.arrayBuffer();
      const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
      const dataUrl = `data:${f.type||'application/octet-stream'};base64,${b64}`;
      const r = await fetch('/api/upload', {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({data: dataUrl, folder: 'docs', filename: f.name})
      });
      if(r.ok){
        const res = await r.json();
        DOCS.unshift({id:res.file, name:res.file, folder:'docs', ext:f.name.split('.').pop(), size:f.size, modified:Date.now(), mime:f.type, url:res.url});
      }
    }catch(e){ console.warn('upload failed', e); }
  }
  closeModal();
  renderDocs();
}

function openDoc(name, folder, ext){
  // folder may be undefined for old data
  if(!folder) folder = 'docs';
  const f = DOCS.find(x => x.name === name && (x.folder||'docs') === folder) || {name, folder, ext, url: `/media/${folder}/${name}`};
  const isImg = (ext||'').match(/jpg|jpeg|png|gif|webp|svg/i);
  const isVid = (ext||'').match(/mp4|webm|mov|mkv|avi/i);
  const isAud = (ext||'').match(/mp3|wav|ogg|m4a|flac/i);
  const isTxt = (ext||'').match(/txt|md|json|log|csv|yaml|yml/i);
  const isDoc = (ext||'').match(/pdf|doc|docx|xls|xlsx|ppt|pptx/i);
  let viewer = '';
  if(isImg) viewer = `<div style="background:#000;border-radius:6px;overflow:hidden;margin-bottom:14px;max-height:65vh;display:flex;align-items:center;justify-content:center"><img src="${f.url}" style="max-width:100%;max-height:65vh" onerror="this.parentNode.innerHTML='<div style=color:#888;padding:40px>Image not found</div>'"></div>`;
  else if(isVid) viewer = `<div style="background:#000;border-radius:6px;overflow:hidden;margin-bottom:14px"><video src="${f.url}" controls style="width:100%;max-height:65vh;display:block" onerror="this.parentNode.innerHTML='<div style=color:#888;padding:40px>Video not playable</div>'"></video></div>`;
  else if(isAud) viewer = `<div style="text-align:center;padding:30px;background:var(--bg);border-radius:6px;margin-bottom:14px"><div style="font-size:48px;margin-bottom:14px">🎵</div><audio src="${f.url}" controls style="width:100%"></audio></div>`;
  else if(isTxt) viewer = `<div id="docTextViewer" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:14px;max-height:50vh;overflow:auto;font-family:'Audiowide';font-size:11px;color:var(--text2);white-space:pre-wrap">Loading…</div>`;
  else if(isDoc) viewer = `<div style="text-align:center;padding:30px;background:var(--bg);border-radius:6px;margin-bottom:14px"><div style="font-size:48px;margin-bottom:14px">📄</div><div style="font-size:13px;color:var(--text);margin-bottom:8px">${esc(name)}</div><div style="font-size:11px;color:var(--muted)">Click Download to view this document</div></div>`;
  else viewer = `<div style="text-align:center;padding:30px;background:var(--bg);border-radius:6px;margin-bottom:14px"><div style="font-size:48px;margin-bottom:14px">📎</div><div style="font-size:13px;color:var(--text)">${esc(ext||'file').toUpperCase()} file</div></div>`;

  const sizeStr = f.size ? (f.size < 1024*1024 ? (f.size/1024).toFixed(1)+' KB' : (f.size/1024/1024).toFixed(2)+' MB') : '—';
  const dateStr = f.modified ? new Date(f.modified).toLocaleString() : '—';
  const html = `
    ${viewer}
    <div style="font-size:11px;color:var(--text3);font-family:'Audiowide';display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div><span style="color:var(--muted)">FOLDER</span><br>${esc(folder)}</div>
      <div><span style="color:var(--muted)">SIZE</span><br>${sizeStr}</div>
      <div><span style="color:var(--muted)">DATE</span><br>${dateStr}</div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="${f.url}" download="${esc(name)}" class="btn" style="flex:1;text-decoration:none;text-align:center">⬇ Download</a>
      <button class="btn alt" onclick="navigator.clipboard.writeText('${f.url}').then(()=>{event.target.textContent='✓ Copied';setTimeout(()=>event.target.textContent='📋 Copy URL',1500)})" style="flex:1">📋 Copy URL</button>
      <button class="btn red" onclick="deleteDoc('${esc(name)}','${esc(folder)}')" style="flex:1">🗑️ Delete</button>
    </div>
  `;
  showModal(esc(name), html);
  if(isTxt){
    fetch(f.url).then(r=>r.text()).then(t=>{
      const tv = document.getElementById('docTextViewer');
      if(tv) tv.textContent = t.length > 50000 ? t.substring(0,50000)+'\n\n…[truncated]' : t;
    }).catch(e=>{const tv = document.getElementById('docTextViewer'); if(tv) tv.textContent = 'Error: '+e.message;});
  }
}

async function deleteDoc(name, folder){

  try{

// Approve a notification (acknowledge the agent's request, send a reply)
async function approveNotif(id){
  try{
    const m = (MESSAGES||[]).find(x => x.id === id);
    if(m){
      const msg = (typeof m.message === 'string') ? JSON.parse(m.message) : m.message;
      // Reply to the agent saying approved
      await fetch('/api/team/messages', {
        method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({
          from_agent: 'Amir',
          to_agent: msg.from_agent || 'team',
          subject: `✓ Approved: ${m.title || 'request'}`,
          text: `Approved by @Amir — ${m.title || 'go ahead'}`,
          priority: 'normal',
          thread_id: msg.thread_id || 'approvals'
        })
      }).catch(()=>{});
    }
    // Mark as read (just remove from local list for now)
    MESSAGES = (MESSAGES||[]).filter(x => x.id !== id);
    renderRailNotif();
  }catch(e){ console.warn('approve',e); }
}
async function denyNotif(id){
  try{
    const m = (MESSAGES||[]).find(x => x.id === id);
    if(m){
      const msg = (typeof m.message === 'string') ? JSON.parse(m.message) : m.message;
      await fetch('/api/team/messages', {
        method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({
          from_agent: 'Amir',
          to_agent: msg.from_agent || 'team',
          subject: `✕ Denied: ${m.title || 'request'}`,
          text: `Denied by @Amir — ${m.title || 'blocked'}`,
          priority: 'normal',
          thread_id: msg.thread_id || 'approvals'
        })
      }).catch(()=>{});
    }
    MESSAGES = (MESSAGES||[]).filter(x => x.id !== id);
    renderRailNotif();
  }catch(e){}
}

    const box = document.getElementById('agentChatBox');
    if(!msgs.length) { box.innerHTML = '<div style="color:var(--dim);padding:20px;text-align:center">No prior messages with this agent.</div>'; return; }
    box.innerHTML = msgs.map(m => '<div style="margin-bottom:6px;padding:4px 0;border-bottom:1px solid var(--bg)"><span style="color:var(--' + (m.is_from_amir?'amber':'cyan') + ')">' + esc(m.from_agent||'agent') + ':</span> ' + esc((m.message||'').substring(0,500)) + ' <span style="color:var(--dim);font-size:9px">[' + esc((m.created_at||'').substring(11,19)) + ']</span></div>').join('');
    box.scrollTop = box.scrollHeight;
  });
}
function sendAgentMsg(name){
  const input = document.getElementById('agentChatInput');
  if(!input || !input.value.trim()) return;
  if(!name) name = input.placeholder;
  const msg = input.value.trim();
  input.value = '';
  fetch('/api/messages', {
    method: 'POST',
    headers: {'content-type':'application/json'},
    body: JSON.stringify({to_agent: name, from_agent: 'Amir', is_from_amir: true, message: msg})
  }).then(r=>r.json()).then(()=>{
    const box = document.getElementById('agentChatBox');
    box.innerHTML += '<div style="margin-bottom:6px;padding:4px 0;border-bottom:1px solid var(--bg)"><span style="color:var(--amber)">You:</span> ' + esc(msg) + ' <span style="color:var(--dim);font-size:9px">[just now]</span></div>';
    box.scrollTop = box.scrollHeight;
  });
}
document.getElementById('modalOverlay').addEventListener('click', closeModal);

// ═══ DATA FETCHERS ═══
// API base — dashboard's own server at 1702 (most things) + agent-team proxied via /api/team/ → :1707
// All agents live at /api/team/agents (real) — /api/galaxy/* was a placeholder that 404s.
const API = {
  agents:   '/api/team/agents',          // real: 122 agents on :1707
  tasks:    '/api/tasks',                  // real: 21K+ tasks
  messages: (id) => `/api/team/messages/${encodeURIComponent(id||'Amir')}`,  // real agent inbox
  notify:   '/api/team/notify',           // POST new notification
  heartbeat:(id) => `/api/team/agents/${id}/heartbeat`,
  stats:    '/api/team/stats',            // real counts
  approvals:'/api/approvals',             // local dashboard
  leads:    '/api/leads/',                // local dashboard
  calendar: '/api/calendar',
  threads:  '/api/threads',
  kb_stats: '/api/stats',
  kb_topics:'/api/training/topics',
  gallery:  '/api/gallery',
  files:    '/api/files',
  skills:   '/api/skills-catalog',
};

// Normalize raw agent-team agent into the shape the UI expects.
// DB field: { id, name:"E-S01 (Kernel)", division:"Engineering", status:"idle", ... }
// UI wants: { id, codename, name, team, specialization, current_load, max_load, ... }
function normalizeAgent(a){
  // Extract codename from "E-S01 (Kernel)" → "Kernel", fallback to name
  let codename = a.name;
  const m = (a.name||'').match(/\(([^)]+)\)/);
  if(m) codename = m[1];
  return {
    id: a.id,
    name: a.name,
    codename,
    title: a.title || a.role_description || a.agent_type,
    team: (a.division||'general').toLowerCase().replace(/[\s_-]+/g,'-'),
    division: a.division,
    agent_type: a.agent_type,
    status: a.status,
    is_active: a.is_active,
    specialization: a.role_description || `${a.division||'team'} · ${a.agent_type||'agent'}`,
    current_load: a.current_load || 0,
    max_load: a.max_load || a.max_concurrent_tasks || 7,
    last_active_at: a.last_active_at,
    level: a.level,
    model: a.model
  };
}
function normalizeTask(t){
  // DB: { id, title, status, agent_type, assigned_agent_id, assigned_agents:[], project_id, ... }
  // UI wants: { id, title, status, project, assigned_to, ... }
  return {
    id: t.id,
    title: t.title,
    description: t.description,
    status: t.status,
    priority: t.priority,
    agent_type: t.agent_type,
    assigned_to: t.assigned_agent_id ? String(t.assigned_agent_id) : (t.assigned_agents && t.assigned_agents.length ? String(t.assigned_agents[0]) : null),
    assigned_agents: t.assigned_agents || [],
    // 2026-06-30 fix: prefer the real venture name (t.project) over the FK-based label
    project: t.project || t.lane || 'team',
    project_id: t.project_id,
    created_by: t.created_by,
    created_at: t.created_at,
    started_at: t.started_at,
    completed_at: t.completed_at,
    tags: t.tags||[],
    retry_count: t.retry_count||0
  };
}

async function api(path){
  try{ const r = await fetch(path); return await r.json(); }catch(e){ return null; }
}

async function fetchApprovals(){
  try{ const d = await api('/api/approvals'); APPROVALS = (d?.items)||d||[]; return APPROVALS; }catch{ APPROVALS=[]; return []; }
}
async function fetchLeads(){
  try{ const d = await api('/api/leads/'); return { people: d?.counts?.people||0, biz: d?.counts?.businesses||0, pros: d?.counts?.professionals||0 }; }catch{ return {people:0,biz:0,pros:0}; }
}
// Real agent inbox — returns messages where to_agent=Amir OR from_agent=Amir
async function fetchMessages(agentId){
  try{ const d = await api(API.messages(agentId||'Amir')); return Array.isArray(d) ? d : (d?.messages||[]); }catch{ return []; }
}
async function fetchStats(){
  try{ return await api(API.stats); }catch{ return null; }
}
async function fetchKB(){
  try{
    const stats = await api('/api/stats');
    if(stats) KB_STATS = { total: stats.total_docs||stats.chunks||0, topics: stats.topics||0, nodes: stats.nodes||stats.graph_nodes||0, edges: stats.edges||stats.graph_edges||0 };
  }catch{}
  try{
    // Topics endpoint is slow (heavy DB query) — give it 20s
    const r = await fetch('/api/training/topics');
    const topics = await r.json();
    if(Array.isArray(topics)) KB_TOPICS = topics;
    else if(topics?.topics) {
      KB_TOPICS = topics.topics;
      KB_STATS.topics = KB_STATS.topics || KB_TOPICS.length;
    }
  }catch(e){ console.warn('topics fetch failed',e); }
}
async function fetchCalendar(){
  try{ const d = await api('/api/calendar'); if(d?.calendar) CALENDAR_EVENTS = d.calendar; if(d?.events) CALENDAR_EVENTS = d.events; }catch{}
}
async function fetchInbox(){
  try{
    const d = await api('/api/threads');
    if(d?.threads) {
      INBOX = d.threads.filter(t => t.from_email || t.from || t.tags?.includes('gmail') || !t.sessionKey?.startsWith('agent:main:dashboard-chat'));
    }
  }catch{}
}
async function fetchGallery(){
  try{ const d = await api('/api/gallery'); if(d?.images) GALLERY_IMAGES = d.images; }catch{}
}
async function fetchDocs(){
  try{
    const d = await api('/api/files');
    if(d?.files) DOCS = d.files;
  }catch{}
}

// ═══ INIT ═══
async function init(){
  setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);

  // Parallel fetch from REAL endpoints (port 1707 proxied through /api/team/*)
  const [agentsRes, tasksRes, skillsRes, messagesRes, statsRes] = await Promise.all([
    fetch(API.agents).then(r=>r.json()).catch(()=>[]),
    fetch(API.tasks).then(r=>r.json()).catch(()=>({tasks:[]})),
    fetch(API.skills).then(r=>r.json()).catch(()=>null),
    fetchMessages('Amir').catch(()=>[]),
    fetchStats().catch(()=>null)
  ]);

  // Normalize agent data
  const rawAgents = Array.isArray(agentsRes) ? agentsRes : (agentsRes?.agents||[]);
  AGENTS = rawAgents.map(normalizeAgent);

  // Normalize task data — handle both {tasks:[]} and [] shapes
  const rawTasks = Array.isArray(tasksRes) ? tasksRes : (tasksRes?.tasks||[]);
  TASKS = rawTasks.map(normalizeTask);

  SKILLS = skillsRes?.skills || skillsRes?.categories || [];

  // Real messages from agent-team (to or from Amir)
  MESSAGES = messagesRes || [];
  if(statsRes){
    // Update topbar with real counts
    document.getElementById('topbarStatus').textContent = `${statsRes.agents?.total||AGENTS.length} agents · ${statsRes.agents?.active||'?'} active · ${statsRes.tasks?.total||TASKS.length} tasks · ${MESSAGES.length} msgs`;
  } else {
    document.getElementById('topbarStatus').textContent = `${AGENTS.length} agents · ${TASKS.length} tasks · ${MESSAGES.length} messages`;
  }

  // Background fetches
  fetchApprovals();
  fetchKB();
  fetchCalendar();
  fetchInbox();
  fetchGallery();
  fetchDocs();

  // Build projects
  const projMap = {};
  TASKS.forEach(t => { const p = t.project || 'team'; if(!projMap[p]) projMap[p] = {key:p,count:0,ships:0}; projMap[p].count++; if(t.status==='in_progress') projMap[p].ships++; });
  PROJECTS = Object.values(projMap).sort((a,b)=>b.count-a.count);

  renderOverview();
  renderRailSlack();
  renderRailNotif();

  // Auto-refresh every 30s — pulls real agents, tasks, messages
  setInterval(async () => {
    try{
      const [a, t, m] = await Promise.all([
        fetch(API.agents).then(r=>r.json()).catch(()=>[]),
        fetch(API.tasks).then(r=>r.json()).catch(()=>({tasks:[]})),
        fetchMessages('Amir').catch(()=>[])
      ]);
      const rawA = Array.isArray(a) ? a : (a?.agents||[]);
      const rawT = Array.isArray(t) ? t : (t?.tasks||[]);
      AGENTS = rawA.map(normalizeAgent);
      TASKS = rawT.map(normalizeTask);
      MESSAGES = m;
      document.getElementById('topbarStatus').textContent = `${AGENTS.length} agents · ${TASKS.length} tasks · ${MESSAGES.length} msgs`;
      // Rebuild project list
      const pm = {};
      TASKS.forEach(tt => { const p = tt.project || 'team'; if(!pm[p]) pm[p] = {key:p,count:0,ships:0}; pm[p].count++; if(tt.status==='in_progress') pm[p].ships++; });
      PROJECTS = Object.values(pm).sort((x,y)=>y.count-x.count);
      if(currentPage==='overview') renderOverview();
      if(currentPage==='activity') renderActivity();
      if(currentPage==='board') renderBoard();
      if(currentPage==='agents') renderAgents();
      // Always refresh rails so live activity shows
      if(currentRail==='slack') renderRailSlack();
      if(currentRail==='notif') renderRailNotif();
    }catch(e){ console.warn('auto-refresh',e); }
  }, 30000);
}

init();
</script>
